function go(path) { location.hash = '/' + path }
window.addEventListener('hashchange', route);
window.addEventListener('load', route);
document.addEventListener('click', () => { closeTypeTooltip(); });
document.addEventListener('keydown', e => {
  if(e.key==='Escape') {
    closeTypeTooltip();
    if(S.periodPickerOpen){ S.periodPickerOpen=false; refreshS4(); }
  }
});

function route() {
  const h = location.hash.replace(/^#\/?/, '') || 'dashboard';
  const navDash = document.getElementById('navDash');
  const navEditor = document.getElementById('navEditor');
  if (navDash) navDash.classList.remove('active');
  if (navEditor) navEditor.classList.remove('active');
  if (h === 'dashboard' || h === '') { navDash?.classList.add('active'); renderDashboard(); }
  else if (h === 'editor') { navEditor?.classList.add('active'); renderEditor(); }
  else if (h === 'placeholder') { renderPlaceholder(); }
  else renderDashboard();
}

/* ══════════════════════════════════════════════════════════
   Dashboard
══════════════════════════════════════════════════════════ */
let dashTab = 'all';
let dashPage = 1;
const DASH_PAGE_SIZE = 12;
function setDashPage(p) { dashPage = p; renderDashboard(); }
function renderDashboard() {
  const KIND_IMG = {online:'./images/동영상.png', offline:'./images/오프라인.png', hybrid:'./images/아티클.png'};
  const getItemIcon = item => {
    const t = TYPES.find(t => t.id === item.typeId);
    return (t?.imgs?.[0]) || KIND_IMG[item.kind] || './images/동영상.png';
  };
  const sl = {create:'과정 생성', edit:'콘텐츠 편집', ready:'오픈 예정', ongoing:'학습 중', done:'학습 완료'};
  const tabs = [
    {id:'all',     label:'전체',    items:DASH_DATA},
    {id:'editing', label:'편집중',  items:DASH_DATA.filter(d=>['create','edit'].includes(d.status))},
    {id:'ready',   label:'모집중',  items:DASH_DATA.filter(d=>d.status==='ready')},
    {id:'ongoing', label:'학습중',  items:DASH_DATA.filter(d=>d.status==='ongoing')},
    {id:'done',    label:'학습종료', items:DASH_DATA.filter(d=>d.status==='done')},
  ];
  const cur = tabs.find(t=>t.id===dashTab)||tabs[0];
  const totalItems = cur.items;
  const totalPages = Math.ceil(totalItems.length / DASH_PAGE_SIZE) || 1;
  if (dashPage > totalPages) dashPage = 1;
  const pageItems = totalItems.slice((dashPage-1)*DASH_PAGE_SIZE, dashPage*DASH_PAGE_SIZE);

  const pgHTML = totalPages <= 1 ? '' : (() => {
    const btns = [];
    btns.push(`<button class="pg-btn" onclick="setDashPage(${dashPage-1})" ${dashPage===1?'disabled':''}>‹</button>`);
    for (let i=1; i<=totalPages; i++) {
      btns.push(`<button class="pg-btn ${i===dashPage?'active':''}" onclick="setDashPage(${i})">${i}</button>`);
    }
    btns.push(`<button class="pg-btn" onclick="setDashPage(${dashPage+1})" ${dashPage===totalPages?'disabled':''}>›</button>`);
    return `<div class="pagination">${btns.join('')}</div>`;
  })();

  document.getElementById('view').innerHTML = `
    <div class="dash-page">
      <div class="dash-header">
        <div><h1>러닝메이커 보드</h1>
          <p>과정의 전체 생애주기를 한눈에 관리하세요.</p></div>
        <button class="btn btn-primary" onclick="startNew()">+ 새 과정 만들기</button>
      </div>
      <div class="tab-bar">
        ${tabs.map(t=>`<div class="tab ${t.id===dashTab?'active':''}" onclick="setDashTab('${t.id}')">${t.label}<span class="cnt">${t.items.length}</span></div>`).join('')}
      </div>
      <div class="course-list">
        ${pageItems.length===0 ? `<div class="empty-state"><div class="eico">📋</div><div class="ettl">과정이 없습니다</div><p>새 과정을 만들어 시작해보세요.</p></div>` :
          pageItems.map(item=>{
            const isDone = item.status==='done';
            const certTxt = item.certify==='processing'?'수료 처리 중':item.certify==='completed'?'수료 완료':'';
            const meta = item.learnFrom&&item.learnTo ? `학습 ${item.learnFrom} ~ ${item.learnTo}` : item.mod ? `수정 ${item.mod}` : '';
            return `<div class="course-row${isDone?' done-card':''}" onclick="go('editor')">
              <div class="type-icon"><img src="${getItemIcon(item)}" alt="${item.kind}"/></div>
              <div class="cinfo">
                <div class="ctitle">${esc(item.title)}</div>
                <div class="cmeta">${meta}${certTxt?` · ${certTxt}`:''}</div>
              </div>
              <span class="status-pill ${item.status}">${sl[item.status]||item.status}</span>
            </div>`;

/* ── Scroll Spy ── */
function initScrollSpy() {
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const id = entry.target.id;
      document.querySelectorAll('.snav-item').forEach(item => {
        item.classList.remove('active');  // ok/no는 건드리지 않음
        if (item.dataset.target === id) item.classList.add('active');
      });
    });
  }, { rootMargin: '-30% 0px -60% 0px' });
  SECTIONS.forEach(sec => {
    const el = document.getElementById(sec.id);
    if (el) observer.observe(el);
  });
}

/* ── 네비게이션 심볼 (숫자 / 체크 / X) ── */
const SVG_CHECK = `<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 6.2L4.8 9L10 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
const SVG_X     = `<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 2L9 9M9 2L2 9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`;
function getSnavNoReason(secId) {
  switch(secId) {
    case 'sec-info':  return '과정명을 2자 이상 입력해야 합니다';
    case 'sec-toc':   return '모든 챕터에 콘텐츠가 1개 이상 있어야 합니다';
    case 'sec-extra': return '썸네일 이미지를 등록해야 합니다';
    case 'sec-open':  return '필수 항목(과정명·유형·목차·수강기간)을 모두 입력해야 오픈할 수 있습니다';
    default:          return '필수 항목을 입력해주세요';
  }
}
function getSnavSymbol(secId, idx) {
  const s = getSectionStatus(secId);
  if (s === 'ok') return SVG_CHECK;
  if (s === 'no') return SVG_X;
  return String(idx + 1);
}

/* ── 네비게이션 상태 업데이트 ── */
function getSectionStatus(secId) {
  switch(secId) {
    case 'sec-info':
      return S.courseName.trim().length >= 2 ? 'ok' : 'no';
    case 'sec-type':
      return S.creationType ? 'ok' : '';
    case 'sec-toc': {
      if (!S.toc.length) return '';
      return S.toc.every(t => t.contents.length > 0) ? 'ok' : 'no';
    }
    case 'sec-enroll':
      return (S.enroll.immediate || (S.enroll.learnFrom && S.enroll.learnTo)) ? 'ok' : '';
    case 'sec-extra':
      return S.courseThumbnail ? 'ok' : 'no';
    case 'sec-open': {
      const hasToc = S.toc.some(t => t.contents.length > 0);
      const hasPeriod = S.enroll.immediate || (S.enroll.learnFrom && S.enroll.learnTo);
      return (S.courseName.trim().length >= 2 && S.creationType && hasToc && hasPeriod) ? 'ok' : 'no';
    }
    default: return '';
  }
}
function getSectionSummary(secId) {
  switch(secId) {
    case 'sec-info':
      return S.courseName.trim() ? esc(S.courseName.length > 16 ? S.courseName.slice(0,16)+'…' : S.courseName) : '과정명 미입력';
    case 'sec-type':
      return S.creationType ? (TYPES.find(t=>t.id===S.creationType)?.label || EXTRA_TYPES[S.creationType]?.label || S.creationType) : '유형 미선택';
    case 'sec-toc': {
      const tc = S.toc.length;
      const cc = S.toc.reduce((s,t)=>s+t.contents.length, 0);
      if (!tc) return '목차 없음';
      const noCont = S.toc.filter(t=>t.contents.length===0).length;
      if (noCont) return `${tc}개 목차 · 콘텐츠 없는 ${noCont}개`;
      return `${tc}개 목차 · ${cc}개 콘텐츠`;
    }
    case 'sec-enroll': {
      if (S.enroll.immediate) return `즉시 학습 · ${S.enroll.days}일`;
      if (S.enroll.learnFrom && S.enroll.learnTo) return `${S.enroll.learnFrom} ~`;
      return '기간 미설정';
    }
    case 'sec-extra': {
      const parts = [];
      if (S.extra.sequential) parts.push('순서학습');
      if (S.extra.progressLock) parts.push('진도제한');
      if (S.extra.speedLock) parts.push('배속고정');
      if (S.extra.captureBlock) parts.push('캡처방지');
      return parts.length ? parts.join(' · ') : '기본 설정';
    }
    case 'sec-open': {
      const hasToc = S.toc.some(t=>t.contents.length>0);
      const hasPeriod = S.enroll.immediate || (S.enroll.learnFrom && S.enroll.learnTo);
      const allOk = S.courseName.trim().length>=2 && S.creationType && hasToc && hasPeriod;
      return allOk ? '오픈 준비 완료' : '미완성 항목 있음';
    }
    default: return '';
  }
}
function renderSnavTocList() {
  if (!S.toc.length) return '';
  return `<div class="snav-toc-list">
    ${S.toc.map(ch => {
      const noCont = ch.contents.length === 0;
      const name = ch.title.length > 15 ? ch.title.slice(0,15)+'…' : ch.title;
      return `<div class="snav-toc-ch ${noCont?'no-cont':''}" onclick="event.stopPropagation();scrollToSection('sec-toc')">
        <div class="snav-toc-ch-bullet"></div>
        <div class="snav-toc-ch-name">${esc(name)}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function updateNavStatus() {
  document.querySelectorAll('.snav-item').forEach(item => {
    const secId = item.dataset.target;
    const status = getSectionStatus(secId);
    item.classList.remove('ok','no');
    if (status) item.classList.add(status);
    const idx = SECTIONS.findIndex(s => s.id === secId);
    const numEl = item.querySelector('.snav-num');
    if (numEl) {
      numEl.innerHTML = getSnavSymbol(secId, idx);
      if (status === 'no') numEl.dataset.tooltip = getSnavNoReason(secId);
      else delete numEl.dataset.tooltip;
    }
    const sum = item.querySelector('.snav-summary');
    if (sum) sum.innerHTML = getSectionSummary(secId);
    const tocList = item.querySelector('.snav-toc-list-wrap');
    if (tocList) tocList.innerHTML = renderSnavTocList();
  });
  const allOk = SECTIONS.every(s => getSectionStatus(s.id) === 'ok');
  const openBtn = document.getElementById('navOpenBtn');
  if (openBtn) openBtn.disabled = !allOk;
}
function scrollToSection(id) {

function selectType(id) {
  S.creationType = id;
  // 일반 type-card 선택 상태
  document.querySelectorAll('.type-card').forEach(c => {
    c.classList.toggle('selected', c.onclick?.toString().includes(`'${id}'`));
  });
  // extra-card 선택 상태
  ['import','prepkg'].forEach(eid => {
    document.getElementById(`extraCard-${eid}`)?.classList.toggle('selected', id===eid);
  });
  // 일반 그리드 재렌더
  const secType = document.getElementById('sec-type');
  if (secType) {
    secType.querySelector('.type-grid').innerHTML = TYPES.map(t=>`
      <div class="type-card ${S.creationType===t.id?'selected':''}" onclick="selectType('${t.id}')"
        style="background:${t.bg}">
        <div class="type-check">✓</div>
        <div class="t-icon-group">
          ${t.imgs.slice(0,3).map(src=>`<div class="t-ico-img"><img src="${src}" alt=""/></div>`).join('')}
        </div>
        <h3>${t.label}</h3>
        <p>${t.sub}</p>
      </div>
    `).join('');
    const label = TYPES.find(t=>t.id===id)?.label || EXTRA_TYPES[id]?.label || id;
    // 유형에 맞는 기본 목차 셋 적용
    const defaultToc = buildDefaultToc(id);
    if (defaultToc) {
      S.toc = defaultToc;
      S.activeTocId = defaultToc[0]?.id || null;
      const wrap = document.getElementById('tocFrameWrap');
      if (wrap) wrap.innerHTML = renderTocFrame();
      refreshTocTree();
    }
    S.clibSelected = null;
    S.clibSearch = '';
    S.clibPage = 1;
    S.clibImported = false;
    toast(`"${label}" 선택됨`, 'success');
    updateNavStatus();
    refreshTypeBadge();
  }
}

function renderCourseLibPanel() {
  const q = (S.clibSearch || '').toLowerCase();
  let items = COURSE_LIBRARY.filter(c =>
    !q || c.title.toLowerCase().includes(q) || c.category.toLowerCase().includes(q)
  );
  if (S.clibSort === 'recent') items = [...items].sort((a,b) => b.date.localeCompare(a.date));
  else items = [...items].sort((a,b) => b.uses - a.uses);

  const PER_PAGE = 15;
  const totalPages = Math.max(1, Math.ceil(items.length / PER_PAGE));
  const page = Math.min(S.clibPage, totalPages);
  const pageItems = items.slice((page-1)*PER_PAGE, page*PER_PAGE);
  const isDetail = !!S.clibSelected;
  const detailCourse = isDetail ? COURSE_LIBRARY.find(c=>c.id===S.clibSelected) : null;
  const typeLabel = S.creationType === 'prepkg' ? '프리패키지드 코스' : '이전 과정 불러오기';

  /* ── 목록 패널 ── */
  const listPanel = `
    <div class="fc-panel" style="width:100%">
      <!-- 상단: 타입 정보 + 검색/필터 -->
      <div class="frame-content-head">
        <span class="ctit">${typeLabel}</span>
      </div>
      <div class="clib-toolbar" style="border-bottom:1px solid var(--border)">
        <input class="clib-search" placeholder="과정명 또는 카테고리 검색"
          value="${esc(S.clibSearch||'')}"
          oninput="S.clibSearch=this.value;S.clibPage=1;refreshTocFrame()"/>
        <div class="clib-sort-group">
          <button class="clib-sort-btn ${S.clibSort==='recent'?'active':''}"
            onclick="S.clibSort='recent';S.clibPage=1;refreshTocFrame()">최신순</button>
          <button class="clib-sort-btn ${S.clibSort==='uses'?'active':''}"
            onclick="S.clibSort='uses';S.clibPage=1;refreshTocFrame()">활용순</button>
        </div>
      </div>
      <!-- 목록 -->
      <div class="clib-list">
        ${pageItems.length === 0
          ? `<div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text-3);font-size:13px">검색 결과가 없습니다</div>`
          : pageItems.map(c => `
            <div class="clib-row" onclick="S.clibSelected='${c.id}';refreshTocFrame()">
              <div class="clib-ico">
                <img src="${TYPE_IMG[c.type]||'./images/PDF.png'}" alt="${c.type}"/>
              </div>
              <div class="clib-info">
                <div class="clib-title">${esc(c.title)}</div>
                <div class="clib-meta">${esc(c.category)} · 활용 ${c.uses}회</div>
              </div>
              <div class="clib-date">${c.date}</div>
            </div>`).join('')}
      </div>
      ${totalPages > 1 ? `
      <div class="clib-pagination">
        <button class="clib-pg-btn" ${page<=1?'disabled':''} onclick="S.clibPage=${page-1};refreshTocFrame()">‹</button>
        ${Array.from({length:totalPages},(_,i)=>`
          <button class="clib-pg-btn ${i+1===page?'active':''}"
            onclick="S.clibPage=${i+1};refreshTocFrame()">${i+1}</button>`).join('')}
        <button class="clib-pg-btn" ${page>=totalPages?'disabled':''} onclick="S.clibPage=${page+1};refreshTocFrame()">›</button>
      </div>` : ''}
    </div>`;

  /* ── 상세 패널 ── */
  const detailPanel = detailCourse ? (() => {
    const totalContents = detailCourse.toc.reduce((s,ch)=>s+ch.contents.length,0);
    const tocHTML = detailCourse.toc.map(ch => `
      <div class="clib-toc-chapter">
        <div class="clib-toc-ch-title">${esc(ch.title)}</div>
        ${ch.contents.map(c => `
          <div class="clib-toc-item">
            <div style="width:20px;height:20px;border-radius:4px;overflow:hidden;flex-shrink:0">
              <img src="${TYPE_IMG[c.type]||'./images/PDF.png'}" alt="${c.type}" style="width:100%;height:100%;object-fit:contain"/>
            </div>
            <span style="flex:1">${esc(c.title)}</span>
            <span style="font-size:11px;color:var(--text-3)">${c.type}</span>
          </div>`).join('')}
      </div>`).join('');
    return `
      <div class="fc-panel" style="display:flex;flex-direction:column;overflow:hidden;width:100%">
        <!-- 상단: 뒤로가기 + 선택 과정 정보 -->
        <div class="frame-content-head" style="flex-shrink:0">
          <button class="back-btn" onclick="S.clibSelected=null;refreshTocFrame()">← 목록</button>
          <div style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
            <div style="width:24px;height:24px;border-radius:5px;overflow:hidden;flex-shrink:0">
              <img src="${TYPE_IMG[detailCourse.type]||'./images/PDF.png'}" style="width:100%;height:100%;object-fit:contain"/>
            </div>
            <span class="ctit" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(detailCourse.title)}</span>
            <span style="font-size:11px;color:var(--text-3);flex-shrink:0">${esc(detailCourse.category)} · ${detailCourse.toc.length}개 목차 · ${totalContents}개 콘텐츠</span>
          </div>
        </div>
        <!-- 커리큘럼 -->
        <div class="creg-form" style="flex:1;overflow-y:auto">
          <div class="clib-detail-toc">${tocHTML}</div>
        </div>
        <!-- 하단 액션 -->
        <div class="creg-actions">
          <button class="creg-btn-cancel" onclick="S.clibSelected=null;refreshTocFrame()">취소</button>
          <button class="creg-btn-submit" onclick="selectCourseFromLib('${detailCourse.id}')">이 과정으로 불러오기</button>
        </div>
      </div>`;
  })() : `<div class="fc-panel" style="width:100%"></div>`;

  return `
    <div class="frame-content" id="frameContent">
      <div class="fc-slider ${isDetail?'editing':''}">
        ${listPanel}
        ${detailPanel}
      </div>
    </div>`;
}

function selectCourseFromLib(courseId) {
  const course = COURSE_LIBRARY.find(c => c.id === courseId);
  if (!course) return;
  let cid = Date.now();
  S.toc = course.toc.map((ch, ti) => ({
    id: 't' + (ti + 1),
    title: ch.title,
    contents: ch.contents.map(c => ({
      id: 'c' + (cid++), icon: '', type: c.type, title: c.title, dur: '', registered: true
    }))
  }));
  S.activeTocId = S.toc[0]?.id || null;
  S.clibSelected = null;
  S.clibImported = true;
  toast(`"${course.title}" 과정을 불러왔습니다.`, 'success');
  updateNavStatus();
  refreshTocFrame();
}

function renderTocFrame() {
  const isClibMode = (S.creationType === 'import' || S.creationType === 'prepkg') && !S.clibImported;
  const toc = S.toc.find(t=>t.id===S.activeTocId);
  const contentPanel = isClibMode
    ? renderCourseLibPanel()
    : (S.contentAddMode ? renderContentAddPanel() : renderContentViewPanel(toc));
  return `
    <div class="toc-frame">
      <!-- Frame Body (강의명 헤더 + 패널 포함) -->
      <div class="toc-frame-body" id="tocFrameBody" style="height:${S.frameHeight}px">
        <!-- 강의명 헤더 (박스 안) -->
        <div class="toc-frame-course-header">
          <div class="toc-frame-course-name toc-frame-course-editable" id="frameCourseTitle"
            contenteditable="true" spellcheck="false"
            data-placeholder="강의명을 입력하면 여기에 표시됩니다"
            oninput="onFrameCourseTitleInput(this)"
            onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}"
            >${S.courseName ? esc(S.courseName) : ''}</div>
          <div id="tocTypeBadge">${renderTypeBadgeHTML()}</div>
        </div>
        <!-- 패널 행 -->
        <div class="toc-panels">
          ${isClibMode ? `
          <!-- clib 모드: 좌측 패널 없이 전체 너비 -->
          ${contentPanel}
          ` : `
          <!-- 일반 TOC 왼쪽 패널 -->
          <div class="frame-toc">
            <div class="frame-toc-head">
              <span class="ftit">학습 구성</span>
              <div style="display:flex;gap:6px;align-items:center">
                <button class="toc-delete-btn ${S.tocEditMode && S.selectedTocItems.length>0?'visible':''}"
                  id="tocDeleteBtn" onclick="deleteSelectedTocItems()">
                  🗑 삭제 (${S.selectedTocItems.length})
                </button>
                <button class="toc-edit-btn ${S.tocEditMode?'active':''}" onclick="toggleTocEditMode()">
                  ${S.tocEditMode ? '완료' : '편집'}
                </button>
              </div>
            </div>
            <div class="frame-toc-items ${S.tocEditMode?'edit-mode':''}" id="tocTreeItems">
              ${renderTocTree()}
            </div>
            <div class="frame-toc-foot">
              <button class="toc-add-btn" onclick="addToc()">+ 목차 추가</button>
            </div>
          </div>

/* ── 트리 확장 상태 ── */
const TOC_EXPANDED = {};  // tocId → true/false

function getSmallTypeIcon(type) {
  const src = TYPE_IMG[type];
  if (src) return `<img src="${src}" alt="${type}"/>`;
  return `<span style="font-size:13px;line-height:26px;display:block;text-align:center">📄</span>`;

function renderTocTree() {
  if (!S.toc.length) return `<div style="padding:16px;text-align:center;font-size:13px;color:var(--text-3)">목차가 없습니다</div>`;
  return S.toc.map((t, ti) => {
    const expanded = TOC_EXPANDED[t.id] !== false;
    const isActive = S.activeTocId === t.id;
    const tocSelId = 'toc-' + t.id;
    return `
      <div class="tree-toc-node" id="tnode-${t.id}"
        ondragover="event.preventDefault();tocDragOver('${t.id}')"
        ondragleave="tocDragLeave('${t.id}')"
        ondrop="event.preventDefault();tocDrop('${t.id}')">
        <div class="tree-toc-row ${isActive?'active':''}"
          onclick="selectToc('${t.id}')"
          draggable="true"
          ondragstart="tocDragStart(event,'${t.id}')"
          ondragend="dragCleanup()">
          ${S.tocEditMode ? `<input type="checkbox" class="toc-check"
            onclick="event.stopPropagation();toggleTocSelect('${tocSelId}')"
            ${S.selectedTocItems.includes(tocSelId)?'checked':''}/>` : ''}
          <span class="t-toggle ${expanded?'open':'closed'}"
            onclick="event.stopPropagation();toggleTocExpand('${t.id}')">▾</span>
          <span class="t-name" ondblclick="event.stopPropagation();startRenameToc('${t.id}')"
            id="tname-${t.id}" title="더블클릭하여 이름 수정">${esc(t.title)}</span>
          ${!S.tocEditMode ? `
            <button class="t-add-btn" title="콘텐츠 추가"
              onclick="openTypeTooltip(event,'${t.id}','__append')">+</button>
          ` : ''}
        </div>
        ${expanded ? `
          <div class="tree-children" id="tchildren-${t.id}">
            ${t.contents.length === 0
              ? `<div style="padding:6px 8px 6px 14px;font-size:11px;color:var(--text-3);font-style:italic">콘텐츠 없음</div>`
              : t.contents.map((c, ci) => {
                  const cSelId = 'content-' + c.id;
                  return `
                <div class="tree-child-row ${S.activeContentId===c.id?'active':''}"
                  onclick="fcContentClick(event,'${t.id}','${c.id}')"
                  draggable="true"
                  ondragstart="contentDragStart(event,'${t.id}','${c.id}')"
                  ondragover="event.preventDefault();contentDragOver(event,'${t.id}','${c.id}')"
                  ondragleave="event.currentTarget.classList.remove('drag-over')"
                  ondrop="event.preventDefault();contentDrop('${t.id}','${c.id}')"
                  ondragend="dragCleanup()">
                  ${S.tocEditMode ? `<input type="checkbox" class="toc-check"
                    onclick="event.stopPropagation();toggleTocSelect('${cSelId}')"
                    ${S.selectedTocItems.includes(cSelId)?'checked':''}/>` : ''}
                  <span class="c-ico-sm">${getSmallTypeIcon(c.type)}</span>
                  <span class="c-name" title="${esc(c.title)}">${esc(c.title)}</span>
                </div>`;
                }).join('')
            }
          </div>
        ` : ''}
      </div>
    `;
  }).join('');
}

/* ══════════════════════════════════════════════════════════
   드래그 & 드롭 순서 편집
══════════════════════════════════════════════════════════ */
const DRAG = {};

/* 목차 드래그 */
function tocDragStart(e, tocId) {
  DRAG.type = 'toc';
  DRAG.fromId = tocId;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}
function tocDragOver(toId) {
  if (DRAG.type !== 'toc' || DRAG.fromId === toId) return;
  document.querySelectorAll('.tree-toc-node').forEach(n => n.classList.remove('drag-over'));
  document.getElementById('tnode-' + toId)?.classList.add('drag-over');
}
function tocDragLeave(toId) {
  document.getElementById('tnode-' + toId)?.classList.remove('drag-over');
}
function tocDrop(toId) {
  if (DRAG.type === 'content') {
    // 콘텐츠를 다른 목차 헤더에 드롭 → 해당 목차 맨 끝에 추가
    const fromToc = S.toc.find(t => t.id === DRAG.tocId);
    const toToc = S.toc.find(t => t.id === toId);
    if (!fromToc || !toToc || fromToc === toToc) return;
    const fi = fromToc.contents.findIndex(c => c.id === DRAG.fromId);
    if (fi < 0) return;
    const [item] = fromToc.contents.splice(fi, 1);
    toToc.contents.push(item);
    dragCleanup();
    refreshTocFrame();
    toast('다른 목차로 이동했습니다.', 'success');
    return;
  }
  if (DRAG.type !== 'toc' || DRAG.fromId === toId) return;
  const fi = S.toc.findIndex(t => t.id === DRAG.fromId);
  const ti = S.toc.findIndex(t => t.id === toId);
  if (fi < 0 || ti < 0) return;
  const [item] = S.toc.splice(fi, 1);
  S.toc.splice(ti, 0, item);
  dragCleanup();
  refreshTocFrame();
  toast('순서를 변경했습니다.', 'success');
}

/* 콘텐츠 드래그 (같은 목차 내) */
function contentDragStart(e, tocId, cId) {
  DRAG.type = 'content';
  DRAG.tocId = tocId;
  DRAG.fromId = cId;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => e.target.classList.add('dragging'), 0);
}
function contentDragOver(e, tocId, cId) {
  if (DRAG.type !== 'content' || DRAG.fromId === cId) return;
  document.querySelectorAll('.tree-child-row,.fcontent-row').forEach(r => r.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function contentDrop(tocId, cId) {
  if (DRAG.type !== 'content' || DRAG.fromId === cId) return;
  const fromToc = S.toc.find(t => t.id === DRAG.tocId);
  const toToc = S.toc.find(t => t.id === tocId);
  if (!fromToc || !toToc) return;
  const fi = fromToc.contents.findIndex(c => c.id === DRAG.fromId);
  if (fi < 0) return;
  const [item] = fromToc.contents.splice(fi, 1);
  const ti = toToc.contents.findIndex(c => c.id === cId);
  if (ti < 0) toToc.contents.push(item);
  else toToc.contents.splice(ti, 0, item);
  const moved = fromToc !== toToc;
  dragCleanup();
  refreshTocFrame();
  toast(moved ? '다른 목차로 이동했습니다.' : '순서를 변경했습니다.', 'success');
}

function dragCleanup() {
  DRAG.type = null; DRAG.fromId = null; DRAG.tocId = null;
  document.querySelectorAll('.dragging,.drag-over').forEach(el => {
    el.classList.remove('dragging','drag-over');
  });
}

function toggleTocEditMode() {
  S.tocEditMode = !S.tocEditMode;
  S.selectedTocItems = [];
  const wrap = document.getElementById('tocFrameWrap');
  if (wrap) wrap.innerHTML = renderTocFrame();
}
function toggleTocSelect(id) {
  const idx = S.selectedTocItems.indexOf(id);
  const adding = idx < 0;
  if (adding) S.selectedTocItems.push(id);
  else S.selectedTocItems.splice(idx, 1);

  // 챕터 선택 시 하위 콘텐츠 동시 선택/해제
  if (id.startsWith('toc-')) {
    const tocId = id.slice(4);
    const toc = S.toc.find(t => t.id === tocId);
    if (toc) {
      toc.contents.forEach(c => {
        const cid = 'content-' + c.id;
        const ci = S.selectedTocItems.indexOf(cid);
        if (adding && ci < 0) S.selectedTocItems.push(cid);
        if (!adding && ci >= 0) S.selectedTocItems.splice(ci, 1);
      });
    }
  }

  refreshTocTree();
  const delBtn = document.getElementById('tocDeleteBtn');
  if (delBtn) {
    delBtn.className = `toc-delete-btn${S.selectedTocItems.length>0?' visible':''}`;
    delBtn.innerHTML = `🗑 삭제 (${S.selectedTocItems.length})`;
  }
}
function deleteSelectedTocItems() {
  if (!S.selectedTocItems.length) return;
  S.selectedTocItems.forEach(sid => {
    if (sid.startsWith('toc-')) {
      const id = sid.slice(4);
      S.toc = S.toc.filter(t => t.id !== id);
      if (S.activeTocId === id) S.activeTocId = S.toc[0]?.id || null;
    } else if (sid.startsWith('content-')) {
      const id = sid.slice(8);
      S.toc.forEach(t => { t.contents = t.contents.filter(c => c.id !== id); });
    }
  });
  S.selectedTocItems = [];
  S.tocEditMode = false;
  const wrap = document.getElementById('tocFrameWrap');
  if (wrap) wrap.innerHTML = renderTocFrame();
  toast('선택 항목을 삭제했습니다.');
  updateNavStatus();
}
function toggleTocExpand(id) {
  TOC_EXPANDED[id] = TOC_EXPANDED[id] === false ? true : false;
  refreshTocTree();
}
function expandAllTocTree() {
  S.toc.forEach(t => { TOC_EXPANDED[t.id] = true });
  refreshTocTree();
}
function collapseAllTocTree() {
  S.toc.forEach(t => { TOC_EXPANDED[t.id] = false });
  refreshTocTree();
}
function refreshTocTree() {
  const el = document.getElementById('tocTreeItems');
  if (el) el.innerHTML = renderTocTree();
}

/* ── TOC 이동 ── */
function moveTocUp(idx) {
  if (idx === 0) return;
  [S.toc[idx-1], S.toc[idx]] = [S.toc[idx], S.toc[idx-1]];
  refreshTocFrame(); toast('목차를 위로 이동했습니다.');
}
function moveTocDown(idx) {
  if (idx >= S.toc.length-1) return;
  [S.toc[idx], S.toc[idx+1]] = [S.toc[idx+1], S.toc[idx]];
  refreshTocFrame(); toast('목차를 아래로 이동했습니다.');
}
function deleteToc(id) {
  if (S.toc.length <= 1) { toast('최소 1개 목차가 필요합니다.','warn'); return; }
  S.toc = S.toc.filter(t => t.id !== id);
  if (S.activeTocId === id) S.activeTocId = S.toc[0]?.id || null;
  refreshTocFrame(); toast('목차가 삭제됐습니다.');
}
/* ── 목차명 인라인 편집 ── */
function startRenameToc(id) {
  const span = document.getElementById('tname-'+id);
  if (!span) return;
  const toc = S.toc.find(t=>t.id===id);
  if (!toc) return;
  const input = document.createElement('input');
  input.className = 'tree-name-input';
  input.value = toc.title;
  span.replaceWith(input);
  input.focus(); input.select();
  const save = () => {
    const v = input.value.trim() || toc.title;
    toc.title = v;
    refreshTocFrame();
  };
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.removeEventListener('blur', save); refreshTocFrame(); }
  });
}

/* ── 콘텐츠 이동 ── */
function moveContentUp(tocId, idx) {
  const toc = S.toc.find(t=>t.id===tocId); if (!toc || idx===0) return;
  [toc.contents[idx-1], toc.contents[idx]] = [toc.contents[idx], toc.contents[idx-1]];
  refreshTocFrame(); toast('콘텐츠를 위로 이동했습니다.');
}
function moveContentDown(tocId, idx) {
  const toc = S.toc.find(t=>t.id===tocId); if (!toc || idx>=toc.contents.length-1) return;
  [toc.contents[idx], toc.contents[idx+1]] = [toc.contents[idx+1], toc.contents[idx]];
  refreshTocFrame(); toast('콘텐츠를 아래로 이동했습니다.');
}
function selectContent(tocId, cId) {
  S.activeTocId = tocId;
  S.activeContentId = cId;
  S.contentAddMode = null;
  S.contentEditMode = false;
  refreshTocFrame();
}
let _fcLastClick = {id: null, time: 0};
function fcContentClick(e, tocId, cId) {
  e.stopPropagation();
  const now = Date.now();
  if (_fcLastClick.id === cId && now - _fcLastClick.time < 400) {
    _fcLastClick = {id: null, time: 0};
    openContentEdit(tocId, cId);
  } else {
    _fcLastClick = {id: cId, time: now};
    selectContent(tocId, cId);
  }
}
function openContentEdit(tocId, cId) {
  const toc = S.toc.find(t=>t.id===tocId);
  const c = toc?.contents.find(c=>c.id===cId);
  S.activeTocId = tocId;
  S.activeContentId = cId;
  S.contentAddMode = null;
  S.contentSearch = '';
  S.contentRegTags = [];
  S.contentRegData = null;
  S.contentRegFromPrev = false;
  S.contentPrevSelected = null;
  // 이미 등록된 콘텐츠 → 미리보기 / 신규 → 탭 등록 폼
  S.contentEditMode = c?.registered ? false : true;
  S.contentRegMode = 'new';
  refreshTocFrame();
}
function closeContentEdit() {
  S.activeContentId = null;
  S.contentEditMode = false;
  refreshTocFrame();
}
function enterContentEdit() {
  S.contentEditMode = true;
  refreshTocFrame();
}
function setContentRegMode(mode) {
  S.contentRegMode = mode;
  S.contentSearch = '';
  refreshTocFrame();
}
function addContentRegTag(val) {
  const tag = val.trim().replace(/^#/, '');
  if (!tag || S.contentRegTags.includes(tag) || S.contentRegTags.length >= 10) return;
  S.contentRegTags.push(tag);
  refreshTocFrame();
}
function removeContentRegTag(tag) {
  S.contentRegTags = S.contentRegTags.filter(t => t !== tag);
  refreshTocFrame();
}
function setContentSearch(val) {
  S.contentSearch = val;
  // 검색 결과만 업데이트
  const list = document.getElementById('cregPrevList');
  if (list) list.innerHTML = renderPrevContentList(S.activeContentId);
}
function selectPrevContent(pcId) {
  const pc = PREV_CONTENT_DB.find(p => p.id === pcId);
  if (!pc) return;
  S.contentPrevSelected = pcId;
  S.contentRegData = { title: pc.title, dur: pc.dur || '', sourceId: pc.id };
  S.contentRegFromPrev = true;
  S.contentRegTags = [];
  refreshTocFrame();
}
function backToPrevList() {
  S.contentPrevSelected = null;
  S.contentRegData = null;
  S.contentRegFromPrev = false;
  refreshTocFrame();
}

function registerContent() {
  const toc = S.toc.find(t => t.id === S.activeTocId);
  const c = toc?.contents.find(c => c.id === S.activeContentId);
  if (!c) return;
  const titleEl = document.querySelector('.creg-input[data-creg-title]');
  const formTitle = (titleEl?.value || '').trim() || S.contentRegData?.title || c.title;
  const doRegister = () => {
    c.title = formTitle;
    if (S.contentRegData?.dur) c.dur = S.contentRegData.dur;
    c.registered = true;
    toast(`"${formTitle}" 등록 완료`, 'success');
    S.contentEditMode = false;
    refreshTocFrame();
  };
  if (S.contentRegFromPrev && S.contentRegData) {
    const modified = formTitle !== S.contentRegData.title;
    if (modified) {
      if (confirm('불러온 데이터를 수정하여 등록하시겠습니까?')) doRegister();
      return;
    }
  }
  doRegister();
}
function renderPrevContentList(cId) {
  const toc = S.toc.find(t => t.id === S.activeTocId);
  const c = toc?.contents.find(c => c.id === cId);
  const contentType = c?.type || '';
  const q = (S.contentSearch || '').toLowerCase();
  const items = PREV_CONTENT_DB.filter(p =>
    p.type === contentType && (!q || p.title.toLowerCase().includes(q))
  );
  if (!items.length) {
    return `<div class="creg-prev-empty">일치하는 이전 콘텐츠가 없습니다.</div>`;
  }
  return items.map(p => `
    <div class="creg-prev-item" onclick="selectPrevContent('${p.id}')">
      <div class="creg-prev-thumb">
        ${TYPE_IMG[p.type] ? `<img src="${TYPE_IMG[p.type]}" alt="${p.type}" style="width:26px;height:26px;object-fit:contain;opacity:.6"/>` : ''}
      </div>
      <div class="creg-prev-info">
        <div class="creg-prev-title">${esc(p.title)}</div>
        <div class="creg-prev-meta">${p.type}${p.dur ? ' · ' + p.dur : ''} · ${p.date}</div>
      </div>
    </div>
  `).join('');
}
function updateContentTitle(tocId, cId, val) {
  const toc = S.toc.find(t => t.id === tocId);
  if (!toc) return;
  const c = toc.contents.find(c => c.id === cId);
  if (c) c.title = val.trim() || c.title;
  refreshTocTree();
  // Update the header title in the edit panel without full re-render
  const ctit = document.querySelector('#frameContent .fc-panel:last-child .ctit');
  if (ctit) ctit.textContent = c?.title || '';
}

/* 인라인 콘텐츠 삽입 */
function openInlineInsert(tocId, afterId) {
  const same = S.inlineInsert && S.inlineInsert.tocId === tocId && S.inlineInsert.afterId === afterId;
  S.inlineInsert = same ? null : {tocId, afterId};
  refreshTocFrame();
}
function addContentAt(tocId, afterId, label) {
  const toc = S.toc.find(t => t.id === tocId); if (!toc) return;
  const item = {id:'c'+Date.now(), icon:'', type:label, title:label+' '+(toc.contents.length+1), dur:''};
  if (!afterId || afterId === '__top') {
    toc.contents.unshift(item);
  } else {
    const idx = toc.contents.findIndex(c => c.id === afterId);
    toc.contents.splice(idx + 1, 0, item);
  }
  S.inlineInsert = null;
  refreshTocFrame();
  toast(`${label} 콘텐츠가 추가됐습니다.`, 'success');
  updateNavStatus();
}

let _resizeStartY = 0, _resizeStartH = 0;
function tocResizeStart(e) {
  _resizeStartY = e.clientY;
  _resizeStartH = S.frameHeight;
  document.addEventListener('mousemove', _tocResizeMove);
  document.addEventListener('mouseup', _tocResizeEnd);
  e.preventDefault();
}
function _tocResizeMove(e) {
  const newH = Math.max(200, _resizeStartH + (e.clientY - _resizeStartY));
  S.frameHeight = newH;
  const body = document.getElementById('tocFrameBody');
  if (body) body.style.height = newH + 'px';
}
function _tocResizeEnd() {
  document.removeEventListener('mousemove', _tocResizeMove);
  document.removeEventListener('mouseup', _tocResizeEnd);
}
function selectToc(id) {
  S.activeTocId = id;
  S.activeContentId = null;
  S.contentAddMode = null;
  refreshTocFrame();
}
function addToc() {
  const id = 't'+Date.now();
  S.toc.push({id, title:'새 목차 '+(S.toc.length+1), contents:[]});
  TOC_EXPANDED[id] = true;
  S.activeTocId = id; S.contentAddMode = null; refreshTocFrame();
  toast('목차가 추가됐습니다.','success'); updateNavStatus();
  // 추가 직후 이름 편집 모드 진입
  setTimeout(()=>startRenameToc(id), 80);
}
function openContentAdd(mode) { S.contentAddMode = mode||'upload'; S.inlineInsert = null; refreshTocFrame() }
function closeContentAdd() { S.contentAddMode = null; refreshTocFrame() }
function addContent(label, icon) {
  const toc = S.toc.find(t=>t.id===S.activeTocId); if (!toc) return;
  const newC = {id:'c'+Date.now(), icon, type:label, title:label+' '+(toc.contents.length+1), dur:'', registered:false};
  toc.contents.push(newC);
  closeContentAdd();
  // 신규 콘텐츠는 바로 등록 폼(탭)으로 이동
  S.activeTocId = toc.id;
  S.activeContentId = newC.id;
  S.contentAddMode = null;
  S.contentEditMode = true;
  S.contentRegMode = 'new';
  S.contentRegTags = [];
  S.contentRegData = null;
  S.contentRegFromPrev = false;
  S.contentPrevSelected = null;
  refreshTocFrame();
  updateNavStatus();
}
function removeContent(tocId, cId) {
  const toc = S.toc.find(t=>t.id===tocId); if (!toc) return;
  toc.contents = toc.contents.filter(c=>c.id!==cId);
  refreshTocFrame();
  updateNavStatus();
}
function refreshTocFrame() {
  const wrap = document.getElementById('tocFrameWrap'); if (wrap) wrap.innerHTML = renderTocFrame();
  updateNavStatus();
}

function addOfflineSession(contentId) {
  const sessions = getOfflineSessions(contentId);
  const today = new Date().toISOString().split('T')[0];
  sessions.push({
    id: 'os' + Date.now(),
    name: sessions.length + 1 + '회차',
    date: today, capacity: '10', schedules: []
  });
  refreshOfflineSessions(contentId);
}

function removeOfflineSession(contentId, sessionId) {
  S.offlineSessionMap[contentId] = getOfflineSessions(contentId).filter(s => s.id !== sessionId);
  refreshOfflineSessions(contentId);
}

function toggleOfflineSession(contentId, sessionId) {
  const sess = getOfflineSessions(contentId).find(s => s.id === sessionId);
  if (sess) { sess.expanded = !sess.expanded; refreshOfflineSessions(contentId); }
}

function updateOfflineSessionField(contentId, sessionId, field, value) {
  const sess = getOfflineSessions(contentId).find(s => s.id === sessionId);
  if (sess) sess[field] = value;
}

function addHour(t) {
  if (!t) return '';
  const [h, m] = t.split(':').map(Number);
  return String((h + 1) % 24).padStart(2, '0') + ':' + String(m).padStart(2, '0');
}

function addOfflineSchedule(contentId, sessionId) {
  const sessions = getOfflineSessions(contentId);
  const sess = sessions.find(s => s.id === sessionId);
  if (!sess) return;
  let defaultStart = '09:00', defaultEnd = '10:00';
  if (sess.schedules.length > 0) {
    const prev = sess.schedules[sess.schedules.length - 1];
    defaultStart = prev.endTime || '09:00';
    defaultEnd = addHour(defaultStart);
  } else {
    const sessIdx = sessions.indexOf(sess);
    if (sessIdx > 0) {
      const prevSess = sessions[sessIdx - 1];
      const lastSch = prevSess.schedules[prevSess.schedules.length - 1];
      if (lastSch?.endTime) { defaultStart = lastSch.endTime; defaultEnd = addHour(defaultStart); }
    }
  }
  sess.schedules.push({ id: 'sch' + Date.now(), startTime: defaultStart, endTime: defaultEnd, instructor: '', location: '', notes: '' });
  refreshOfflineSessions(contentId);
}

function removeOfflineSchedule(contentId, sessionId, schedId) {
  const sess = getOfflineSessions(contentId).find(s => s.id === sessionId);
  if (sess) sess.schedules = sess.schedules.filter(s => s.id !== schedId);
  refreshOfflineSessions(contentId);
}

function updateOfflineScheduleField(contentId, sessionId, schedId, field, value) {
  const sess = getOfflineSessions(contentId).find(s => s.id === sessionId);
  const sch = sess?.schedules.find(s => s.id === schedId);
  if (sch) sch[field] = value;
}

function refreshOfflineSessions(contentId) {
  const wrap = document.getElementById('offlineSessionsWrap');
  if (!wrap) return;
  wrap.innerHTML = S.offlineRegisteredMap[contentId]

  return `<div class="oprv-list">${rows}</div>`;

let _oregSelected = null;

function oregClick(ev, el, contentId, sessId, schedId, field, type) {
  ev.stopPropagation();
  if (_oregSelected === el) {
    _oregSelected = null;
    el.classList.remove('oreg-selected');
    oregStartEdit(el, contentId, sessId, schedId, field, type);
  } else {
    if (_oregSelected) _oregSelected.classList.remove('oreg-selected');
    _oregSelected = el;
    el.classList.add('oreg-selected');
  }
}

function oregDblClick(ev, el, contentId, sessId, schedId, field, type) {
  ev.stopPropagation();
  ev.preventDefault();
  if (_oregSelected) { _oregSelected.classList.remove('oreg-selected'); _oregSelected = null; }
  oregStartEdit(el, contentId, sessId, schedId, field, type);
}

function oregStartEdit(el, contentId, sessId, schedId, field, type) {
  el.classList.add('oreg-editing');
  if (field === 'time') {
    const sch = getOfflineSessions(contentId).find(s=>s.id===sessId)?.schedules.find(s=>s.id===schedId);
    if (!sch) return;
    el.innerHTML = `
      <input class="oreg-inline-input" type="time" style="width:90px" value="${esc(sch.startTime)}"
        oninput="updateOfflineScheduleField('${contentId}','${sessId}','${schedId}','startTime',this.value)"/>
      <span style="color:var(--text-3);font-size:12px;flex-shrink:0">~</span>
      <input class="oreg-inline-input" type="time" style="width:90px" value="${esc(sch.endTime)}"
        oninput="updateOfflineScheduleField('${contentId}','${sessId}','${schedId}','endTime',this.value)"/>`;
    const [startInp, endInp] = el.querySelectorAll('input');
    startInp?.focus();
    let moving = false;
    const restore = () => setTimeout(() => {
      if (!moving && !el.contains(document.activeElement)) refreshOfflineSessions(contentId);
    }, 80);
    el.querySelectorAll('input').forEach(i => i.addEventListener('blur', restore));
    endInp?.addEventListener('keydown', e => {
      if (e.key === 'Tab' && !e.shiftKey) {
        e.preventDefault();
        const row = el.closest('.oreg-sched-row');
        if (!row) return;
        const allFields = [...row.querySelectorAll('.oreg-field')];
        const nextField = allFields[allFields.indexOf(el) + 1];
        if (nextField) {
          moving = true;
          const {cid, sid, schid, field: nf, type: nt} = nextField.dataset;
          el.querySelectorAll('input').forEach(i => i.removeEventListener('blur', restore));
          refreshOfflineSessions(contentId);
          setTimeout(() => {
            const freshEl = document.querySelector(`.oreg-field[data-sid="${sid}"][data-schid="${schid||''}"][data-field="${nf}"]`);
            if (freshEl) oregStartEdit(freshEl, cid||contentId, sid, schid||null, nf, nt||'text');
          }, 0);
        }
      }
    });
    return;
  }
  const sess = getOfflineSessions(contentId).find(s=>s.id===sessId);
  const sch = schedId ? sess?.schedules.find(s=>s.id===schedId) : null;
  const currentVal = sch ? (sch[field]||'') : (sess?.[field]||'');
  const input = document.createElement('input');
  input.className = 'oreg-inline-input';
  input.type = type || 'text';
  input.value = currentVal;
  if (type === 'number') input.style.width = '52px';
  if (type === 'date') input.style.width = '130px';
  el.innerHTML = '';
  el.appendChild(input);
  input.focus();
  const saveData = () => {
    if (sch) updateOfflineScheduleField(contentId, sessId, schedId, field, input.value);
    else updateOfflineSessionField(contentId, sessId, field, input.value);
  };
  const save = () => { saveData(); refreshOfflineSessions(contentId); };
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { input.blur(); return; }
    if (e.key === 'Escape') { refreshOfflineSessions(contentId); return; }
    if (e.key === 'Tab') {
      e.preventDefault();
      const row = el.closest('.oreg-sched-row');
      if (row) {
        const allFields = [...row.querySelectorAll('.oreg-field')];
        const curIdx = allFields.indexOf(el);
        const nextField = allFields[curIdx + (e.shiftKey ? -1 : 1)];
        if (nextField) {
          const {cid, sid, schid, field: nf, type: nt} = nextField.dataset;
          input.removeEventListener('blur', save);
          saveData();
          refreshOfflineSessions(contentId);
          setTimeout(() => {
            const freshEl = document.querySelector(`.oreg-field[data-sid="${sid}"][data-schid="${schid||''}"][data-field="${nf}"]`);
            if (freshEl) oregStartEdit(freshEl, cid||contentId, sid, schid||null, nf, nt||'text');
          }, 0);
        } else {
          input.blur();
        }
      } else {
        input.blur();
      }
    }
  });
}

document.addEventListener('click', () => {
  if (_oregSelected) { _oregSelected.classList.remove('oreg-selected'); _oregSelected = null; }
});

const ALL_TYPE_LIST = ['동영상','이미지','아티클','첨부파일','유튜브','외부링크','오프라인','퀴즈','시험','과제','설문','토론'];

function openTypeTooltip(e, tocId, afterId) {
  e.stopPropagation();
  const existing = document.getElementById('typeTooltip');
  if (existing && S.tooltip?.tocId === tocId && S.tooltip?.afterId === afterId) {
    closeTypeTooltip(); return;
  }
  const rect = e.currentTarget.getBoundingClientRect();
  S.tooltip = {tocId, afterId, x: rect.right + 8, y: rect.top - 4};
  renderTypeTooltip();
  document.addEventListener('scroll', closeTypeTooltip, {capture: true, once: true});
}
function closeTypeTooltip() {
  document.removeEventListener('scroll', closeTypeTooltip, {capture: true});
  S.tooltip = null;
  const el = document.getElementById('typeTooltip');
  if (el) el.remove();
}
function addContentFromTooltip(tocId, afterId, label) {
  const toc = S.toc.find(t => t.id === tocId); if (!toc) return;
  const item = {id:'c'+Date.now(), icon:'', type:label, title:label+' '+(toc.contents.length+1), dur:''};
  if (!afterId || afterId === '__top') toc.contents.unshift(item);
  else if (afterId === '__append') toc.contents.push(item);
  else {
    const idx = toc.contents.findIndex(c => c.id === afterId);
    toc.contents.splice(idx + 1, 0, item);
  }
  closeTypeTooltip();
  refreshTocFrame();
  toast(`${label} 콘텐츠가 추가됐습니다.`, 'success');
  updateNavStatus();
}
function renderTypeTooltip() {
  const el = document.getElementById('typeTooltip');
  if (el) el.remove();
  if (!S.tooltip) return;
  const {tocId, afterId, x, y} = S.tooltip;
  const div = document.createElement('div');
  div.id = 'typeTooltip';
  div.className = 'type-tooltip';
  div.style.cssText = `left:${x}px;top:${y}px`;
  div.onclick = e => e.stopPropagation();
  div.innerHTML = `
    <div class="tt-items">
      ${ALL_TYPE_LIST.map(lbl=>`
        <div class="tt-item" onclick="addContentFromTooltip('${tocId}','${afterId}','${lbl}')">
          <div class="tt-ico"><img src="${TYPE_IMG[lbl]||'./images/PDF.png'}" alt="${lbl}"/></div>
          <span>${lbl}</span>
        </div>`).join('')}
    </div>
  `;
  document.body.appendChild(div);
  requestAnimationFrame(()=>{
    const r = div.getBoundingClientRect();
    if (r.bottom > window.innerHeight - 8) div.style.top = Math.max(8, y - r.height) + 'px';
    if (r.right > window.innerWidth - 8) div.style.left = (x - r.width - 16) + 'px';
  });
}

        <div class="open-check-item ${c.ok?'ok':'err'}">

        ? `<span style="font-size:13px;color:var(--success);font-weight:600">✓ 모든 항목이 준비됐습니다</span>`
        : `<span style="font-size:13px;color:var(--danger)">위 오류 항목을 먼저 수정해주세요.</span>`}

   썸네일 크롭 모달

let _thumbDrag = null;

function onThumbFile(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { toast('10MB 이하의 파일만 등록 가능합니다.','error'); return; }
  const reader = new FileReader();
  reader.onload = e => {
    S.courseThumbnail = e.target.result;
    S.thumbPos = {x:50, y:50};
    S.thumbZoom = 100;
    input.value = '';
    openThumbModal();
  };
  reader.readAsDataURL(file);
}

function openThumbModal() {
  if (!S.courseThumbnail) return;
  if (document.getElementById('thumbModalBackdrop')) return;

  let posX = S.thumbPos.x, posY = S.thumbPos.y, zoom = S.thumbZoom;

  const bd = document.createElement('div');
  bd.id = 'thumbModalBackdrop';
  bd.className = 'thumb-modal-backdrop';
  bd.innerHTML = `
    <div class="thumb-modal" onclick="event.stopPropagation()">
      <div class="thumb-modal-title">
        <span>썸네일 위치·크기 조절</span>
        <span style="font-size:12px;color:var(--text-3);font-weight:400">드래그로 위치 조절</span>
      </div>
      <div class="thumb-crop-frame" id="thumbCropFrame">
        <img id="thumbCropImg" class="thumb-crop-img" src="${S.courseThumbnail}" draggable="false"/>
      </div>
      <div class="thumb-modal-controls">
        <div class="thumb-zoom-row">
          <span class="thumb-zoom-lbl">크기</span>
          <input type="range" class="thumb-zoom-slider" id="thumbZoomSlider" min="100" max="200" value="${zoom}"
            oninput="document.getElementById('thumbZoomVal').textContent=this.value+'%';_applyThumbTransform(${posX},${posY},+this.value)"/>
          <span class="thumb-zoom-val" id="thumbZoomVal">${zoom}%</span>
        </div>
      </div>
      <div class="thumb-modal-actions">
        <button class="thumb-reset-btn" onclick="resetThumb()">초기화</button>
        <button class="thumb-reupload-btn" onclick="document.getElementById('thumbFileInput').click()">
          ✎ 다른 파일
        </button>
        <button class="btn" onclick="closeThumbModal(false)">취소</button>
        <button class="btn btn-brand" onclick="applyThumbModal()">적용</button>
      </div>
    </div>`;
  document.body.appendChild(bd);
  bd.addEventListener('click', () => closeThumbModal(false));

  // 초기 렌더
  requestAnimationFrame(() => _applyThumbTransform(posX, posY, zoom));

  // 드래그
  const frame = document.getElementById('thumbCropFrame');
  let startX, startY, startPosX, startPosY;
  frame.addEventListener('mousedown', e => {
    e.preventDefault();
    startX = e.clientX; startY = e.clientY;
    startPosX = posX; startPosY = posY;
    _thumbDrag = true;
    const onMove = e2 => {
      if (!_thumbDrag) return;
      const fr = frame.getBoundingClientRect();
      const dx = (e2.clientX - startX) / fr.width  * -100;
      const dy = (e2.clientY - startY) / fr.height * -100;
      posX = Math.max(0, Math.min(100, startPosX + dx));
      posY = Math.max(0, Math.min(100, startPosY + dy));
      const z = +document.getElementById('thumbZoomSlider').value;
      _applyThumbTransform(posX, posY, z);
    };
    const onUp = () => { _thumbDrag = false; document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });

  // 슬라이더가 posX/Y 갱신할 수 있도록 클로저로 연결
  document.getElementById('thumbZoomSlider').addEventListener('input', function() {
    zoom = +this.value;
    document.getElementById('thumbZoomVal').textContent = zoom + '%';
    _applyThumbTransform(posX, posY, zoom);
  });

  bd._getPos = () => ({x: posX, y: posY, z: +document.getElementById('thumbZoomSlider').value});
}

function _applyThumbTransform(px, py, z) {
  const img = document.getElementById('thumbCropImg');
  const frame = document.getElementById('thumbCropFrame');
  if (!img || !frame) return;
  const fw = frame.clientWidth, fh = frame.clientHeight;
  const scale = z / 100;
  // 이미지 원본 비율 유지하며 frame 꽉 채우는 base size 계산
  const baseW = fw * scale, baseH = fh * scale;
  img.style.width  = baseW + 'px';
  img.style.height = baseH + 'px';
  img.style.left = ((fw - baseW) * (px / 100)) + 'px';
  img.style.top  = ((fh - baseH) * (py / 100)) + 'px';
}

function applyThumbModal() {
  const bd = document.getElementById('thumbModalBackdrop');
  if (!bd) return;
  const {x, y, z} = bd._getPos();
  S.thumbPos = {x, y};
  S.thumbZoom = z;
  document.body.removeChild(bd);
  refreshThumbPreview();
  updateNavStatus();
}

function closeThumbModal(apply) {
  const bd = document.getElementById('thumbModalBackdrop');
  if (bd) document.body.removeChild(bd);
  if (!apply) refreshThumbPreview();
}

function resetThumb() {
  S.courseThumbnail = null;
  S.thumbPos = {x:50, y:50};
  S.thumbZoom = 100;
  const bd = document.getElementById('thumbModalBackdrop');
  if (bd) document.body.removeChild(bd);
  refreshThumbPreview();
  updateNavStatus();
}

function refreshThumbPreview() {
  const el = document.getElementById('thumbPreview');
  if (!el) return;
  if (S.courseThumbnail) {
    el.onclick = openThumbModal;
    el.innerHTML = `
      <img class="s5-thumb-img" src="${S.courseThumbnail}"
        style="object-fit:cover;width:100%;height:100%;
               transform:scale(${S.thumbZoom/100});
               transform-origin:${S.thumbPos.x}% ${S.thumbPos.y}%;
               object-position:${S.thumbPos.x}% ${S.thumbPos.y}%"/>
      <div class="s5-thumb-overlay">
        <div class="s5-thumb-overlay-icon">✎</div>
        <div class="s5-thumb-overlay-txt">위치 조절</div>
      </div>`;
  } else {
    el.onclick = () => document.getElementById('thumbFileInput').click();
    el.innerHTML = `<div class="s5-thumb-plus">+</div><span>이미지 추가</span>`;
  }
}

function toast(msg,type='') {
  const el=document.createElement('div'); el.className='toast '+(type||''); el.textContent=msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(()=>{el.style.cssText='opacity:0;transition:opacity .3s';setTimeout(()=>el.remove(),300)},2400);
}

function openModal(title,body,actionLabel,onAction) {
  document.getElementById('mTitle').textContent=title;
  document.getElementById('mBody').textContent=body;

    <button class="btn" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="(${onAction.toString()})()">${actionLabel}</button>`;
  document.getElementById('modalMask').classList.add('open');
}

(function(){ const s=localStorage.getItem('lm-theme')||'light'; document.documentElement.setAttribute('data-theme',s);
  const b=document.getElementById('themeBtn'); if(b)b.textContent=s==='dark'?'☀️ 라이트모드':'🌙 다크모드'; })();

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
</script>
