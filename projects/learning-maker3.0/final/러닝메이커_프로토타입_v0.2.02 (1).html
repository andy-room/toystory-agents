  }
  .action-btn:hover { background: #f1f2f4; color: var(--text); }
  .action-btn .ic { font-size: 16px; height: 18px; display: inline-flex; align-items: center; justify-content: center; }
  .action-btn .lbl { font-size: 11px; color: var(--text-2); white-space: nowrap; }
  .action-btn:hover .lbl { color: var(--text); }
  .action-btn.highlight { color: var(--brand-strong); }
  .action-btn.highlight .ic { color: var(--brand-strong); font-weight: 800; }
  .action-btn.highlight .lbl { color: var(--brand-strong); font-weight: 700; }
  .action-btn.highlight:hover { background: var(--brand-soft); }

  /* 커리큘럼 행의 '콘텐츠 수정' 아이콘 박스 — 배경 없는 아이콘 버튼 + 호버 툴팁 */
  .action-btn.btn-edit-icon {
    position: relative;
    background: transparent;
    border-radius: 6px;
    min-width: 36px;
    padding: 6px 8px;
    color: var(--blue);
  }
  .action-btn.btn-edit-icon:hover { background: #f1f2f4; color: var(--blue); }
  .action-btn.btn-edit-icon .ic {
    color: var(--blue);
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .action-btn.btn-edit-icon .ic svg { width: 20px; height: 20px; display: block; }
  .action-btn.btn-edit-icon .lbl { display: none; }
  .action-btn.btn-edit-icon::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: #fff; color: var(--text-2);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 10px; font-size: 11px; font-weight: 500; white-space: nowrap;
    box-shadow: var(--shadow-sm);
    opacity: 0; pointer-events: none; transition: opacity .12s ease;
    z-index: 5;
  }
  .action-btn.btn-edit-icon::before {
    content: '';
    position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent; border-top-color: #fff;
    margin-bottom: -4px;
    opacity: 0; pointer-events: none; transition: opacity .12s ease;
    filter: drop-shadow(0 1px 0 var(--border));
    z-index: 5;
  }
  .action-btn.btn-edit-icon:hover::after,
  .action-btn.btn-edit-icon:hover::before { opacity: 1; }

  /* 회색 아이콘 전용 버튼 + 호버 툴팁 — 복사·삭제·일정등록 등 통일용 */
  .action-btn.btn-icon-tip {
    position: relative;
    background: transparent;
    border-radius: 6px;
    min-width: 36px;
    padding: 6px 8px;
    color: var(--text-2);
  }
  .action-btn.btn-icon-tip:hover { background: #f1f2f4; color: var(--text); }
  .action-btn.btn-icon-tip .ic {
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .action-btn.btn-icon-tip .ic svg { width: 20px; height: 20px; display: block; }
  .action-btn.btn-icon-tip .lbl { display: none; }
  .action-btn.btn-icon-tip::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: #fff; color: var(--text-2);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 10px; font-size: 11px; font-weight: 500; white-space: nowrap;
    box-shadow: var(--shadow-sm);
    opacity: 0; pointer-events: none; transition: opacity .12s ease;
    z-index: 5;
  }
  .action-btn.btn-icon-tip::before {
    content: '';
    position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent; border-top-color: #fff;
    margin-bottom: -4px;
    opacity: 0; pointer-events: none; transition: opacity .12s ease;
    filter: drop-shadow(0 1px 0 var(--border));
  }
  .action-btn.btn-icon-tip:hover::after,
  .action-btn.btn-icon-tip:hover::before { opacity: 1; }

  /* 라벨 좌측에 아이콘이 붙는 버튼 */
  .btn.btn-with-icon { display: inline-flex; align-items: center; gap: 6px; }
  .btn.btn-with-icon .btn-ic { display: inline-flex; align-items: center; justify-content: center; }
  .btn.btn-with-icon .btn-ic svg { width: 16px; height: 16px; display: block; }

  /* 상단 아이콘 전용 버튼(btn-icon-only) 호버 툴팁 — '수정' 호버 패턴과 동일 */
  .btn.btn-icon-only[data-tip] { position: relative; }
  .btn.btn-icon-only[data-tip]::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: #fff; color: var(--text-2);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 10px; font-size: 11px; font-weight: 500; white-space: nowrap;
    box-shadow: var(--shadow-sm);
    opacity: 0; pointer-events: none; transition: opacity .12s ease;
    z-index: 5;
  }
  .btn.btn-icon-only[data-tip]::before {
    content: '';
    position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent; border-top-color: #fff;
    margin-bottom: -4px;
    opacity: 0; pointer-events: none; transition: opacity .12s ease;
    filter: drop-shadow(0 1px 0 var(--border));
  }
  .btn.btn-icon-only[data-tip]:hover::after,
  .btn.btn-icon-only[data-tip]:hover::before { opacity: 1; }

  /* 순서편집 모드: 아이콘 전용 표시 + 호버 툴팁 (커리큘럼 화면의 '수정' 호버 패턴) */
  .reorder-on .action-btn {
    position: relative;
    background: transparent;
    border-radius: 6px;
    min-width: 36px;
    padding: 6px 8px;
    color: var(--text-2);
  }
  .reorder-on .action-btn:hover { background: #f1f2f4; color: var(--text); }
  .reorder-on .action-btn .ic {
    width: 22px; height: 22px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .reorder-on .action-btn .ic svg { width: 20px; height: 20px; display: block; }
  .reorder-on .action-btn .lbl { display: none; }
  .reorder-on .action-btn[data-tip]::after {
    content: attr(data-tip);
    position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
    background: #fff; color: var(--text-2);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 4px 10px; font-size: 11px; font-weight: 500; white-space: nowrap;
    box-shadow: var(--shadow-sm);
    opacity: 0; pointer-events: none; transition: opacity .12s ease;
    z-index: 5;
  }
  .reorder-on .action-btn[data-tip]::before {
    content: '';
    position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
    border: 5px solid transparent; border-top-color: #fff;
    margin-bottom: -4px;
    opacity: 0; pointer-events: none; transition: opacity .12s ease;
    filter: drop-shadow(0 1px 0 var(--border));
  }
  .reorder-on .action-btn[data-tip]:hover::after,
  .reorder-on .action-btn[data-tip]:hover::before { opacity: 1; }

  /* 목차 행의 '추가' 아이콘 버튼 — 호버 시 드롭다운(목차 콘텐츠 추가 / 콘텐츠명 추가)
     단독 사용도 가능 — 미등록 콘텐츠 행의 '콘텐츠 추가' 진입점 */
  .toc-add { position: relative; display: inline-flex; align-items: stretch; }
  .add-btn-icon {
    background: transparent; border: 0; cursor: pointer;
    padding: 6px 4px; border-radius: 6px;
    min-width: 44px;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--text);
  }
  .add-btn-icon:hover { background: #f1f2f4; }
  .add-btn-icon svg { width: 22px; height: 22px; display: block; }
  /* 버튼과 메뉴 사이의 간격을 호버 영역에 포함시키기 위한 투명 패드 */
  .toc-add .add-pop {
    display: none;
    position: absolute; top: 100%; right: 0;
    margin-top: 6px;
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    box-shadow: var(--shadow-md); z-index: 30; min-width: 168px; padding: 6px;
  }
  .toc-add:hover .add-pop,
  .toc-add:focus-within .add-pop { display: block; }
  /* 메뉴 위로 마우스가 부드럽게 이동할 수 있도록 호버 영역 확장 */
  .toc-add::after {
    content: ''; position: absolute; top: 100%; right: 0; width: 100%; height: 8px;
    pointer-events: none;
  }
  .toc-add:hover::after { pointer-events: auto; }
  .toc-add .add-pop button {
    display: flex; align-items: center; gap: 10px; width: 100%;
    background: none; border: 0; padding: 9px 12px; border-radius: 6px;
    font-size: 13px; color: var(--text-2); cursor: pointer; text-align: left; white-space: nowrap;
  }
  .toc-add .add-pop button:hover { background: var(--brand-soft); color: var(--brand-strong); }
  .toc-add .add-pop button .ic {
    font-size: 15px; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; flex: 0 0 auto;
  }
  .toc-add .add-pop button .ic svg { display: block; }

  /* 행 끝 '더보기(케밥)' 메뉴 — 기본 모드에서 삭제 버튼을 감쌈 */
  .kebab-menu { position: relative; display: inline-flex; align-items: stretch; }
  .kebab-btn { min-width: 28px !important; padding: 6px 4px !important; }
  .kebab-btn .ic {
    font-size: 18px; letter-spacing: 1px; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .kebab-pop {
    display: none; position: absolute; top: calc(100% + 4px); right: 0;
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    box-shadow: var(--shadow-md); z-index: 30; min-width: 124px; padding: 4px;
  }
  .kebab-menu.open .kebab-pop { display: block; }
  .kebab-item {
    display: flex; align-items: center; gap: 8px; width: 100%;
    background: none; border: 0; padding: 8px 12px; border-radius: 6px;
    font-size: 13px; color: var(--text-2); cursor: pointer; text-align: left;
    white-space: nowrap;
  }
  .kebab-item:hover { background: var(--brand-soft); color: var(--brand-strong); }
  .kebab-item .ic { font-size: 14px; line-height: 1; display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; }
  .kebab-item .ic svg { width: 16px; height: 16px; display: block; }

  /* 콘텐츠 아이템 (toc-child) */
  .toc-children {
    display: none; padding: 0 18px 6px 44px; background: #fff;
    position: relative;
  }
  /* 모듈 헤더와 콘텐츠 목록 사이의 점선 구분선 */
  .toc-item.expanded > .toc-children::before {
    content: ''; position: absolute; top: 0; left: 18px; right: 18px;
    border-top: 1px dashed var(--border); pointer-events: none;
  }
  .toc-item.expanded > .toc-children { display: block; }
  .toc-child {
    position: relative;
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 8px; align-items: center; padding: 10px 0;
    background: #fff;
  }
  .toc-child.no-type {
    grid-template-columns: auto 1fr auto;
  }
  /* 하위 콘텐츠 사이 점선 구분선 (각 콘텐츠 영역 분리) */
  .toc-child:not(:last-child)::after {
    content: ''; position: absolute; bottom: 0; right: 0; left: 0;
    border-bottom: 1px dashed var(--border); pointer-events: none;
  }
  /* 신규 콘텐츠 유형 블록: 번호 + (아이콘 위 / 라벨 아래) */
  .toc-child .type-label-badge {
    display: inline-flex; align-items: center; gap: 6px;
    white-space: nowrap;
    justify-self: start;
  }
  .toc-child .type-label-badge .cn-num {
    color: var(--text-3); font-weight: 500; font-size: 12.5px;
    min-width: 14px; text-align: right;
    align-self: center;
  }
  .toc-child .type-label-badge .cn-stack {
    display: inline-flex; flex-direction: column; align-items: center;
    gap: 2px; min-width: 44px;
  }
  .toc-child .type-label-badge .cn-ic {
    font-size: 20px; line-height: 1;
    display: inline-flex; align-items: center; justify-content: center;
    height: 22px;
  }
  .toc-child .type-label-badge .cn-lbl {
    font-size: 11px; color: var(--text-2); font-weight: 500;
    line-height: 1.2;
  }
  .toc-child .type-label-badge.is-empty .cn-lbl {
    color: var(--text-3);
  }
  /* idx 호환 (편집/리오더 모드 등) */
  .toc-child .idx { font-size: 13px; color: var(--text-3); text-align: center; font-weight: 500; }
  .toc-child .type-block { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .toc-child .type-icon {
    width: 32px; height: 32px; border-radius: 6px;
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff; font-size: 15px; line-height: 1;
  }
  .toc-child .type-icon.t-discussion { background: #ef4444; }
  .toc-child .type-icon.t-photo { background: #3b82f6; }
  .toc-child .type-icon.t-video { background: #ef4444; }
  .toc-child .type-icon.t-micro { background: #2563eb; }
  .toc-child .type-icon.t-quiz { background: #8b5cf6; }
  .toc-child .type-icon.t-doc { background: #f59e0b; }
  .toc-child .type-icon.t-article { background: #14b8a6; }
  .toc-child .type-icon.t-empty {
    background: #f5f6f8; border: 1px dashed #cbd5e1;
    color: transparent;
  }
  .toc-child .type-label {
    display: inline-flex; align-items: center;
    font-size: 11px; color: var(--text-2);
  }
  .toc-child .title-block { min-width: 0; padding-left: 0; }
  .toc-child .title-block .ttl { font-size: 14px; color: var(--text); line-height: 1.4; }
  /* 콘텐츠가 등록 완료된 하위 목차는 제목을 굵게 강조 */
  .toc-child.is-registered .title-block .ttl { font-weight: 700; }

  /* 하위 목차에 연결된 콘텐츠 표시 */
  .child-contents {
    display: flex; flex-direction: column; gap: 4px;
    margin-top: 6px;
  }
  .content-chip {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 12px; line-height: 1.4; color: var(--text-2);
    min-width: 0;
  }
  .content-chip .cc-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 4px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    font-size: 11px; font-weight: 600;
    flex-shrink: 0;
  }
  .content-chip .cc-badge .cc-ic { font-size: 11px; line-height: 1; }
  .content-chip .cc-name {
    color: var(--text-2);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    min-width: 0;
  }
  .content-chip .cc-name .cc-sep { margin: 0 4px; color: var(--text-3); }
  .content-chip .cc-name .cc-src { color: var(--text-3); }
  .toc-child .child-actions { display: flex; align-items: stretch; gap: 2px; }
  .toc-child .child-actions .action-btn { min-width: 44px; padding: 6px 4px; }

  /* ------------ 콘텐츠 수정 페이지 ------------ */
  .ce-meta {
    display: flex; flex-direction: column; gap: 0;
    border: 1px solid var(--border); border-radius: 8px;
    background: #fff;
  }
  .ce-meta .ce-row {
    display: grid; grid-template-columns: 140px 1fr;
    gap: 16px; align-items: center; padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .ce-meta .ce-row:last-child { border-bottom: 0; }
  .ce-meta .ce-key { color: var(--text-2); font-size: 13px; font-weight: 600; }
  .ce-meta .ce-val { color: var(--text); font-size: 14px; display: inline-flex; align-items: center; gap: 8px; }
  .ce-meta .ce-input {
    width: 100%; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 6px; font-size: 14px; color: var(--text); background: #fff;
    outline: none;
  }
  .ce-meta .ce-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
  .ce-meta .ce-type-ic { font-size: 18px; line-height: 1; }
  .ce-meta .ce-type-name { font-weight: 500; }
  .badge-on {
    display: inline-flex; align-items: center; padding: 2px 8px;
    border-radius: 999px; background: #d1fae5; color: #047857;
    font-size: 11px; font-weight: 600;
  }
  .ce-section-title { margin: 24px 0 12px; font-size: 14px; font-weight: 700; color: var(--text); }
  .ce-content-list {
    display: flex; flex-direction: column; gap: 0;
    border: 1px solid var(--border); border-radius: 8px;
    background: #fff; overflow: hidden;
  }
  .ce-content-item {
    display: grid; grid-template-columns: 110px 1fr auto;
    gap: 16px; align-items: center; padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }
  .ce-content-item:last-child { border-bottom: 0; }
  .ce-ci-type {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--text-2); font-size: 12px; font-weight: 500;
  }
  .ce-ci-ic { font-size: 18px; line-height: 1; }
  .ce-ci-lbl { padding: 2px 8px; border: 1px solid var(--border); border-radius: 4px; }
  .ce-ci-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .ce-ci-src { font-size: 12px; color: var(--text-3); margin-top: 2px; }
  .ce-ci-actions { display: flex; gap: 4px; }
  .ce-footer {
    margin-top: 24px; padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; justify-content: flex-end;
  }
  .toc-child .child-title-input,
  .single-main-card .child-title-input {
    width: 100%; padding: 7px 10px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 13px; outline: none;
    color: var(--text); background: #fff;
    transition: border-color .15s, box-shadow .15s;
  }
  .toc-child .child-title-input:focus,
  .single-main-card .child-title-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
  .toc-child.child-editing { background: #fff8ec; }
  /* 우측 드로어가 열려 편집 중인 카드 강조 — 사전/사후학습, 마이크로러닝 메인/부가자료 공통 */
  .toc-child.is-editing-target { background: #fff7e0; box-shadow: inset 3px 0 0 0 var(--brand); }
  .single-main-card.is-editing-target {
    background: #fff7e0;
    border-color: var(--brand);
    box-shadow: inset 3px 0 0 0 var(--brand), 0 4px 12px -4px rgba(249, 115, 22, .18);
  }

  /* ------------ Drag & Drop ------------ */
  .toc-item[draggable="true"] > .toc-row { cursor: grab; }
  .toc-child[draggable="true"] { cursor: grab; }
  .toc-item.dragging, .toc-child.dragging { opacity: 0.35; }
  .toc-item.drop-above { box-shadow: 0 -3px 0 0 var(--brand); }
  .toc-item.drop-below { box-shadow: 0 3px 0 0 var(--brand); }
  .toc-item.drop-into { outline: 2px solid var(--brand); outline-offset: -2px; }
  .toc-item.drop-into > .toc-row { background: var(--brand-soft); }
  /* 사이드 패널에서 목차/콘텐츠 클릭 시 본문 항목 강조 (1.5s) */
  @keyframes tocScrollHighlight {
    0%   { box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.55); }
    70%  { box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.30); }
    100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); }
  }
  .toc-scroll-highlight { animation: tocScrollHighlight 1.5s ease-out; border-radius: 8px; }
  .toc-child.drop-above { box-shadow: inset 0 3px 0 0 var(--brand); }
  .toc-child.drop-below { box-shadow: inset 0 -3px 0 0 var(--brand); }
  .toc-empty-children {
    padding: 18px 22px; color: var(--text-3); font-size: 13px;
    text-align: left;
  }

  /* ------------ Inline Inserter (목차/콘텐츠 사이 추가) ------------ */
  /* 인서터가 토픽 사이 간격을 만들기 위해, toc-item의 기본 margin을 제거 */
  #toc-list .toc-item { margin-bottom: 0; }
  /* 순서편집 모드: 인서터(14px)가 상위목차 간 시각적 간격을 담당하므로 margin 제거 */
  #toc-list.reorder-on .toc-item { margin-bottom: 0; }
  .toc-inserter {
    position: relative;
    height: 14px;
    margin: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 4;
  }
  .toc-children > .toc-inserter { height: 12px; }
  .toc-inserter::before {
    content: '';
    position: absolute; left: 8px; right: 8px; top: 50%;
    height: 2px; margin-top: -1px;
    background: var(--brand);
    border-radius: 2px;
    opacity: 0;
    transition: opacity .15s;
    pointer-events: none;
  }
  .toc-inserter:hover::before,
  .toc-inserter.active::before { opacity: 1; }
  .toc-inserter .add-btn {
    position: relative; z-index: 1;
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--brand); color: #fff;
    font-size: 16px; font-weight: 700; line-height: 1;
    border: 0; cursor: pointer; padding: 0;
    align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(37,99,235,.35);
    opacity: 0;
    transform: scale(.6);
    transition: opacity .12s, transform .12s;
    display: inline-flex;
  }
  .toc-inserter:hover .add-btn,
  .toc-inserter.active .add-btn { opacity: 1; transform: scale(1); }

  /* 인서터 팝오버 — + 버튼 바로 아래 가로 2행 펼치기 */
  #toc-inserter-pop {
    position: absolute;
    display: none;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 12px 32px rgba(15,23,42,.18);
    padding: 10px 12px;
    z-index: 1000;
    max-width: calc(100vw - 24px);
  }
  #toc-inserter-pop.open { display: block; }
  #toc-inserter-pop .row {
    display: flex; flex-wrap: wrap; align-items: center;
    gap: 4px;
  }
  #toc-inserter-pop .row + .row { margin-top: 6px; }
  #toc-inserter-pop .row.row-uploads {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 4px;
  }
  #toc-inserter-pop .row.row-uploads .opt {
    justify-content: flex-start;
  }
  #toc-inserter-pop .row-sep {
    height: 1px; background: var(--border);
    margin: 8px -4px;
  }
  #toc-inserter-pop .opt {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text);
    user-select: none;
    white-space: nowrap;
    line-height: 1.2;
  }
  #toc-inserter-pop .opt:hover {
    background: var(--brand-soft);
    color: var(--brand-strong);
  }
  #toc-inserter-pop .opt .ic {
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 14px;
    line-height: 1;
    flex-shrink: 0;
  }
  #toc-inserter-pop .opt .ic svg {
    width: 14px; height: 14px;
  }
  #toc-inserter-pop .opt.opt-library .ic { color: #14b8a6; }
  #toc-inserter-pop .opt.opt-prev .ic { color: #6366f1; }
  #toc-inserter-pop .opt.opt-divider .ic { color: #fbbf24; }
  #toc-inserter-pop .opt.opt-merge .ic { color: var(--text-2); }

  /* ------------ 순서편집 모드 ------------ */
  .reorder-actions-bar {
    display: flex; justify-content: flex-end; gap: 8px; padding: 36px 0 2px;
  }
  .reorder-actions-bar.reorder-actions-split {
    justify-content: space-between; align-items: center; flex-wrap: wrap;
    position: sticky; top: calc(var(--header-h) + 16px); z-index: 20;
    background: #fff; padding: 16px 0 10px;
    border-bottom: 1px solid var(--border);
  }
  .reorder-actions-left,
  .reorder-actions-right {
    display: flex; align-items: center; gap: 8px;
  }
  .reorder-actions-left .btn[disabled] { opacity: 0.45; cursor: not-allowed; }
  .reorder-actions-left .sel-count { font-weight: 600; }
  .reorder-actions-bar .btn .btn-ic {
    display: inline-flex; align-items: center; justify-content: center;
    width: 16px; height: 16px; margin-right: 4px; vertical-align: -3px;
  }
  .reorder-actions-bar .btn .btn-ic svg { width: 16px; height: 16px; display: block; }
  /* 순서편집 모드 체크박스 영역 */
  .toc-item .bulk-chk-wrap { display: inline-flex; align-items: center; margin-right: 6px; }
  .toc-child .bulk-chk-wrap { display: flex; align-items: center; }
  .toc-child.reorder-on.has-chk,
  .toc-child.reorder-on.has-chk.no-type { grid-template-columns: 28px 24px auto 1fr auto; }
  /* 계층이동 - 우측 슬라이드 패널 */
  .move-target-list {
    display: flex; flex-direction: column; gap: 6px;
    padding: 4px 0;
  }
  .move-target-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; background: #fff;
  }
  .move-target-item:hover { background: #f8fafc; }
  .move-target-item .mt-title { font-weight: 600; }
  .move-target-item .mt-meta { color: var(--text-2); font-size: 12px; margin-left: auto; }
  .move-target-item .mt-move-btn {
    padding: 0 12px; height: 30px; border: 0; border-radius: 6px;
    background: #fb923c; color: #fff; font-weight: 600; font-size: 13px;
    cursor: pointer; white-space: nowrap;
  }
  .move-target-item .mt-move-btn:hover { background: #f97316; }
  .move-target-empty {
    padding: 24px; text-align: center; color: var(--text-2);
    border: 1px dashed var(--border); border-radius: 8px;
  }
  /* 우측 슬라이드 패널 */
  .move-panel-backdrop {
    position: fixed; inset: 0; background: rgba(15, 23, 42, 0.35);
    z-index: 1000; opacity: 0; pointer-events: none;
    transition: opacity .18s ease;
  }
  .move-panel-backdrop.is-open { opacity: 1; pointer-events: auto; }
  .move-panel {
    position: fixed; top: 0; right: 0; bottom: 0; width: 420px; max-width: 92vw;
    background: #fff; box-shadow: -8px 0 24px rgba(15, 23, 42, 0.12);
    z-index: 1001; transform: translateX(100%);
    transition: transform .22s ease;
    display: flex; flex-direction: column;
  }
  .move-panel.is-open { transform: translateX(0); }
  .move-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .move-panel-header h3 { margin: 0; font-size: 16px; font-weight: 700; color: var(--text-1); }
  .move-panel-close {
    width: 32px; height: 32px; border: 0; background: transparent;
    border-radius: 6px; cursor: pointer; color: var(--text-2);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 20px; line-height: 1;
  }
  .move-panel-close:hover { background: #f1f5f9; color: var(--text-1); }
  .move-panel-body {
    padding: 16px 20px; flex: 1; overflow-y: auto;
  }
  .move-panel-body > p { margin: 0 0 12px; color: var(--text-2); font-size: 13px; }
  .move-panel-section {
    margin-top: 18px; padding-top: 16px; border-top: 1px dashed var(--border);
  }
  .move-panel-section:first-of-type { margin-top: 0; padding-top: 0; border-top: 0; }
  .move-panel-section-title {
    font-size: 13px; font-weight: 700; color: var(--text-1);
    margin-bottom: 8px; display: flex; align-items: center; gap: 6px;
  }
  .move-panel-section-title::before {
    content: ''; display: inline-block; width: 4px; height: 14px;
    background: #fb923c; border-radius: 2px;
  }
  .move-new-toc-row {
    display: flex; gap: 8px; align-items: stretch;
  }
  .move-new-toc-row input[type="text"] {
    flex: 1; min-width: 0; padding: 8px 12px; height: 36px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; color: var(--text-1);
  }
  .move-new-toc-row input[type="text"]:focus {
    outline: none; border-color: #2563eb; box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.15);
  }
  .move-new-toc-row .btn-move-new {
    padding: 0 14px; height: 36px; border: 0; border-radius: 8px;
    background: #fb923c; color: #fff; font-weight: 600; cursor: pointer;
    white-space: nowrap;
  }
  .move-new-toc-row .btn-move-new:hover { background: #f97316; }
  .move-new-toc-row .btn-move-new:disabled {
    background: #e2e8f0; color: #94a3b8; cursor: not-allowed;
  }
  .move-panel-footer {
    padding: 12px 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: flex-end; gap: 8px;
    flex-shrink: 0;
  }
  .move-panel-footer .btn-primary {
    padding: 0 16px; height: 36px; border: 0; border-radius: 8px;
    background: #fb923c; color: #fff; font-weight: 600; cursor: pointer;
  }
  .move-panel-footer .btn-primary:hover { background: #f97316; }
  .move-panel-footer .btn-ghost {
    padding: 0 16px; height: 36px; border: 1px solid var(--border);
    border-radius: 8px; background: #fff; color: var(--text-1);
    font-weight: 600; cursor: pointer;
  }
  .move-panel-footer .btn-ghost:hover { background: #f8fafc; }
  .reorder-handle {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 32px; color: #94a3b8; cursor: grab;
    font-size: 18px; line-height: 1; user-select: none; letter-spacing: -2px;
  }
  .reorder-handle:active { cursor: grabbing; color: var(--text-2); }
  .move-stack {
    display: inline-flex; flex-direction: column; align-items: stretch;
    border: 1px solid var(--border); border-radius: 6px;
    overflow: hidden; background: #fff;
  }
  .move-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 30px; height: 22px; padding: 0;
    background: #fff; border: 0; cursor: pointer;
    color: #111827; font-size: 13px; line-height: 1; font-weight: 600;
  }
  .move-btn svg { width: 14px; height: 14px; display: block; }
  .move-btn + .move-btn { border-top: 1px solid var(--border); }
  .move-btn:hover:not(:disabled) { background: #f1f2f4; color: #000; }
  .move-btn:active:not(:disabled) { background: #e6e8eb; }
  .move-btn:disabled { color: #d1d5db; cursor: default; background: #fff; }
  .toc-row .rhs.reorder-rhs { gap: 10px; }
  /* 순서편집 모드 액션 버튼 — 일정한 간격으로 우측 정렬 (행마다 보이는 버튼만 우측 끝부터 모임) */
  .reorder-on .toc-row .rhs.reorder-rhs,
  .toc-child.reorder-on .child-actions {
    display: flex;
    align-items: center;
    gap: 6px;
    justify-content: flex-end;
  }
  .reorder-on .toc-row .rhs.reorder-rhs .action-btn,
  .toc-child.reorder-on .child-actions .action-btn {
    min-width: 0; padding: 6px 4px;
  }
  .reorder-on .reorder-rhs .move-stack,
  .toc-child.reorder-on .child-actions .move-stack { margin-left: 4px; }
  /* 위로/아래로 합침, 목차/콘텐츠 변경, 목차 이동: 1-depth 행이 활성(클릭 선택)된 상태에서만 노출 */
  .toc-row .merge-btn,
  .toc-row .click-only-btn { display: none; }
  .toc-item.is-active > .toc-row .merge-btn,
  .toc-item.is-active > .toc-row .click-only-btn { display: inline-flex; }
  /* 하위 콘텐츠 행의 click-only 액션: 상위 목차 항목이 활성화된 상태에서만 노출 */
  .toc-child .click-only-btn { display: none; }
  .toc-item.is-active .toc-child .click-only-btn { display: inline-flex; }
  .toc-child.reorder-on { grid-template-columns: 28px auto 1fr auto; }
  .toc-child.reorder-on.no-type { grid-template-columns: 28px auto 1fr auto; }

  /* ------------ Settings table (step 4/5) ------------ */
  .setting-list { display: flex; flex-direction: column; gap: 0; border-top: 1px solid var(--border); }
  .setting-row {
    display: grid; grid-template-columns: 160px 1fr auto;
    gap: 24px; align-items: center; padding: 18px 16px;
    border-bottom: 1px solid var(--border);
  }
  .setting-row .key { font-weight: 700; color: var(--text); font-size: 13px; }
  .setting-row .val { color: var(--text-2); font-size: 14px; line-height: 1.6; }
  .setting-row .val .em { color: var(--brand-strong); font-weight: 800; }
  .setting-row .val .em-blue { color: var(--blue); font-weight: 800; }
  .setting-row .val .desc { color: var(--text-3); font-size: 12px; margin-top: 4px; }

  /* Accordion (Step 4) */
  .setting-list.accordion { border-top: 1px solid var(--border); }
  .setting-list.accordion .setting-block { background: #fff; }
  .setting-list.accordion .setting-block.open { background: #fff; }
  .setting-list.accordion .setting-block.open .setting-row { border-bottom: 1px dashed var(--border); }
  .setting-list.accordion .setting-block:last-child .setting-row { border-bottom: 1px solid var(--border); }
  .edit-toggle {
    background: transparent; border: 1px solid var(--border); border-radius: 999px;
    padding: 4px 12px; color: var(--brand-strong); font-weight: 700; font-size: 12px;
  }
  .edit-toggle:hover { background: var(--brand-soft); border-color: var(--brand); }
  .setting-edit {
    padding: 18px 22px 22px 200px; background: #fff; border-bottom: 1px solid var(--border);
    animation: slideDown .18s ease-out;
  }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
  .opt-row {
    display: grid; grid-template-columns: 24px 1fr; gap: 12px;
    padding: 14px 16px; background: #fff; border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 10px; cursor: pointer;
    transition: border-color .15s, background .15s, box-shadow .15s;
  }
  .opt-row:hover { border-color: var(--border-strong); }
  .opt-row.selected { border-color: var(--border-strong); background: #fff; box-shadow: none; }
  .opt-row input[type=radio] {
    width: 20px; height: 20px; margin-top: 2px; accent-color: var(--muted);
    cursor: pointer;
  }
  .opt-content { display: flex; flex-direction: column; gap: 6px; }
  .opt-title { font-weight: 800; font-size: 14px; color: var(--text); }
  .opt-desc { font-size: 12.5px; color: var(--text-3); line-height: 1.6; }
  .opt-controls { margin-top: 8px; display: flex; flex-direction: column; gap: 10px; color: var(--text-2); font-size: 13px; }
  .opt-controls .inline-num { width: 90px; padding: 8px 10px; text-align: center; }
  .opt-controls input:disabled { background: #f3f4f6; color: var(--muted); cursor: not-allowed; }

  .period-grid {
    display: grid; grid-template-columns: 90px 1fr 20px 1fr;
    gap: 8px; align-items: center;
  }
  .period-lbl { font-size: 12.5px; font-weight: 700; color: var(--text-2); }
  .period-grid input[type=date] { padding: 8px 10px; }
  .period-grid span { text-align: center; color: var(--text-3); }
  .period-grid.lp-imm-learn .lp-imm-learn-text {
    grid-column: 2 / -1;
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 13px; color: var(--text-2);
  }
  .period-grid.lp-imm-learn .lp-imm-learn-text .inline-num {
    width: 96px; padding: 8px 10px; text-align: center;
  }

  .opt-inline {
    display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-2);
    cursor: pointer;
  }
  .opt-inline input { accent-color: var(--muted); cursor: pointer; }

  .hint {
    background: #fff7ed; border: 1px solid #fed7aa; color: #9a3412;
    border-radius: 8px; padding: 10px 14px; font-size: 12.5px; line-height: 1.6;
  }
  .hint b { color: var(--brand-strong); }
  .setting-edit .hint {
    background: transparent; border: 1px solid transparent;
    color: var(--text-2);
  }
  .setting-edit .hint b { color: var(--text); }
  .setting-edit .opt-row:not(.compact),
  .setting-edit .opt-row:not(.compact).selected,
  .setting-edit .opt-row:not(.compact):hover {
    background: transparent; border-color: transparent; box-shadow: none;
  }
  .setting-edit .toggle-block {
    background: transparent; border-color: transparent;
  }

  .slider-block { padding: 4px 8px 0; }
  .slider-block input[type=range] {
    width: 100%; accent-color: var(--muted);
    height: 6px;
  }
  .slider-ticks { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--text-3); margin-top: 4px; }
  .slider-block + .result { margin-top: 14px; font-size: 16px; }
  .result .em { font-size: 22px; color: var(--brand-strong); }

  .checkbox-list {
    display: flex; flex-direction: column; gap: 6px;
    max-height: 320px; overflow-y: auto;
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 14px;
  }
  .checkbox-list .opt-inline { padding: 6px 0; align-items: flex-start; line-height: 1.5; }

  /* === 필수 완료콘텐츠 — 안내 + 필터 토글 === */
  .req-toolbar {
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 10px; color: var(--text-2);
  }
  .req-hint-text { font-size: 12.5px; line-height: 1.6; color: var(--text-3); padding: 0 2px; }
  .req-filter-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    align-self: flex-end;
    font-size: 12.5px; font-weight: 600; color: var(--text);
    white-space: nowrap; cursor: pointer;
    background: #fff; border: 1px solid var(--border);
    border-radius: 6px; padding: 6px 12px;
    transition: border-color .15s, background .15s;
  }
  .req-filter-toggle:hover { border-color: var(--border-strong); }
  .req-filter-toggle input { accent-color: var(--muted); cursor: pointer; margin: 0; }
  .req-filter-toggle.is-on { background: var(--surface-2); border-color: var(--border-strong); color: var(--text); }

  /* === 필수 완료콘텐츠 — 윈도우 탐색기 풍 트리 === */
  .req-tree-wrap {
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; max-height: 420px; overflow: auto;
    font-size: 13px; color: var(--text);
  }
  .req-tree-wrap ul,
  .req-tree-wrap li {
    list-style: none !important;
    margin: 0 !important; padding: 0 !important;
    border: 0; background: transparent;
  }
  .req-tree-children {
    margin: 0 0 0 11px !important;
    padding: 0 0 0 17px !important;
    border-left: 1px dashed var(--border-strong);
  }
  .req-tree-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 6px; border-radius: 6px;
    user-select: none;
    min-height: 28px;
  }
  .req-folder-row { cursor: pointer; font-weight: 700; }
  .req-folder-row:hover { background: var(--brand-soft); }
  .req-twisty {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px; color: var(--text-3); font-size: 9px;
    flex-shrink: 0;
  }
  .req-twisty.empty { color: var(--border-strong); }
  .req-folder-ic { font-size: 14px; line-height: 1; flex-shrink: 0; }
  .req-folder-name {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .req-count-badge {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 999px; padding: 1px 9px;
    color: var(--text-3); font-size: 11px; font-weight: 600;
    flex-shrink: 0;
  }
  .req-tree-leaf { position: relative; }
  .req-tree-leaf::before {
    content: ''; position: absolute; left: -17px; top: 50%;
    width: 15px; border-top: 1px dashed var(--border-strong);
    pointer-events: none;
  }
  .req-leaf-row {
    cursor: pointer; padding: 4px 6px;
    display: flex; align-items: center; gap: 8px;
    border-radius: 6px; min-height: 28px;
  }
  .req-leaf-row:hover { background: #f3f4f6; }
  .req-leaf-row input[type=checkbox] {
    width: 15px; height: 15px; accent-color: var(--muted);
    cursor: pointer; flex-shrink: 0; margin: 0;
  }
  .req-leaf-type {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--surface-2); border: 1px solid var(--border);
    padding: 1px 8px; border-radius: 4px;
    font-size: 11px; font-weight: 700; color: var(--text-2);
    flex-shrink: 0;
  }
  .req-leaf-type .ic { font-size: 12px; line-height: 1; }
  .req-leaf-title {
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: var(--text);
  }
  .req-tree-leaf.is-disabled .req-leaf-row { cursor: not-allowed; }
  .req-tree-leaf.is-disabled .req-leaf-row:hover { background: transparent; }
  .req-tree-leaf.is-disabled .req-leaf-title,
  .req-tree-leaf.is-disabled .req-leaf-type { color: var(--muted); opacity: .75; }
  .req-tree-leaf.is-disabled input[type=checkbox] { cursor: not-allowed; }
  .req-folder-empty-hint {
    color: var(--text-3); font-size: 11.5px; font-weight: 400; font-style: italic;
    margin-left: 6px;
  }

  .edit-actions {
    margin-top: 18px; display: flex; gap: 8px; justify-content: flex-end;
    padding-top: 14px;
  }

  /* Compact 라디오 카드 (맛보기 영상 등) */
  .opt-row.compact {
    padding: 10px 14px; margin-bottom: 6px;
    grid-template-columns: 20px 1fr; gap: 10px;
  }
  .opt-row.compact .opt-title { font-weight: 600; font-size: 13px; }

  /* 토글 스위치 (Step 5 - 부가설정 토글) */
  .toggle-block { background: #fff; padding: 18px; border: 1px solid var(--border); border-radius: 10px; }
  .toggle-switch {
    display: inline-flex; align-items: center; gap: 12px;
    cursor: pointer; user-select: none;
  }
  .toggle-switch input { display: none; }
  .toggle-switch .track {
    width: 52px; height: 28px; background: #d1d5db; border-radius: 999px;
    position: relative; transition: background .2s;
    display: inline-block;
  }
  .toggle-switch .thumb {
    position: absolute; top: 3px; left: 3px;
    width: 22px; height: 22px; border-radius: 999px;
    background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.2);
    transition: transform .2s;
  }
  .toggle-switch input:checked + .track { background: var(--text-3); }
  .toggle-switch input:checked + .track .thumb { transform: translateX(24px); }
  .toggle-switch .toggle-label { font-weight: 700; font-size: 14px; color: var(--text); }
  .toggle-switch input:checked ~ .toggle-label { color: var(--text); }

  /* ------------ Wizard5 부가 설정 (컴팩트 토글 카드 리스트) ------------ */
  .addon-section { margin-top: 40px; }
  .addon-section-head { margin-bottom: 14px; }
  .addon-section-head .addon-eyebrow {
    display: inline-block; color: var(--text-3); font-size: 12px; font-weight: 600;
    letter-spacing: .4px; margin-bottom: 4px;
  }
  .addon-section-head h3 { font-size: 18px; font-weight: 800; margin: 0 0 4px; color: var(--text); }
  .addon-section-head p { font-size: 13px; color: var(--text-3); margin: 0; }
  .addon-list { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
  .addon-card {
    display: flex; align-items: center; justify-content: space-between;
    background: #fff; border: 1px solid var(--border); border-radius: 12px;
    padding: 18px 22px; gap: 16px;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  .addon-card:hover { border-color: var(--border-strong); }
  .addon-card-info { flex: 1; min-width: 0; }
  .addon-card-title { font-size: 14.5px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
  .addon-card-desc { font-size: 12.5px; color: var(--text-3); }
  .addon-card-control { display: flex; align-items: center; gap: 12px; flex: 0 0 auto; }
  .addon-state {
    font-size: 13px; font-weight: 600; color: var(--text-3);
    min-width: 56px; text-align: right;
  }
  .addon-state.is-on { color: #2563eb; }
  .addon-toggle .track { width: 46px; height: 26px; }
  .addon-toggle .thumb { width: 20px; height: 20px; top: 3px; left: 3px; }
  .addon-toggle input:checked + .track { background: #2563eb; }
  .addon-toggle input:checked + .track .thumb { transform: translateX(20px); }

  .preview-radio-list {
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 10px; max-height: 320px; overflow-y: auto;
  }

  /* ------------ Checklist (step 6) ------------ */
  .summary-grid { display: grid; grid-template-columns: 1fr 1.1fr; gap: 28px; padding: 8px 0 18px; }
  .summary-card { background: #fff; border: none; border-radius: 10px; padding: 18px; }
  .summary-card h4 { font-size: 14px; margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
  .summary-card h4::before { content: ""; width: 6px; height: 6px; border-radius: 999px; background: var(--brand); display: inline-block; }
  .summary-card dl { margin: 0; display: grid; grid-template-columns: 88px 1fr; row-gap: 10px; column-gap: 16px; font-size: 13px; }
  .summary-card dt { color: var(--text-3); font-weight: 600; }
  .summary-card dd { margin: 0; color: var(--text); }
  .preview-box {
    background: #f7f8fb; border: 1px solid var(--border); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    min-height: 220px; color: var(--text-3); font-size: 28px;
  }

  /* Step 6 — Preview player + TOC tree (right) */
  .preview-split {
    display: grid; grid-template-columns: minmax(0, 1.7fr) minmax(240px, 1fr);
    gap: 28px; align-items: start; padding: 2px 0;
  }

  /* 과정정보 카드 (wizard/3 상단 — 과정 제작완료 단계) */
  .course-info-card { padding: 22px; position: relative; }
  .course-info-card .course-edit-btn {
    padding: 8px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 700;
    background: var(--brand-soft); color: var(--brand-strong);
    border: 1px solid var(--brand);
    white-space: nowrap;
  }
  .course-info-card .course-edit-btn:hover {
    background: var(--brand); color: #fff;
  }
  .ci-empty {
    color: var(--muted); font-size: 13px; font-style: normal;
  }

  /* Image #18 — 상단 헤더 라인 (과정명 | 수정버튼) */
  .ci-header-row {
    display: flex; align-items: center; gap: 32px;
    padding: 6px 4px 14px;
  }
  .ci-header-name {
    display: flex; align-items: baseline; gap: 14px;
    flex: 0 1 auto; min-width: 0;
  }
  .course-info-card .course-edit-btn { margin-left: auto; }
  .ci-name-label {
    font-size: 13px; font-weight: 700; color: var(--text-2);
    padding: 4px 10px; background: var(--surface-2); border-radius: 6px;
    white-space: nowrap;
  }
  .ci-name-title {
    font-size: 26px; font-weight: 800; color: var(--text);
    line-height: 1.2; word-break: keep-all;
  }

  /* 헤더와 본문 구분선 */
  .ci-divider {
    height: 1px; background: var(--border); margin: 0 0 20px;
  }

  /* 본문 — 이미지 | 과정소개·태그 */
  .ci-body-row {
    display: grid; grid-template-columns: 280px 1fr;
    gap: 36px; align-items: start;
  }
  .ci-thumb-col { display: flex; flex-direction: column; gap: 8px; }
  .ci-thumb-box {
    width: 100%; aspect-ratio: 4 / 3;
    background: #f7f8fb; border: 1px solid var(--border); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .ci-thumb-box img { width: 100%; height: 100%; object-fit: cover; }
  .ci-thumb-box .no-img {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: var(--muted); font-size: 13px; font-weight: 600;
  }
  .ci-thumb-box .no-img .ic { font-size: 28px; }

  .ci-detail-col { display: flex; flex-direction: column; gap: 18px; }
  .ci-field {
    display: grid; grid-template-columns: 80px 1fr;
    gap: 16px; align-items: start;
  }
  .ci-key { font-weight: 700; font-size: 13px; color: var(--text); padding-top: 2px; }
  .ci-val { color: var(--text-2); font-size: 13.5px; line-height: 1.7; }
  .ci-cat-path { color: var(--text); font-weight: 500; }
  .ci-intro-text {
    font-size: 13px; line-height: 1.7; color: var(--text-2);
    max-height: 240px; overflow-y: auto;
  }
  .ci-intro-text > div { margin-bottom: 4px; }
  .ci-intro-text > div:last-child { margin-bottom: 0; }
  .ci-tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .ci-tag-chip {
    display: inline-flex; align-items: center;
    padding: 4px 12px; border-radius: 999px;
    border: 1px solid var(--brand); color: var(--brand-strong);
    background: #fff; font-size: 12.5px; font-weight: 600;
  }

  /* 과정정보 수정 드로어 */
  .ci-edit-form .form-row { margin-bottom: 22px; }
  .ci-edit-form .form-row:last-child { margin-bottom: 0; }
  .ci-edit-form .label { display: block; font-weight: 700; font-size: 13px; margin-bottom: 8px; }
  .ci-edit-form .label .req-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 999px;
    background: var(--brand); margin-left: 6px; vertical-align: middle;
  }
  .ci-cat-selects { display: flex; gap: 8px; flex-wrap: nowrap; }
  .ci-cat-selects .select {
    flex: 1 1 0; min-width: 0; width: auto;
    padding: 11px 32px 11px 12px;
  }
  .ci-uploader-wrap .uploader { padding: 36px 18px; }
  .ci-thumb-preview {
    margin-top: 10px; display: flex; align-items: center; gap: 12px;
  }
  .ci-thumb-preview .thumb {
    width: 120px; aspect-ratio: 4 / 3; border-radius: 6px; overflow: hidden;
    background: #f7f8fb; border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
  }
  .ci-thumb-preview .thumb img { width: 100%; height: 100%; object-fit: cover; }

  .thumb-box {
    width: 100%; aspect-ratio: 4 / 3;
    background: #f7f8fb; border: 1px solid var(--border); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
  .thumb-box .no-img {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    color: var(--muted); font-size: 13px; font-weight: 600;
  }
  .thumb-box .no-img .ic { font-size: 28px; }
  .course-thumb .btn-text { font-size: 12px; }

  .course-info-rows { display: flex; flex-direction: column; gap: 0; }
  .info-row {
    display: grid; grid-template-columns: 90px 1fr;
    gap: 16px; align-items: start; padding: 12px 0;
    border-bottom: 1px dashed var(--border);
  }
  .info-row:last-child { border-bottom: none; }
  .info-row .key { font-weight: 700; font-size: 13px; color: var(--text-2); padding-top: 8px; }
  .info-row .val { color: var(--text); font-size: 13.5px; line-height: 1.7; padding-top: 6px; }
  .info-row .val .intro-edit {
    width: 100%; min-height: 200px; font-size: 12.5px; line-height: 1.7;
    color: var(--text-2); resize: vertical;
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 6px;
    padding: 10px 12px;
  }
  .info-row .val.cat { display: flex; gap: 8px; flex-wrap: wrap; padding-top: 0; }
  .info-row .val.cat .select { width: auto; min-width: 140px; padding: 8px 28px 8px 12px; }
  .info-row .val .tag-input { padding: 8px 12px; }
  .preview-player {
    background: #fff; border: 1px solid var(--border-strong); border-radius: 4px;
    aspect-ratio: 16 / 11; display: flex; align-items: center; justify-content: center;
    min-height: 280px;
  }
  .preview-player .play-btn {
    width: 64px; height: 64px; border-radius: 6px;
    background: #1f242e; color: #fff; display: inline-flex;
    align-items: center; justify-content: center; font-size: 26px;
  }

  .preview-tree {
    padding: 4px 2px; max-height: 380px; overflow-y: auto;
    min-height: 0;
  }
  /* JS(syncPreviewHeights)가 좌측 player 높이에 맞춰 height/max-height를 인라인 스타일로 덮어씌웁니다. */
  .preview-tree .tree-mod { margin-bottom: 4px; }
  .preview-tree .tree-mod .mod-row {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 4px; font-size: 13.5px; font-weight: 700; color: var(--text);
    cursor: pointer; line-height: 1.5;
  }
  .preview-tree .tree-mod .mod-row .caret {
    width: 14px; flex: 0 0 14px; color: var(--text-3);
    transition: transform .12s; font-size: 11px;
  }
  .preview-tree .tree-mod.expanded .mod-row .caret { transform: rotate(90deg); }
  .preview-tree .tree-mod .mod-row.flat .caret { display: none; }
  .preview-tree .tree-mod .mod-row .mod-title { flex: 1; min-width: 0; }
  .preview-tree .tree-mod .mod-children { display: none; padding: 0 6px 4px 22px; }
  .preview-tree .tree-mod.expanded .mod-children { display: block; }
  .preview-tree .tree-leaf {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 10px; margin: 2px 0; font-size: 12.5px;
    color: var(--text-2); border-radius: 4px; cursor: pointer;
    line-height: 1.5; border: 1px solid transparent;
  }
  .preview-tree .tree-leaf::before {
    content: ""; width: 4px; height: 4px; border-radius: 999px;
    background: var(--text-3); flex: 0 0 4px;
  }
  .preview-tree .tree-leaf:hover { background: #f7f8fb; color: var(--text); }
  .preview-tree .tree-leaf.selected {
    background: #e7f0fd; color: #1d4ed8; font-weight: 600;
    border-color: #bfdbfe;
  }
  .preview-tree .tree-leaf.selected::before { background: #1d4ed8; }

  /* Step 6 — Checklist row variants */
  .check-rows {
    display: flex; flex-direction: column; gap: 0;
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
  }
  .check-rows .crow {
    display: grid; grid-template-columns: 160px 1fr;
    gap: 16px; padding: 12px 16px; align-items: center;
    border-bottom: 1px solid var(--border); background: #fff;
    font-size: 13px;
  }
  .check-rows .crow:last-child { border-bottom: none; }
  .check-rows .crow .k {
    color: var(--text-3); font-weight: 700; font-size: 12.5px;
  }
  .check-rows .crow .v { color: var(--text); }
  .check-rows .crow.warn .k { color: var(--brand-strong); }
  .check-rows .crow.warn .v { color: var(--brand-strong); }
  .check-rows .crow.warn { background: #fff7ed; }
  .checklist { display: flex; flex-direction: column; gap: 8px; }
  .checklist .ci {
    display: flex; gap: 12px; padding: 12px 14px; background: #fff;
    border: 1px solid var(--border); border-radius: 8px;
  }
  .checklist .ci.ok { border-color: #bbf7d0; background: #f0fdf4; }
  .checklist .ci.warn { border-color: #fed7aa; background: #fff7ed; }
  .checklist .ci .ico { width: 22px; height: 22px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 22px; }
  .checklist .ci.ok .ico { background: #16a34a; color: #fff; }
  .checklist .ci.warn .ico { background: #f59e0b; color: #fff; }
  .checklist .ci .text { font-size: 13px; color: var(--text); }
  .checklist .ci .sub { display: block; color: var(--text-3); font-size: 12px; margin-top: 2px; }

  /* ------------ Modal ------------ */
  .modal-mask {
    position: fixed; inset: 0; background: rgba(15, 23, 42, .45); z-index: 120;
    display: none; align-items: center; justify-content: center; padding: 24px;
  }
  .modal-mask.open { display: flex; }
  .modal {
    background: #fff; border-radius: 12px; box-shadow: var(--shadow-md);
    width: 100%; max-width: 480px; overflow: hidden;
    animation: pop .14s ease-out;
  }
  @keyframes pop { from { transform: scale(.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .modal .head { padding: 18px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .modal .head h3 { margin: 0; font-size: 15px; }
  .modal .body { padding: 18px 20px; color: var(--text-2); font-size: 13.5px; line-height: 1.7; }
  .modal .body .form-row { margin-bottom: 12px; }
  .modal .foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px; }

  /* Drawer form spacing — give breathing room between rows */
  .drawer .dbody .form-row { margin-bottom: 20px; }
  .drawer .dbody .form-row:last-child { margin-bottom: 0; }
  .drawer .dbody .form-row > .label { margin-bottom: 8px; }
  .drawer .dbody .time-range { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; }
  .drawer .dbody .time-range .select { width: 88px; flex: 0 0 88px; }
  .drawer .dbody .time-range > span { flex: 0 0 auto; color: var(--text-3); font-size: 13px; }

  /* ------------ Drawer (right sheet) ------------ */
  .drawer-mask {
    position: fixed; inset: 0; background: rgba(15, 23, 42, .35); z-index: 130;
    display: none;
  }
  .drawer-mask.open { display: block; }
  .drawer {
    position: fixed; top: 0; right: 0; bottom: 0; width: 640px; max-width: 96vw;
    background: #fff; z-index: 135; box-shadow: -8px 0 32px rgba(15, 23, 42, .12);
    transform: translateX(100%); transition: transform .22s ease-out;
    display: flex; flex-direction: column;
  }
  .drawer.open { transform: translateX(0); }
  .drawer .dhead {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px 14px;
  }
  .drawer .dhead h3 { margin: 0; font-size: 17px; font-weight: 800; }
  .drawer .dtabs {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px;
    padding: 0 16px; border-bottom: 1px solid var(--border);
  }
  .drawer .dtab {
    background: transparent; border: none; padding: 10px 6px 12px;
    font-size: 13px; font-weight: 700; color: var(--text-3);
    border-bottom: 2px solid transparent; cursor: pointer; position: relative;
  }
  .drawer .dtab .dot { display: none; position: absolute; top: 6px; right: 12px; width: 8px; height: 8px; border-radius: 999px; background: var(--brand); }
  .drawer .dtab.active { color: var(--text); border-bottom-color: var(--brand); }
  .drawer .dtab.active .dot { display: inline-block; }
  .drawer .dbody { flex: 1; overflow-y: auto; padding: 18px 22px 28px; }
  .drawer .dfoot {
    border-top: 1px solid var(--border); padding: 12px 22px;
    display: flex; justify-content: flex-end; gap: 8px;
  }
  .section-title {
    font-weight: 800; font-size: 13px; color: var(--text-2); margin: 18px 0 10px;
    letter-spacing: -.1px;
  }
  .section-title:first-child { margin-top: 4px; }
  .type-icon-grid {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px;
  }
  .type-icon {
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 8px; display: flex; flex-direction: column; align-items: center; gap: 8px;
    cursor: pointer; transition: border-color .15s, background .15s, transform .05s;
    font-size: 12px; color: var(--text-2); font-weight: 600;
  }
  .type-icon:hover { background: #fff; border-color: var(--brand); color: var(--brand-strong); transform: translateY(-1px); }
  .type-icon .ic {
    width: 44px; height: 44px; border-radius: 10px; background: #fff;
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--brand); font-size: 22px;
    border: 1px solid var(--border);
  }
  .type-icon.selected { background: var(--brand-soft); border-color: var(--brand); color: var(--brand-strong); }

  /* ------------ Step 3 (single mode) — 마이크로러닝 ------------ */

  /* 섹션 컨테이너 — 메인은 강조 박스, 부가자료는 톤다운 박스 */
  .single-section {
    margin: 0 0 18px;
    border-radius: 14px;
    padding: 22px 26px 26px;
    position: relative;
  }
  .wizard-intro + .single-section { margin-top: 28px; }
  .wizard-intro + .summary-card { margin-top: 32px; }
  .wizard-intro + .setting-list { margin-top: 56px; }
  .wizard-intro + .wizard-section-head { margin-top: 56px; }
  .wizard-section-head + .setting-list { margin-top: 0; }
  .single-section.is-main {
    background: linear-gradient(180deg, #fff7ed 0%, #ffffff 100%);
    border: 1.5px solid #fdba74;
    box-shadow: 0 4px 14px -6px rgba(251, 146, 60, .22);
  }
  .single-section.is-main::before { content: none; }
  .single-section.is-sub {
    background: #f9fafb;
    border: 1px dashed #d1d5db;
  }
  /* 사전/사후학습 영역 — 회색 배경·점선 보더 제거 */
  .single-section.is-sub.is-pre-learning,
  .single-section.is-sub.is-post-learning,
  .single-section.is-sub.is-extras-add {
    background: transparent;
    border: none;
    padding: 4px 0 0 0;
  }
  /* 사전학습 ↔ 오프라인 회차/일정 ↔ 사후학습 — 섹션 간 여유 간격 */
  .single-section.is-sub.is-pre-learning  { margin-bottom: 64px; }
  .single-section.is-sub.is-post-learning { margin-top: 64px; }

  /* 섹션 타이틀 */
  .single-step-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; font-weight: 700; color: var(--text-1); margin-bottom: 4px;
  }
  .single-section.is-main .single-step-title { font-size: 16px; }
  .single-section.is-sub .single-step-title { font-size: 13px; color: var(--text-2); }
  .single-step-title .single-step-num {
    display: inline-flex; width: 22px; height: 22px; border-radius: 50%;
    background: #f97316; color: #fff; font-size: 12px; font-weight: 800;
    align-items: center; justify-content: center;
  }
  .single-section.is-sub .single-step-num {
    background: #9ca3af; width: 20px; height: 20px; font-size: 11px;
  }
  .single-step-title .optional { color: var(--text-2); font-weight: 500; font-size: 12px; }
  .single-step-title .single-step-desc { color: var(--text-2); font-weight: 500; font-size: 12px; }
  .single-step-help {
    font-size: 12px; color: var(--text-2); margin: 0 0 16px 30px;
  }
  .single-section.is-sub .single-step-help { margin-left: 28px; }

  /* 메인 콘텐츠 — 유형 선택 그리드 */
  .single-main-pick {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
    padding: 12px 0 4px;
  }
  .single-main-pick .type-icon {
    background: #fff; border: 1.5px solid #fed7aa; border-radius: 16px;
    padding: 32px 10px; font-size: 15px; gap: 16px; font-weight: 700; color: var(--text-1);
    transition: all .15s;
  }
  .single-main-pick .type-icon:hover {
    background: #fff7ed; border-color: #f97316; color: #c2410c;
    transform: translateY(-2px); box-shadow: 0 8px 18px -8px rgba(249, 115, 22, .35);
  }
  .single-main-pick .type-icon .ic {
    width: 88px; height: 88px; font-size: 44px;
    background: #fff7ed; color: #f97316;
    border: 1px solid #fed7aa; border-radius: 18px;
  }
  .single-main-pick .type-icon:hover .ic {
    background: #fff; border-color: #f97316;
  }

  /* 메인 콘텐츠 — 등록 후 카드 */
  .single-main-card {
    display: flex; align-items: center; justify-content: space-between;
    background: #fff;
    border: 1.5px solid #fdba74; border-radius: 12px;
    padding: 18px 22px;
    box-shadow: 0 4px 12px -4px rgba(249, 115, 22, .18);
  }
  .single-main-card .left { display: flex; align-items: center; gap: 16px; }
  .single-main-card .left .ic {
    width: 52px; height: 52px; border-radius: 12px;
    background: linear-gradient(135deg, #fed7aa 0%, #fb923c 100%);
    color: #fff;
    display: inline-flex; align-items: center; justify-content: center; font-size: 26px;
  }
  .single-main-card .meta .ttl { font-size: 16px; font-weight: 800; color: var(--text-1); cursor: text; }
  .single-main-card .left { flex: 1; min-width: 0; }
  .single-main-card .meta { flex: 1; min-width: 0; }
  .single-main-card .child-title-input { width: 100%; }
  .single-main-card .meta .sub { font-size: 12px; color: var(--text-2); margin-top: 5px; display: flex; align-items: center; gap: 6px; }
  .single-main-card .badge-type {
    display: inline-block; background: #f97316; color: #fff;
    font-size: 10px; font-weight: 800; padding: 2px 9px; border-radius: 999px;
    letter-spacing: .04em;
  }
  .single-main-card .child-actions { display: flex; align-items: stretch; gap: 2px; }
  .single-main-card .child-actions .action-btn { min-width: 44px; padding: 6px 4px; }

  /* 부가자료 — 등록된 콘텐츠 목록 (커리큘럼 콘텐츠 목록과 동일한 외형) */
  .single-section.is-sub .single-sub-list {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 18px;
    margin: 4px 0 14px;
  }
  .single-section.is-sub .single-sub-list .toc-child .child-actions .action-btn {
    min-width: 44px;
  }
  /* 부가자료 드래그&드롭 시각 효과 */
  .single-sub-list .toc-child { cursor: grab; }
  .single-sub-list .toc-child:active { cursor: grabbing; }
  .single-sub-list .toc-child.ss-dragging { opacity: .45; }
  .single-sub-list .toc-child.ss-drop-before { box-shadow: inset 0 2px 0 0 var(--brand); }
  .single-sub-list .toc-child.ss-drop-after  { box-shadow: inset 0 -2px 0 0 var(--brand); }

  /* 부가자료 — 유형 선택 그리드 (작고 절제된 톤) */
  .type-icon-grid.single-sub-grid {
    grid-template-columns: repeat(7, 1fr); gap: 8px;
  }
  .single-sub-grid .type-icon {
    background: #fff; border: 1px dashed #d1d5db; border-radius: 8px;
    padding: 10px 6px; font-size: 11px; gap: 6px; color: var(--text-2); font-weight: 500;
  }
  .single-sub-grid .type-icon:hover {
    background: #fff; border-style: solid; border-color: var(--brand); color: var(--brand-strong);
    box-shadow: var(--shadow-sm);
  }
  .single-sub-grid .type-icon .ic {
    width: 34px; height: 34px; font-size: 16px;
    background: var(--surface-2); border: none; color: var(--text-2);
  }
  .single-sub-grid .type-icon:hover .ic { background: var(--brand-soft); color: var(--brand-strong); }

  /* 사전/사후학습 — 헤더 영역(좌: 타이틀/설명, 우: 콘텐츠 유형 1줄) */
  .prepost-row {
    display: flex; align-items: flex-end; gap: 20px;
    margin-bottom: 16px;
  }
  .prepost-row .prepost-info { flex: 0 0 320px; min-width: 0; }
  .prepost-row .prepost-info .single-step-title { margin: 0 0 10px 0; }
  .prepost-row .prepost-info .single-step-help { margin: 0; }
  .prepost-row .prepost-types { flex: 1; min-width: 0; }
  .prepost-grid {
    grid-template-columns: repeat(9, 1fr) !important;
    gap: 3px;
  }
  .prepost-grid.is-extras-grid {
    grid-template-columns: repeat(9, 1fr) !important;
  }
  .prepost-grid.is-extras-grid .type-icon:first-child {
    grid-column-start: 3;
  }
  .prepost-grid.single-sub-grid .type-icon {
    padding: 5px 4px; gap: 2px; font-size: 11px; border-radius: 7px;
  }
  .prepost-grid.single-sub-grid .type-icon .ic {
    width: 24px; height: 24px; font-size: 12px; border-radius: 6px;
  }

  .lib-card {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; cursor: pointer; transition: border-color .15s, transform .05s, box-shadow .15s;
    display: flex; flex-direction: column;
  }
  .lib-card:hover { border-color: var(--brand); box-shadow: var(--shadow-sm); transform: translateY(-1px); }
  .lib-card.selected { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
  .lib-thumb {
    aspect-ratio: 16 / 9; background: linear-gradient(135deg, #93c5fd 0%, #3b82f6 100%);
    display: flex; align-items: center; justify-content: center; color: #fff; font-size: 24px;
    position: relative;
  }
  .lib-thumb.k2 { background: linear-gradient(135deg, #fbbf24 0%, #f97316 100%); }
  .lib-thumb.k3 { background: linear-gradient(135deg, #6ee7b7 0%, #10b981 100%); }
  .lib-thumb.k4 { background: linear-gradient(135deg, #c4b5fd 0%, #7c3aed 100%); }
  .lib-thumb .dur { position: absolute; bottom: 6px; right: 6px; background: rgba(0,0,0,.55); color: #fff; font-size: 11px; padding: 1px 6px; border-radius: 4px; }
  .lib-card .body { padding: 10px 12px 14px; }
  .lib-card .ttl { font-size: 13px; font-weight: 700; line-height: 1.4; }
  .lib-card .meta { margin-top: 6px; display: flex; gap: 6px; font-size: 11px; color: var(--text-3); }
  .lib-card .badge-free { background: #fff7ed; color: var(--brand-strong); border: 1px solid #fed7aa; padding: 1px 6px; border-radius: 4px; font-weight: 700; }
  .lib-card .badge-paid { background: #f0f9ff; color: #0369a1; border: 1px solid #bae6fd; padding: 1px 6px; border-radius: 4px; font-weight: 700; }

  /* ------------ 라이브러리 리스트(가로 행 형태) ------------ */
  .lib-row-list { display: flex; flex-direction: column; gap: 6px; }
  .lib-row {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 10px; background: #fff;
    border: 1px solid var(--border); border-radius: 10px;
    cursor: pointer; position: relative;
    transition: border-color .15s, box-shadow .15s, background-color .15s;
  }
  .lib-row:hover { border-color: var(--brand); box-shadow: var(--shadow-sm); }
  .lib-row.checked { border-color: var(--brand); background: var(--brand-soft); }
  .lib-row .row-thumb {
    width: 110px !important; height: 62px !important;
    min-width: 110px; max-width: 110px;
    min-height: 62px; max-height: 62px;
    flex: 0 0 auto; align-self: center;

  /* ------------ 라이브러리 콘텐츠 미리보기 드로어 ------------ */

  .lib-prev-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

  .lib-prev-player {

  }

  .prev-course-head .ttl {
    font-size: 18px; font-weight: 800; color: var(--text);
    letter-spacing: -.2px; line-height: 1.3; margin-bottom: 8px; word-break: keep-all;
  }

    display: flex; flex-wrap: wrap; align-items: center; gap: 6px;

  }
  .prev-course-head .meta-row .badge-free,
  .prev-course-head .meta-row .badge-source {

  .prev-course-head .meta-row .badge-free {

  }
  .prev-course-head .meta-row .badge-source {
    background: var(--brand-soft); color: var(--brand-strong); border-color: #fed7aa;
  }
  .prev-course-head .add-all-btn {
    background: var(--brand); color: #fff; border: 1px solid var(--brand);

  }
  .prev-course-head .add-all-btn:hover { background: var(--brand-strong); border-color: var(--brand-strong); }

  .prev-module {

  .prev-module .mod-title {

  }
  .prev-module .mod-title .meta-count .mc-ic {
    display: inline-flex; align-items: center; justify-content: center;

  }
  .prev-module .mod-title .meta-count .mc-ic::before {
