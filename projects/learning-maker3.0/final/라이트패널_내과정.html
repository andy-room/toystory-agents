<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>라이트 패널 — 내 과정 불러오기</title>
  <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet"/>
  <style>
    /* ── HDS Tokens ─────────────────────────────── */
    :root {
      --brand:        #0066FF;
      --brand-sub:    #EBF3FF;
      --brand-faint:  #F5F9FF;
      --bg:           #F7F7F8;
      --surface:      #FFFFFF;
      --text-1:       #171719;
      --text-2:       rgba(0,0,0,.60);
      --text-3:       rgba(0,0,0,.45);
      --line-layout:  #E1E2E4;
      --line-outline: #C2C4C8;
      --r-sm:  8px;
      --r-md: 12px;
      --shadow-sm: 0 2px 4px rgba(0,0,0,.08);
      --shadow-md: 0 4px 12px rgba(0,0,0,.12);
      --font: 'Pretendard', -apple-system, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: #D0D3D8;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 24px;
    }

    /* ── Panel Wrapper ───────────────────────────── */
    .panel {
      width: 480px;
      height: 820px;
      background: var(--surface);
      border-radius: var(--r-md);
      box-shadow: var(--shadow-md);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ──────────────────────────────────── */
    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 24px 18px;
      border-bottom: 1px solid var(--line-layout);
      flex-shrink: 0;
    }
    .panel-title {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-1);
      letter-spacing: -0.2px;
    }
    .btn-close {
      width: 32px; height: 32px;
      border: none; background: transparent;
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-3);
      font-size: 18px;
      transition: background .12s;
    }
    .btn-close:hover { background: var(--bg); color: var(--text-1); }

    /* ── Search ──────────────────────────────────── */
    .panel-search {
      padding: 16px 24px 12px;
      flex-shrink: 0;
    }
    .search-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line-outline);
      border-radius: var(--r-sm);
      padding: 0 14px;
      height: 44px;
      background: var(--surface);
      transition: border-color .15s, box-shadow .15s;
    }
    .search-wrap:focus-within {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px var(--brand-sub);
    }
    .search-ico {
      color: var(--text-3);
      flex-shrink: 0;
      display: flex;
    }
    .search-input {
      flex: 1;
      border: none; outline: none;
      font: 14px/1 var(--font);
      color: var(--text-1);
      background: transparent;
    }
    .search-input::placeholder { color: var(--text-3); }

    /* ── Filter Chips ────────────────────────────── */
    .panel-filters {
      padding: 0 24px 12px;
      flex-shrink: 0;
    }
    .chips {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .chips::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0;
      padding: 5px 12px;
      border: 1px solid var(--line-outline);
      border-radius: 900px;
      font: 12px/1 var(--font);
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      background: var(--surface);
      transition: all .12s;
      white-space: nowrap;
      user-select: none;
    }
    .chip:hover { border-color: var(--brand); color: var(--brand); }
    .chip.on {
      background: var(--brand);
      border-color: var(--brand);
      color: #fff;
      font-weight: 600;
    }

    /* ── Divider ─────────────────────────────────── */
    .divider { height: 1px; background: var(--line-layout); flex-shrink: 0; }

    /* ── Course List ─────────────────────────────── */
    .panel-list {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--line-layout) transparent;
    }
    .course-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--line-layout);
      cursor: pointer;
      transition: background .1s;
    }
    .course-item:hover { background: var(--bg); }
    .course-item:last-child { border-bottom: none; }
    .course-item.active { background: var(--brand-faint); }

    .course-info { flex: 1; min-width: 0; }
    .course-badge {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 5px;
    }
    .badge-online  { background: #EBF3FF; color: #0052CC; }
    .badge-offline { background: #FFF0EB; color: #B84A00; }
    .badge-hybrid  { background: #F0EBFF; color: #5B0EBE; }

    .course-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .course-meta {
      font-size: 12px;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .course-date { white-space: nowrap; }

    .btn-add {
      flex-shrink: 0;
      height: 32px;
      padding: 0 12px;
      border: 1px solid var(--line-outline);
      border-radius: 6px;
      font: 12px/1 var(--font);
      font-weight: 600;
      color: var(--text-2);
      background: var(--surface);
      cursor: pointer;
      transition: all .12s;
      white-space: nowrap;
    }
    .btn-add:hover {
      border-color: var(--brand);
      color: var(--brand);
    }
    .btn-add.done {
      background: #E8F5E9;
      border-color: #A5D6A7;
      color: #2E7D32;
    }

    /* ── Loader ──────────────────────────────────── */
    .panel-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px;
      font-size: 13px;
      color: var(--text-3);
      flex-shrink: 0;
    }
    .spin {
      width: 14px; height: 14px;
      border: 2px solid var(--line-layout);
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Detail Panel ────────────────────────────── */
    .panel-detail {
      display: none;
      flex-direction: column;
      height: 100%;
    }
    .panel-detail.visible { display: flex; }
    .panel-main.hidden { display: none; }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 24px;
      border-bottom: 1px solid var(--line-layout);
      flex-shrink: 0;
    }
    .btn-back {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border: none; background: transparent;
      border-radius: 6px; cursor: pointer;
      color: var(--text-2);
      font-size: 16px;
      transition: background .12s;
    }
    .btn-back:hover { background: var(--bg); }
    .detail-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-1);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .detail-body {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .detail-info {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .detail-info-row {
      display: flex;
      gap: 8px;
      font-size: 13px;
    }
    .info-key {
      width: 72px;
      flex-shrink: 0;
      color: var(--text-3);
      font-weight: 500;
    }
    .info-val { color: var(--text-2); }

    .detail-section-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--text-1);
      margin-bottom: 10px;
    }
    .module-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .module-item {
      border: 1px solid var(--line-layout);
      border-radius: var(--r-sm);
      overflow: hidden;
    }
    .module-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: var(--bg);
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
      user-select: none;
    }
    .module-head .caret {
      font-size: 11px;
      color: var(--text-3);
      transition: transform .15s;
    }
    .module-head.open .caret { transform: rotate(90deg); }
    .module-leaves {
      display: none;
      padding: 8px 14px 10px;
      border-top: 1px solid var(--line-layout);
    }
    .module-leaves.open { display: block; }
    .leaf {
      font-size: 12px;
      color: var(--text-2);
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .leaf::before {
      content: '';
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--line-outline);
      flex-shrink: 0;
    }

    /* ── Detail Footer ───────────────────────────── */
    .detail-footer {
      padding: 16px 24px;
      border-top: 1px solid var(--line-layout);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }
    .btn-cancel {
      flex: 1;
      height: 44px;
      border: 1px solid var(--line-outline);
      border-radius: var(--r-sm);
      background: var(--surface);
      font: 14px/1 var(--font);
      font-weight: 600;
      color: var(--text-2);
      cursor: pointer;
      transition: all .12s;
    }
    .btn-cancel:hover { border-color: var(--text-2); color: var(--text-1); }
    .btn-confirm {
      flex: 2;
      height: 44px;
      border: none;
      border-radius: var(--r-sm);
      background: var(--brand);
      font: 14px/1 var(--font);
      font-weight: 700;
      color: #fff;
      cursor: pointer;
      transition: background .12s;
    }
    .btn-confirm:hover { background: #0052CC; }

    /* ── Empty / Count ───────────────────────────── */
    .list-count {
      padding: 10px 24px 6px;
      font-size: 12px;
      color: var(--text-3);
      flex-shrink: 0;
    }
    .list-count strong { color: var(--brand); font-weight: 700; }
  </style>
</head>
<body>

<div class="panel">

  <!-- ── 목록 씬 ────────────────────────── -->
  <div class="panel-main" id="panel-main">

    <!-- Header -->
    <div class="panel-header">
      <span class="panel-title">내 과정 불러오기</span>
      <button class="btn-close" title="닫기">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <!-- Search -->
    <div class="panel-search">
      <div class="search-wrap">
        <span class="search-ico">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </span>
        <input class="search-input" placeholder="과정명으로 검색" id="search-input" oninput="filterCourses()"/>
      </div>
    </div>

    <!-- Filters -->
    <div class="panel-filters">
      <div class="chips" id="chips">
        <span class="chip on" data-filter="all" onclick="setFilter(this,'all')">전체</span>
        <span class="chip" data-filter="온라인" onclick="setFilter(this,'온라인')">온라인</span>
        <span class="chip" data-filter="오프라인" onclick="setFilter(this,'오프라인')">오프라인</span>
        <span class="chip" data-filter="하이브리드" onclick="setFilter(this,'하이브리드')">하이브리드</span>
        <span class="chip" data-filter="리더십" onclick="setFilter(this,'리더십')">#리더십</span>
        <span class="chip" data-filter="필수교육" onclick="setFilter(this,'필수교육')">#필수교육</span>
        <span class="chip" data-filter="신입사원" onclick="setFilter(this,'신입사원')">#신입사원</span>
        <span class="chip" data-filter="성과관리" onclick="setFilter(this,'성과관리')">#성과관리</span>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Count -->
    <div class="list-count" id="list-count"></div>

    <!-- List -->
    <div class="panel-list" id="course-list"></div>

    <!-- Loader -->
    <div class="panel-loader" id="loader">
      <span class="spin"></span> 불러오는 중…
    </div>

  </div>

  <!-- ── 상세 씬 ────────────────────────── -->
  <div class="panel-detail" id="panel-detail">

    <!-- Header -->
    <div class="detail-header">
      <button class="btn-back" onclick="goBack()" title="목록으로">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <span class="detail-title" id="detail-title"></span>
    </div>

    <!-- Body -->
    <div class="detail-body" id="detail-body"></div>

    <!-- Footer -->
    <div class="detail-footer">
      <button class="btn-cancel" onclick="goBack()">취소</button>
      <button class="btn-confirm" id="btn-confirm" onclick="addCourse()">이 과정 불러오기</button>
    </div>

  </div>

</div>

<script>
const COURSES = [
  { id:'ec1', title:'25년 하반기 신입사원 소셜멘토링 OT', kind:'online',
    category:'리더십 > 공통교육', date:'2026-03-23', tags:['리더십','신입사원'],
    modules:[
      { title:'신임 과장, 무엇이 변화되어야 하는가?', leaves:['환경 변화를 인식하라','승진에 따른 변화에 대응하라','과장의 역할은 무엇인가'] },
      { title:'후배의 성장을 돕는 리더십', leaves:['변화를 이끄는 효과적인 피드백 스킬'] },
      { title:'윈윈하며 시너지를 내는 협업 스킬', leaves:['생산적 관계 맺기','효과적인 협업 소통','협업 리더십'] }
    ]},
  { id:'ec2', title:'생생경영학', kind:'online',
    category:'필수교육 > 전사필수', date:'2025-12-04', tags:['필수교육'],
    modules:[
      { title:'1부. 경영의 본질', leaves:['경영이란 무엇인가','리더의 역할'] },
      { title:'2부. 사례로 배우는 경영', leaves:['스타트업 사례 분석','대기업 혁신 사례'] }
    ]},
  { id:'ec3', title:'워크플로우 리부트 — 일하는 방식 재설계', kind:'offline',
    category:'공통 > 공통교육', date:'2025-10-28', tags:['성과관리'],
    modules:[
      { title:'Day 1. 현재 진단', leaves:['업무 흐름 진단','병목 발굴 워크숍'] },
      { title:'Day 2. 재설계', leaves:['프로세스 재설계','액션플랜 수립'] }
    ]},
  { id:'ec4', title:'[2025년 혁신리더스쿨] 성과관리 스킬 (하반기 5차)', kind:'online',
    category:'공통직무 > 마케팅/홍보', date:'2025-12-04', tags:['성과관리','리더십'],
    modules:[
      { title:'성과관리의 본질', leaves:['목표설정 OKR/KPI','성과 관리 사이클'] },
      { title:'성과 코칭', leaves:['1on1 코칭 대화법','피드백의 기술'] }
    ]},
  { id:'ec5', title:'2025년 차부장 승진자 교육', kind:'offline',
    category:'공통직무 > 경영전략', date:'2025-10-28', tags:['리더십'],
    modules:[
      { title:'리더십 전환', leaves:['실무자에서 리더로','팀 성과 관리법'] }
    ]},
  { id:'ec6', title:'신입사원 온보딩교육', kind:'offline',
    category:'비즈니스스킬 > 문제해결', date:'2025-12-04', tags:['신입사원','필수교육'],
    modules:[
      { title:'조직 이해', leaves:['회사 문화와 가치','팀 협업 기초'] },
      { title:'업무 기초', leaves:['보고 방법론','시간 관리'] }
    ]},
  { id:'ec7', title:'Global Skill-up Program', kind:'hybrid',
    category:'경영인사이트 > 데이터분석', date:'2025-10-28', tags:['성과관리'],
    modules:[
      { title:'글로벌 역량', leaves:['크로스컬처 커뮤니케이션','글로벌 비즈니스 에티켓'] }
    ]},
  { id:'ec8', title:'25년 하반기 신입사원 소셜멘토링 OT (2기)', kind:'online',
    category:'리더십 > 공통교육', date:'2026-03-23', tags:['리더십','신입사원'],
    modules:[
      { title:'멘토링 프레임워크', leaves:['멘토의 역할과 책임','효과적인 멘토링 대화'] }
    ]}
];

let activeFilter = 'all';
let added = new Set();

const BADGE = { online:'badge-online', offline:'badge-offline', hybrid:'badge-hybrid' };
const LABEL = { online:'온라인', offline:'오프라인', hybrid:'하이브리드러닝' };

function filtered() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  return COURSES.filter(c => {
    const matchFilter = activeFilter === 'all'
      || LABEL[c.kind].includes(activeFilter)
      || c.tags.includes(activeFilter);
    const matchQ = !q || c.title.toLowerCase().includes(q) || c.category.toLowerCase().includes(q);
    return matchFilter && matchQ;
  });
}

function renderList() {
  const list = document.getElementById('course-list');
  const count = document.getElementById('list-count');
  const loader = document.getElementById('loader');
  const courses = filtered();
  count.innerHTML = `총 <strong>${courses.length}</strong>개 과정`;
  loader.style.display = 'none';

  if (!courses.length) {
    list.innerHTML = `<div style="padding:48px 24px;text-align:center;color:rgba(0,0,0,.35);font-size:14px;">검색 결과가 없어요</div>`;
    return;
  }
  list.innerHTML = courses.map(c => `
    <div class="course-item ${added.has(c.id)?'active':''}" onclick="openDetail('${c.id}')">
      <div class="course-info">
        <div class="course-badge ${BADGE[c.kind]}">${LABEL[c.kind]}</div>
        <div class="course-title">${c.title}</div>
        <div class="course-meta">
          <span>${c.category}</span>
          <span class="course-date">${c.date}</span>
        </div>
      </div>
      <button class="btn-add ${added.has(c.id)?'done':''}"
              onclick="event.stopPropagation(); quickAdd('${c.id}')">${added.has(c.id)?'추가됨':'추가'}</button>
    </div>
  `).join('');
}

function setFilter(el, val) {
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  activeFilter = val;
  renderList();
}

function filterCourses() { renderList(); }

function openDetail(id) {
  const c = COURSES.find(x => x.id === id);
  if (!c) return;
  document.getElementById('panel-main').classList.add('hidden');
  document.getElementById('panel-detail').classList.add('visible');
  document.getElementById('detail-title').textContent = c.title;
  document.getElementById('btn-confirm').dataset.id = id;
  document.getElementById('detail-body').innerHTML = `
    <div class="detail-info">
      <div class="detail-info-row"><span class="info-key">유형</span><span class="info-val"><span class="course-badge ${BADGE[c.kind]}" style="font-size:12px;">${LABEL[c.kind]}</span></span></div>
      <div class="detail-info-row"><span class="info-key">카테고리</span><span class="info-val">${c.category}</span></div>
      <div class="detail-info-row"><span class="info-key">시작일</span><span class="info-val">${c.date}</span></div>
    </div>
    <div>
      <div class="detail-section-title">커리큘럼 구성 (${c.modules.length}개 챕터)</div>
      <div class="module-list">
        ${c.modules.map((m,i) => `
          <div class="module-item">
            <div class="module-head" onclick="toggleModule(this)">
              <span>${i+1}. ${m.title}</span>
              <span class="caret">›</span>
            </div>
            <div class="module-leaves">
              ${m.leaves.map(l=>`<div class="leaf">${l}</div>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
}

function toggleModule(head) {
  head.classList.toggle('open');
  head.nextElementSibling.classList.toggle('open');
}

function goBack() {
  document.getElementById('panel-main').classList.remove('hidden');
  document.getElementById('panel-detail').classList.remove('visible');
}

function addCourse() {
  const id = document.getElementById('btn-confirm').dataset.id;
  added.add(id);
  goBack();
  renderList();
}

function quickAdd(id) {
  added.has(id) ? added.delete(id) : added.add(id);
  renderList();
}

renderList();
</script>
</body>
</html>
