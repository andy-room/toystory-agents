<script src="common.js"></script>
<script>
/* ============================================================
   Step 1 v2 — renderStep2 + typePanel 오버라이드
   (common.js 로드 후 실행 → STATE, ENT_COURSES 등 참조 가능)
============================================================ */

/* v2 전용 상태 */
const V2 = { openPanel: null, ipFilter: 'all', ipSort: 'date' };

/* ── SVG 아이콘 라이브러리 ────────────────────────────── */
const V2_ICONS = {
  offline: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
    <circle cx="9" cy="7" r="4"/>
    <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
    <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
  </svg>`,
  offlineBlended: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect x="2" y="3" width="9" height="13" rx="2"/>
    <rect x="13" y="8" width="9" height="13" rx="2"/>
    <path d="M11 9.5h2M12 8v3"/>
  </svg>`,
  single: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
  </svg>`,
  singlePlus: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <polygon points="12 2 2 7 12 12 22 7 12 2"/>
    <polyline points="2 17 12 22 22 17"/>
    <polyline points="2 12 12 17 22 12"/>
  </svg>`,
  online: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <rect width="20" height="14" x="2" y="3" rx="2"/>
    <path d="M8 21h8M12 17v4"/>
  </svg>`,
  hybrid: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="16 3 21 3 21 8"/>
    <line x1="4" x2="21" y1="20" y2="3"/>
    <polyline points="21 16 21 21 16 21"/>
    <line x1="15" x2="21" y1="15" y2="21"/>
  </svg>`,
  import: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="7 10 12 15 17 10"/>
    <line x1="12" x2="12" y1="15" y2="3"/>
  </svg>`,
  package: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
    <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
    <line x1="12" x2="12" y1="22.08" y2="12"/>
  </svg>`,
  chevronDown: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="6 9 12 15 18 9"/>
  </svg>`,
  search: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
  </svg>`,
  arrowRight: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M5 12h14M12 5l7 7-7 7"/>
  </svg>`,
  close: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
    <path d="M18 6 6 18M6 6l12 12"/>
  </svg>`,
  check: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="20 6 9 17 4 12"/>
  </svg>`
};

/* ── 콘텐츠 유형 태그 HTML ────────────────────────────── */
function v2TypeTagsHtml(modeId) {
  const groups = (typeof CONTENT_GROUPS_BY_MODE !== 'undefined') ? CONTENT_GROUPS_BY_MODE[modeId] : null;
  if (!groups) return '';
  const all = groups.flatMap(g => g.items);
  const show = all.slice(0, 3);
  const rest = all.length - show.length;
  const tags = show.map(t => `<span class="v2-tag">${esc(t)}</span>`).join('');
  const more = rest > 0 ? `<span class="v2-tag more">+${rest}</span>` : '';
  return `<div class="v2-types">${tags}${more}</div>`;
}

/* ── 메인 유형 카드 ───────────────────────────────────── */
function v2MainCard(cfg) {
  const sel = STATE.creationType === cfg.id ? 'selected' : '';
  return `
    <div class="type-card v2 tc-${cfg.id} ${sel}" onclick="selectMode('${cfg.id}')">
      <span class="v2-check">${V2_ICONS.check}</span>
      <div class="v2-icon">${cfg.icon}</div>
      <div class="v2-name">${esc(cfg.name)}</div>
      <div class="v2-sub">${esc(cfg.sub)}</div>
      ${v2TypeTagsHtml(cfg.id)}
    </div>`;
}

/* ── 불러오기 카드 + 인라인 패널 ─────────────────────── */
function v2ImportBlock(cfg) {
  const isOpen = V2.openPanel === cfg.id;
  return `
    <div class="type-card v2 import-card ${isOpen ? 'is-open' : ''}"
         onclick="v2TogglePanel('${cfg.id}')">
      <div class="v2-icon">${cfg.icon}</div>
      <div class="v2-card-texts">
        <div class="v2-name">${esc(cfg.name)}</div>
        <div class="v2-sub">${esc(cfg.sub)}</div>
      </div>
      <span class="v2-chevron">${V2_ICONS.chevronDown}</span>
    </div>
    <div class="inline-panel ${isOpen ? 'is-open' : ''}" id="ip-${cfg.id}" style="grid-column: 1 / -1;">
      ${isOpen ? (cfg.id === 'mine' ? v2EntPanel() : v2PkgPanel()) : ''}
    </div>`;
}

/* ── 전체 유형 패널 (renderStep2에서 호출) ───────────── */
function v2TypePanel() {
  const MAIN = [
    { id: 'offline',         name: '오프라인',          sub: '강의실·현장 중심 교육',              icon: V2_ICONS.offline },
    { id: 'offline-blended', name: '오프라인 + 온라인', sub: '오프라인에 사전·사후 학습 추가',      icon: V2_ICONS.offlineBlended },
    { id: 'single',          name: '빠른 콘텐츠 등록',  sub: '영상·문서 1개를 바로 등록',          icon: V2_ICONS.single },
    { id: 'single-plus',     name: '콘텐츠 + 자료 묶음',sub: '메인 콘텐츠에 부가 학습자료 추가',   icon: V2_ICONS.singlePlus },
    { id: 'online',          name: '온라인 과정',        sub: '다양한 콘텐츠로 구성된 온라인 과정', icon: V2_ICONS.online },
    { id: 'hybrid',          name: '블렌디드 러닝',      sub: '온라인 + 오프라인 자유 구성',        icon: V2_ICONS.hybrid },
  ];
  const IMPORTS = [
    { id: 'mine',  name: '내 과정 불러오기',         sub: '기존 과정 가져와 수정·재활용',    icon: V2_ICONS.import },
    { id: 'hunet', name: '프리패키지드코스 불러오기', sub: '검증된 교육 패키지 커스터마이징', icon: V2_ICONS.package },
  ];
  return `
    <div class="type-section">
      <div class="type-section-label">과정 유형 선택</div>
      <div class="type-grid v2">
        ${MAIN.map(v2MainCard).join('')}
      </div>
    </div>
    <div class="type-section">
      <div class="type-section-label">기존 과정 활용</div>
      <div class="type-grid v2 import-grid">
        ${IMPORTS.map(v2ImportBlock).join('')}
      </div>
    </div>
  `;
}

/* ── renderStep2 오버라이드 ──────────────────────────── */
function renderStep2() {
  const currentName = (STATE.courseName && STATE.courseName !== '과정 이름을 수정해주세요')
    ? STATE.courseName : '';
  return `
    <div class="step1-intro">
      <h2 class="step1-title">과정 제작을 시작해볼까요?</h2>
      <p class="step1-desc">과정 이름을 입력하고, 만들 과정의 유형을 선택해 주세요.</p>
    </div>
    <div class="step1-field-section">
      <div class="step1-field-label">과정명 <span class="req-mark"></span></div>
      <div class="step1-field-hint">과정이 완성된 후에도 언제든지 수정할 수 있어요.</div>
      <input
        class="step1-name-input"
        id="step1-course-name"
        type="text"
        value="${esc(currentName)}"
        placeholder="과정 이름을 입력하세요"
        oninput="step1SyncName(this.value)"
        onblur="step1SyncName(this.value)"
        maxlength="100"
      />
      <div class="title-error-msg" id="step1-name-err">과정명을 2자 이상 입력해주세요.</div>
    </div>
    <div class="step1-field-section" style="margin-top:40px;">
      <div class="step1-field-label">과정 유형</div>
      <div class="step1-field-hint">선택한 유형에 따라 콘텐츠 구성 방식이 달라집니다.</div>
      <div id="type-panel" style="margin-top:16px;">${v2TypePanel()}</div>
    </div>
  `;
}

/* ── 인라인 패널 토글 ────────────────────────────────── */
function v2TogglePanel(id) {
  const wasOpen = V2.openPanel === id;
  V2.openPanel = wasOpen ? null : id;
  V2.ipFilter = 'all';
  V2.ipSort = 'date';
  const tp = document.getElementById('type-panel');
  if (tp) tp.innerHTML = v2TypePanel();
}

/* ── 내 과정 불러오기 패널 HTML ──────────────────────── */
function v2EntPanel() {
  const CHIPS = [
    { val: 'all',    label: '전체' },
    { val: '리더십',  label: '#리더십' },
    { val: '필수교육', label: '#필수교육' },
    { val: '신입사원', label: '#신입사원' },
    { val: '성과관리', label: '#성과관리' },
  ];
  const courses = (typeof ENT_COURSES !== 'undefined') ? ENT_COURSES : [];
  const filtered = v2FilteredCourses(courses);
  const chipsHtml = CHIPS.map(c => `
    <button class="ip-chip ${V2.ipFilter === c.val ? 'on' : ''}"
            data-val="${c.val}"
            onclick="event.stopPropagation(); v2SetFilter('${c.val}')">
      ${esc(c.label)}
    </button>`).join('');

  return `
    <div class="ip-header">
      <span class="ip-header-title">
        ${V2_ICONS.import} 내 과정 불러오기
      </span>
      <button class="ip-close-btn" onclick="event.stopPropagation(); v2TogglePanel('mine')">
        ${V2_ICONS.close} 닫기
      </button>
    </div>
    <div class="ip-toolbar">
      <div class="ip-search" onclick="event.stopPropagation()">
        ${V2_ICONS.search}
        <input class="ip-search-input" id="ip-q" placeholder="과정명으로 검색"
               oninput="event.stopPropagation(); v2IpFilter()"
               onclick="event.stopPropagation()"/>
      </div>
      <span class="ip-sep"></span>
      <div class="ip-chips">${chipsHtml}</div>
      <div class="ip-sort-grp">
        <button class="ip-sort-btn ${V2.ipSort === 'name' ? 'on' : ''}"
                data-sort="name"
                onclick="event.stopPropagation(); v2SetSort('name')">과정명</button>
        <button class="ip-sort-btn ${V2.ipSort === 'date' ? 'on' : ''}"
                data-sort="date"
                onclick="event.stopPropagation(); v2SetSort('date')">제작일 ↓</button>
      </div>
    </div>
    <div class="ip-countbar">
      <span id="ip-count"><strong>${filtered.length}</strong>개 과정</span>
    </div>
    <div class="ip-list" id="ip-list">
      ${filtered.length
        ? filtered.map(v2EntItemHtml).join('')
        : '<div class="ip-empty">검색 결과가 없습니다.</div>'}
    </div>
  `;
}

/* ── 내 과정 목록 필터링 ──────────────────────────────── */
function v2FilteredCourses(courses) {
  const q = (document.getElementById('ip-q') || {}).value || '';
  const f = V2.ipFilter;
  const s = V2.ipSort;
  let result = courses.filter(c => {
    const matchF = f === 'all' || (c.tags || []).includes(f) || (c.category || '').includes(f);
    const matchQ = !q.trim() || c.title.toLowerCase().includes(q.toLowerCase());
    return matchF && matchQ;
  });
  if (s === 'name') result = [...result].sort((a, b) => a.title.localeCompare(b.title, 'ko'));
  else              result = [...result].sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
  return result;
}

/* ── 과정 목록 아이템 HTML ───────────────────────────── */
function v2EntItemHtml(c) {
  const ICONS  = { online: 'images/온라인.png', offline: 'images/오프라인.png', hybrid: 'images/하이브리드.png' };
  const LABELS = { online: '온라인', offline: '오프라인', hybrid: '블렌디드러닝' };
  const iconSrc = ICONS[c.kind] || '';
  const label   = LABELS[c.kind] || c.kind;
  return `
    <div class="ip-item" onclick="event.stopPropagation(); openEnterprisePreview('${esc(c.id)}')">
      <div class="ip-item-icon">
        ${iconSrc ? `<img src="${iconSrc}" alt="">` : ''}
      </div>
      <div class="ip-item-body">
        <div class="ip-item-title">${esc(c.title)}</div>
        <div class="ip-item-meta">
          <span class="ip-badge ip-badge-${c.kind}">${label}</span>
          <span>${esc(c.category || '')}</span>
        </div>
      </div>
      <div class="ip-item-date">${esc(c.createdAt || '')}</div>
      <span class="ip-item-arrow">${V2_ICONS.arrowRight}</span>
    </div>`;
}

/* ── 필터 / 정렬 갱신 (DOM만 업데이트) ──────────────── */
function v2SetFilter(val) {
  V2.ipFilter = val;
  document.querySelectorAll('.ip-chip').forEach(c => c.classList.toggle('on', c.dataset.val === val));
  v2IpUpdateList();
}
function v2SetSort(key) {
  V2.ipSort = key;
  document.querySelectorAll('.ip-sort-btn').forEach(b => b.classList.toggle('on', b.dataset.sort === key));
  v2IpUpdateList();
}
function v2IpFilter() { v2IpUpdateList(); }
function v2IpUpdateList() {
  const courses = (typeof ENT_COURSES !== 'undefined') ? ENT_COURSES : [];
  const result  = v2FilteredCourses(courses);
  const listEl  = document.getElementById('ip-list');
  const countEl = document.getElementById('ip-count');
  if (listEl)  listEl.innerHTML  = result.length ? result.map(v2EntItemHtml).join('') : '<div class="ip-empty">검색 결과가 없습니다.</div>';
  if (countEl) countEl.innerHTML = `<strong>${result.length}</strong>개 과정`;
}

/* ── 프리패키지드코스 패널 HTML ──────────────────────── */
function v2PkgPanel() {
  const tags = ['#품질관리', '#상품전략', '#판매관리', '#매출분석', '#마케팅', '#리더십'];
  const sections = [
    { id: 'online',  label: '온라인 코스' },
    { id: 'offline', label: '오프라인 코스' },
    { id: 'hybrid',  label: '하이브리드러닝' },
  ];

  const tagsHtml = tags.map(t => `
    <button class="pp-tag-btn"
            onclick="event.stopPropagation(); this.classList.toggle('on')">${esc(t)}</button>`).join('');

  const sectionsHtml = sections.map(sec => {
    const items = (typeof PKG_COURSES !== 'undefined' ? PKG_COURSES[sec.id] : null) || [];
    if (!items.length) return '';
    const cards = items.slice(0, 3).map(c => `
      <div class="pp-card" onclick="event.stopPropagation(); openPackagePreview('${sec.id}','${esc(c.id)}')">
        <div class="pp-thumb"><div class="pp-play">▶</div></div>
        <div class="pp-info">
          <div class="pp-title">${esc(c.title)}</div>
          <div class="pp-meta">${esc(c.meta || '')}</div>
          ${c.price ? `<div class="pp-price">${esc(c.price)}</div>` : ''}
        </div>
      </div>`).join('');
    return `
      <div class="pp-section-title">${esc(sec.label)}</div>
      <div class="pp-grid">${cards}</div>`;
  }).join('');

  return `
    <div class="ip-header">
      <span class="ip-header-title">
        ${V2_ICONS.package} 프리패키지드코스 불러오기
      </span>
      <button class="ip-close-btn" onclick="event.stopPropagation(); v2TogglePanel('hunet')">
        ${V2_ICONS.close} 닫기
      </button>
    </div>
    <div class="pp-search-row" onclick="event.stopPropagation()">
      <div class="ip-search" style="flex: 1; max-width: 280px;" onclick="event.stopPropagation()">
        ${V2_ICONS.search}
        <input class="ip-search-input" placeholder="패키지명으로 검색" onclick="event.stopPropagation()"/>
      </div>
    </div>
    <div class="pp-tag-row">${tagsHtml}</div>
    <div class="pp-scroll">
      ${sectionsHtml}
    </div>
  `;
}

/* ── 실행 ────────────────────────────────────────────── */
renderWizard(1);
</script>
</body>
</html>
