<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>러닝메이커 — 개선안 v0.2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800;1,14..32,400&display=swap" rel="stylesheet">
<style>
/* ─── Design Tokens ───────────────────────────────────── */
:root {
  --bg:           #FAFAF9;
  --surface:      #ffffff;
  --surface-2:    #f5f5f4;
  --surface-3:    #eeeeed;
  --border:       rgba(0,0,0,0.08);
  --border-md:    rgba(0,0,0,0.12);
  --border-strong:rgba(0,0,0,0.18);
  --text:         #1a1a18;
  --text-2:       #52524e;
  --text-3:       #a8a29e;
  --brand:        #ff7a00;
  --brand-soft:   #fff4eb;
  --brand-strong: #e86c00;
  --cta:          #191919;
  --cta-text:     #ffffff;
  --danger:       #dc2626;
  --danger-soft:  #fef2f2;
  --success:      #16a34a;
  --warn:         #d97706;
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.05);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
  --r4:  4px; --r6: 6px; --r8: 8px; --r12: 12px;
  --nav-w:  220px;
  --step-w: 252px;
  --header-h: 52px;
  --toc-w:    268px;
  --transition: 120ms ease;
}
[data-theme="dark"] {
  --bg:           #111110;
  --surface:      #1c1c1b;
  --surface-2:    #252524;
  --surface-3:    #2e2e2c;
  --border:       rgba(255,255,255,0.07);
  --border-md:    rgba(255,255,255,0.11);
  --border-strong:rgba(255,255,255,0.18);
  --text:         #ededec;
  --text-2:       #a8a29e;
  --text-3:       #57534e;
  --brand-soft:   rgba(255,122,0,0.12);
  --cta:          #ededed;
  --cta-text:     #111110;
  --shadow-xs: 0 1px 2px rgba(0,0,0,0.4);
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.06);
}

/* ─── Reset ────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-size:14px}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);
  -webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
input,select,textarea{font-family:inherit;font-size:14px}

/* ─── Topbar ────────────────────────────────────────────── */
.topbar{
  position:fixed;top:0;left:0;right:0;height:var(--header-h);
  background:#171a21;color:#fff;z-index:100;
  display:flex;align-items:center;padding:0 20px;gap:16px;
  border-bottom:1px solid #000;
}
.topbar .logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;letter-spacing:-0.3px}
.topbar .logo .l{color:#fff}
.topbar .logo .n{color:#ff7a00}
.topbar .tag{background:#242930;color:#9ca3af;font-size:11px;padding:2px 8px;border-radius:999px}
.topbar .spacer{flex:1}
.topbar .user{display:flex;align-items:center;gap:12px;font-size:13px}
.topbar .user .name{color:#e5e7eb;font-weight:500}
.topbar .theme-btn{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
  color:#d1d5db;padding:5px 10px;border-radius:var(--r6);font-size:12px;
  cursor:pointer;transition:background var(--transition);
}
.topbar .theme-btn:hover{background:rgba(255,255,255,0.14);color:#fff}

/* ─── Nav Sidebar ───────────────────────────────────────── */
.nav-sidebar{
  position:fixed;top:var(--header-h);left:0;bottom:0;width:var(--nav-w);
  background:var(--surface);border-right:1px solid var(--border);z-index:90;
  display:flex;flex-direction:column;overflow-y:auto;
}
.nav-studio{
  margin:12px 10px 8px;padding:10px 12px;border:1px solid var(--border-md);
  border-radius:var(--r8);display:flex;align-items:center;justify-content:space-between;
  background:var(--surface-2);cursor:pointer;transition:background var(--transition);
}
.nav-studio:hover{background:var(--surface-3)}
.nav-studio .lbl{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--text-2)}
.nav-studio .ext{font-size:11px;color:var(--text-3)}
.nav-menu{padding:4px 8px 24px;flex:1}
.nav-group{margin-bottom:2px}
.nav-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 10px;border-radius:var(--r6);color:var(--text-2);font-weight:600;font-size:13px;
  cursor:pointer;user-select:none;transition:background var(--transition),color var(--transition);
}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--brand-soft);color:var(--brand-strong)}
.nav-item .lhs{display:flex;align-items:center;gap:8px}
.nav-item .caret{font-size:10px;color:var(--text-3);transition:transform .18s}
.nav-group.open .nav-item .caret{transform:rotate(180deg)}
.nav-sub{padding:2px 8px 4px 34px;display:none}
.nav-group.open .nav-sub{display:block}
.nav-sub a{
  display:block;padding:7px 10px;border-radius:var(--r6);color:var(--text-2);font-size:12px;
  transition:background var(--transition),color var(--transition);
}
.nav-sub a:hover{background:var(--surface-2);color:var(--text)}
.nav-sub a.active{background:var(--surface-3);color:var(--text);font-weight:600}

/* ─── Main Layout ───────────────────────────────────────── */
.main-wrap{
  margin-left:var(--nav-w);padding-top:var(--header-h);
  min-height:100vh;background:var(--bg);
}

/* ─── Dashboard ─────────────────────────────────────────── */
.dash-inner{padding:32px 40px 80px;max-width:1100px}
.dash-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px}
.dash-header h1{font-size:24px;font-weight:800;letter-spacing:-0.4px}
.dash-header p{font-size:13px;color:var(--text-3);margin-top:2px}

.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border-md);margin-bottom:20px}
.tab{
  padding:9px 16px;font-size:13px;font-weight:600;color:var(--text-3);
  border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;
  transition:color var(--transition),border-color var(--transition);
}
.tab:hover{color:var(--text-2)}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.tab .count{
  display:inline-block;margin-left:6px;
  background:var(--surface-3);color:var(--text-2);
  font-size:11px;font-weight:700;padding:1px 6px;border-radius:999px;
}
.tab.active .count{background:var(--text);color:var(--bg)}

/* Course List */
.course-list{display:flex;flex-direction:column;gap:8px}
.course-row{
  display:flex;align-items:center;gap:16px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--r8);padding:14px 18px;
  transition:border-color var(--transition),box-shadow var(--transition);
  cursor:pointer;
}
.course-row:hover{border-color:var(--border-strong);box-shadow:var(--shadow-sm)}
.course-row .type-badge{
  flex-shrink:0;font-size:11px;font-weight:700;padding:3px 8px;
  border-radius:var(--r4);white-space:nowrap;
}
.type-badge.online{background:#eff6ff;color:#1d4ed8}
.type-badge.offline{background:#f0fdf4;color:#15803d}
.type-badge.hybrid{background:#faf5ff;color:#7e22ce}
.type-badge.single{background:#fff7ed;color:#c2410c}
[data-theme="dark"] .type-badge.online{background:rgba(29,78,216,.2);color:#93c5fd}
[data-theme="dark"] .type-badge.offline{background:rgba(21,128,61,.2);color:#86efac}
[data-theme="dark"] .type-badge.hybrid{background:rgba(126,34,206,.2);color:#d8b4fe}
[data-theme="dark"] .type-badge.single{background:rgba(194,65,12,.2);color:#fdba74}
.course-row .info{flex:1;min-width:0}
.course-row .title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.course-row .meta{display:flex;align-items:center;gap:10px;margin-top:3px}
.course-row .meta span{font-size:12px;color:var(--text-3)}
.course-row .meta .sep{color:var(--border-strong)}
.status-pill{
  flex-shrink:0;font-size:11px;font-weight:600;padding:3px 10px;
  border-radius:999px;white-space:nowrap;
}
.status-pill.create{background:var(--surface-2);color:var(--text-2)}
.status-pill.edit{background:#eff6ff;color:#1d4ed8}
.status-pill.ready{background:#f0fdf4;color:#15803d}
.status-pill.ongoing{background:#fff7ed;color:#c2410c}
.status-pill.done{background:var(--surface-3);color:var(--text-3)}
[data-theme="dark"] .status-pill.edit{background:rgba(29,78,216,.18);color:#93c5fd}
[data-theme="dark"] .status-pill.ready{background:rgba(21,128,61,.18);color:#86efac}
[data-theme="dark"] .status-pill.ongoing{background:rgba(194,65,12,.18);color:#fdba74}
.course-row .actions{display:flex;gap:6px;flex-shrink:0}

/* ─── Wizard Layout ─────────────────────────────────────── */
.wizard-wrap{
  display:flex;min-height:calc(100vh - var(--header-h));
}
/* Left Step Panel */
.step-panel{
  width:var(--step-w);flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  position:sticky;top:var(--header-h);height:calc(100vh - var(--header-h));overflow-y:auto;
}
.step-panel .course-name-area{
  padding:20px 20px 16px;border-bottom:1px solid var(--border);
}
.step-panel .course-name-label{font-size:11px;font-weight:600;color:var(--text-3);letter-spacing:0.5px;text-transform:uppercase;margin-bottom:6px}
.step-panel .course-name-val{
  font-size:14px;font-weight:700;color:var(--text);
  cursor:text;padding:6px 8px;border-radius:var(--r6);
  border:1px solid transparent;transition:border-color var(--transition),background var(--transition);
  word-break:break-all;
}
.step-panel .course-name-val:hover{background:var(--surface-2);border-color:var(--border-md)}
.step-panel .course-name-val.editing{border-color:var(--brand);background:#fff}
.step-list{padding:12px 12px;flex:1}
.step-item{
  display:flex;align-items:center;gap:12px;
  padding:10px 10px;border-radius:var(--r8);
  cursor:pointer;transition:background var(--transition);margin-bottom:2px;
  position:relative;
}
.step-item:hover:not(.active){background:var(--surface-2)}
.step-item.active{background:var(--brand-soft)}
.step-item .num{
  width:24px;height:24px;border-radius:999px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:700;
  border:2px solid var(--border-strong);color:var(--text-3);
  background:var(--surface);transition:all var(--transition);
}
.step-item.done .num{border-color:var(--brand);background:var(--brand);color:#fff}
.step-item.active .num{border-color:var(--brand-strong);color:var(--brand-strong)}
.step-item .step-lbl{font-size:13px;font-weight:600;color:var(--text-2)}
.step-item.active .step-lbl{color:var(--brand-strong)}
.step-item.done .step-lbl{color:var(--text-2)}
.step-item .check{font-size:11px;color:var(--brand);margin-left:auto}
.step-actions{
  padding:16px 16px 24px;border-top:1px solid var(--border);
  display:flex;gap:8px;
}
.back-btn-bar{
  display:flex;align-items:center;gap:10px;
  padding:12px 20px;border-bottom:1px solid var(--border);
  background:var(--surface-2);
}
.back-btn-bar button{
  display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;
  color:var(--text-2);padding:6px 10px;border-radius:var(--r6);
  transition:background var(--transition),color var(--transition);
}
.back-btn-bar button:hover{background:var(--surface-3);color:var(--text)}

/* ─── Step Content Area ─────────────────────────────────── */
.step-content{flex:1;min-width:0;display:flex;flex-direction:column}
.step-content-inner{padding:36px 48px 80px;max-width:800px}
.step-intro{margin-bottom:32px}
.step-intro h2{font-size:20px;font-weight:800;letter-spacing:-0.3px;margin-bottom:6px}
.step-intro p{font-size:13px;color:var(--text-2);line-height:1.6}

/* ─── Step 1 — 과정정보 ──────────────────────────────────── */
.field-group{margin-bottom:24px}
.label{font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:6px;display:block}
.label .req{color:var(--brand)}
.input{
  width:100%;padding:10px 14px;border:1px solid var(--border-strong);
  border-radius:var(--r6);background:var(--surface);color:var(--text);
  outline:none;transition:border-color var(--transition),box-shadow var(--transition);
}
.input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(255,122,0,.12)}
.input.lg{padding:12px 16px;font-size:15px}
.hint{font-size:12px;color:var(--text-3);margin-top:6px}

/* ─── Step 2 — 제작유형 ──────────────────────────────────── */
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.type-card{
  border:1.5px solid var(--border-md);border-radius:var(--r8);
  padding:20px 18px;cursor:pointer;background:var(--surface);
  transition:border-color var(--transition),box-shadow var(--transition),background var(--transition);
  display:flex;flex-direction:column;gap:8px;position:relative;
}
.type-card:hover{border-color:var(--border-strong);box-shadow:var(--shadow-sm)}
.type-card.selected{border-color:var(--brand);background:var(--brand-soft);box-shadow:0 0 0 3px rgba(255,122,0,.12)}
.type-card .t-icon{font-size:24px;margin-bottom:4px}
.type-card h3{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-0.2px}
.type-card p{font-size:12px;color:var(--text-2);line-height:1.55;flex:1}
.type-card .content-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.content-tag{
  font-size:11px;padding:2px 6px;border-radius:var(--r4);
  background:var(--surface-3);color:var(--text-2);
}
.type-card.selected .content-tag{background:rgba(255,122,0,.15);color:var(--brand-strong)}
.type-selected-check{
  position:absolute;top:12px;right:12px;
  width:18px;height:18px;border-radius:999px;
  background:var(--brand);color:#fff;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(0.6);transition:opacity var(--transition),transform var(--transition);
}
.type-card.selected .type-selected-check{opacity:1;transform:scale(1)}
.type-divider{
  grid-column:1/-1;display:flex;align-items:center;gap:12px;
  font-size:12px;color:var(--text-3);font-weight:600;margin:4px 0;
}
.type-divider::before,.type-divider::after{content:'';flex:1;height:1px;background:var(--border-md)}
.type-card.extra{border-style:dashed}

/* ─── Step 3 — 목차/콘텐츠 ─────────────────────────────── */
.step3-wrap{
  display:flex;flex:1;min-height:0;
  border-top:1px solid var(--border);
}
.toc-panel{
  width:var(--toc-w);flex-shrink:0;
  border-right:1px solid var(--border);
  background:var(--surface);
  display:flex;flex-direction:column;
  overflow-y:auto;
}
.toc-panel-head{
  padding:16px 16px 12px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--surface);z-index:10;
}
.toc-panel-head .tit{font-size:13px;font-weight:700;color:var(--text)}
.toc-items{padding:8px 8px}
.toc-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 10px;border-radius:var(--r6);cursor:pointer;
  transition:background var(--transition);position:relative;
  border:1px solid transparent;
}
.toc-row:hover{background:var(--surface-2)}
.toc-row.active{background:var(--brand-soft);border-color:rgba(255,122,0,.2)}
.toc-row .drag-handle{color:var(--text-3);font-size:12px;cursor:grab;flex-shrink:0}
.toc-row .toc-name{flex:1;font-size:13px;font-weight:600;color:var(--text);min-width:0;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.toc-row.active .toc-name{color:var(--brand-strong)}
.toc-row .toc-count{font-size:11px;color:var(--text-3);flex-shrink:0}
.toc-add-btn{
  margin:8px 8px 16px;padding:9px;border-radius:var(--r6);
  border:1.5px dashed var(--border-strong);
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:12px;font-weight:600;color:var(--text-3);
  cursor:pointer;transition:border-color var(--transition),color var(--transition),background var(--transition);
}
.toc-add-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}

/* Content Panel */
.content-panel{
  flex:1;min-width:0;display:flex;flex-direction:column;overflow-y:auto;
}
.content-panel-head{
  padding:14px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;background:var(--surface-2);z-index:9;
}
.content-panel-head .tit{font-size:13px;font-weight:700;color:var(--text)}
.content-panel-head .tit .toc-ref{font-weight:400;color:var(--text-3);margin-left:6px;font-size:12px}
.content-items{padding:12px 16px;display:flex;flex-direction:column;gap:8px;flex:1}
.content-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border:1px solid var(--border);border-radius:var(--r8);
  background:var(--surface);transition:border-color var(--transition),box-shadow var(--transition);
}
.content-row:hover{border-color:var(--border-strong);box-shadow:var(--shadow-xs)}
.content-row .c-icon{width:32px;height:32px;border-radius:var(--r6);background:var(--surface-2);
  display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.content-row .c-info{flex:1;min-width:0}
.content-row .c-title{font-size:13px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.content-row .c-meta{font-size:11px;color:var(--text-3);margin-top:2px}
.content-row .c-actions{display:flex;gap:4px;flex-shrink:0}
.content-add-area{
  margin:0 16px 16px;padding:20px;
  border:1.5px dashed var(--border-strong);border-radius:var(--r8);
  display:flex;flex-direction:column;align-items:center;gap:12px;
  background:var(--surface);
}
.content-add-area .add-title{font-size:13px;font-weight:600;color:var(--text-2)}
.content-add-methods{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.add-method-btn{
  display:flex;align-items:center;gap:6px;
  padding:8px 14px;border:1px solid var(--border-strong);border-radius:var(--r6);
  font-size:12px;font-weight:600;color:var(--text-2);background:var(--surface);
  cursor:pointer;transition:border-color var(--transition),color var(--transition),background var(--transition);
}
.add-method-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}

/* Content Add Mode (drawer-like inline) */
.content-add-mode{
  flex:1;display:flex;flex-direction:column;
}
.content-add-back{
  padding:12px 20px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;background:var(--surface-2);
}
.content-add-back button{
  display:flex;align-items:center;gap:6px;
  font-size:13px;font-weight:600;color:var(--text-2);
  padding:5px 10px;border-radius:var(--r6);
  transition:background var(--transition),color var(--transition);
}
.content-add-back button:hover{background:var(--surface-3);color:var(--text)}
.content-add-back .add-mode-title{font-size:14px;font-weight:700;color:var(--text)}
.add-upload-area{padding:24px;flex:1}
.upload-zone{
  border:2px dashed var(--border-strong);border-radius:var(--r8);
  padding:48px 24px;text-align:center;cursor:pointer;
  transition:border-color var(--transition),background var(--transition);
  background:var(--surface);
}
.upload-zone:hover{border-color:var(--brand);background:var(--brand-soft)}
.upload-zone .zone-ico{font-size:32px;margin-bottom:12px}
.upload-zone .zone-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px}
.upload-zone .zone-sub{font-size:12px;color:var(--text-3);line-height:1.6}
.upload-type-list{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px}
.upload-type-item{
  display:flex;align-items:center;gap:8px;
  padding:12px 16px;border:1px solid var(--border-strong);border-radius:var(--r8);
  background:var(--surface);cursor:pointer;flex:1;min-width:140px;
  transition:border-color var(--transition),box-shadow var(--transition);
}
.upload-type-item:hover{border-color:var(--brand);box-shadow:0 0 0 3px rgba(255,122,0,.1)}
.upload-type-item .ico{font-size:20px}
.upload-type-item .lbl{font-size:13px;font-weight:600;color:var(--text)}

/* ─── Step 4/5 — 아코디언 설정 ──────────────────────────── */
.setting-list{display:flex;flex-direction:column;gap:2px}
.setting-block{
  border:1px solid var(--border);border-radius:var(--r8);overflow:hidden;
  background:var(--surface);
}
.setting-block.open{border-color:var(--brand);box-shadow:0 0 0 3px rgba(255,122,0,.08)}
.setting-row{
  display:flex;align-items:flex-start;gap:16px;padding:16px 18px;
  cursor:pointer;transition:background var(--transition);
}
.setting-row:hover{background:var(--surface-2)}
.setting-row .key{font-size:13px;font-weight:700;color:var(--text);width:180px;flex-shrink:0;line-height:1.5;padding-top:1px}
.setting-row .val{flex:1;font-size:13px;color:var(--text-2);line-height:1.55}
.setting-row .val .em{color:var(--text);font-weight:700}
.setting-row .val .desc{font-size:12px;color:var(--text-3);margin-top:3px}
.setting-row .edit-btn{font-size:12px;font-weight:600;color:var(--text-3);white-space:nowrap;
  padding:4px 8px;border-radius:var(--r4);transition:background var(--transition),color var(--transition)}
.setting-row .edit-btn:hover{background:var(--surface-3);color:var(--text)}
.setting-edit{padding:0 18px 18px;border-top:1px solid var(--border)}
.opt-row{
  display:flex;align-items:flex-start;gap:12px;padding:12px;
  border:1.5px solid var(--border-md);border-radius:var(--r8);
  margin-top:12px;cursor:pointer;transition:border-color var(--transition),background var(--transition);
}
.opt-row.selected{border-color:var(--brand);background:var(--brand-soft)}
.opt-row input[type=radio]{margin-top:2px;accent-color:var(--brand)}
.opt-content .opt-title{font-size:13px;font-weight:700;color:var(--text)}
.opt-content .opt-desc{font-size:12px;color:var(--text-2);margin-top:3px;line-height:1.5}
.opt-content .opt-controls{margin-top:10px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.edit-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.toggle-block{margin-top:12px}
.toggle-switch{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.toggle-switch input{position:absolute;opacity:0;width:0;height:0}
.track{
  width:40px;height:22px;border-radius:999px;background:var(--border-strong);
  position:relative;transition:background .2s;flex-shrink:0;
}
.toggle-switch input:checked + .track{background:var(--brand)}
.thumb{
  position:absolute;top:3px;left:3px;
  width:16px;height:16px;border-radius:999px;background:#fff;
  transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.toggle-switch input:checked + .track .thumb{transform:translateX(18px)}
.toggle-label{font-size:13px;font-weight:600;color:var(--text)}
.inline-num{width:70px;padding:6px 10px;border-radius:var(--r4);border:1px solid var(--border-strong);background:var(--surface);color:var(--text)}
.period-grid{display:grid;grid-template-columns:80px 1fr auto 1fr;align-items:center;gap:8px;margin-top:10px;font-size:13px}
.period-lbl{font-size:12px;color:var(--text-2);font-weight:600}

/* ─── Step 6 — 오픈 ─────────────────────────────────────── */
.open-check-list{display:flex;flex-direction:column;gap:10px;margin-bottom:32px}
.open-check-item{
  display:flex;align-items:center;gap:12px;padding:14px 16px;
  border:1px solid var(--border);border-radius:var(--r8);background:var(--surface);
}
.open-check-item.ok{border-color:rgba(22,163,74,.3);background:#f0fdf4}
.open-check-item.warn{border-color:rgba(217,119,6,.3);background:#fffbeb}
.open-check-item.error{border-color:rgba(220,38,38,.3);background:var(--danger-soft)}
[data-theme="dark"] .open-check-item.ok{background:rgba(22,163,74,.1)}
[data-theme="dark"] .open-check-item.warn{background:rgba(217,119,6,.1)}
[data-theme="dark"] .open-check-item.error{background:rgba(220,38,38,.1)}
.check-icon{width:24px;height:24px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.open-check-item.ok .check-icon{background:var(--success);color:#fff}
.open-check-item.warn .check-icon{background:var(--warn);color:#fff}
.open-check-item.error .check-icon{background:var(--danger);color:#fff}
.check-body{flex:1}
.check-body .clbl{font-size:13px;font-weight:700;color:var(--text)}
.check-body .cdesc{font-size:12px;color:var(--text-2);margin-top:2px}
.check-body .clink{font-size:12px;color:var(--brand);font-weight:600;cursor:pointer}
.check-body .clink:hover{text-decoration:underline}

/* ─── Buttons ───────────────────────────────────────────── */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:8px 14px;border-radius:var(--r6);border:1px solid var(--border-strong);
  background:var(--surface);color:var(--text-2);font-size:13px;font-weight:600;
  cursor:pointer;transition:background var(--transition),border-color var(--transition),color var(--transition),transform 60ms;
  white-space:nowrap;
}
.btn:hover{border-color:var(--border-strong);color:var(--text);background:var(--surface-2)}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--cta);color:var(--cta-text);border-color:var(--cta)}
.btn-primary:hover{background:#2d2d2d;border-color:#2d2d2d;color:var(--cta-text)}
[data-theme="dark"] .btn-primary:hover{background:#fff;border-color:#fff;color:#111}
.btn-brand{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-brand:hover{background:var(--brand-strong);border-color:var(--brand-strong);color:#fff}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-2)}
.btn-ghost:hover{background:var(--surface-2);border-color:transparent}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:6px;border-radius:var(--r6);color:var(--text-3);display:inline-flex;align-items:center}
.btn-icon:hover{background:var(--surface-2);color:var(--text)}
.btn-block{width:100%;justify-content:center}

/* ─── Toast ─────────────────────────────────────────────── */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  border-radius:var(--r8);background:var(--cta);color:var(--cta-text);
  font-size:13px;font-weight:600;pointer-events:auto;
  box-shadow:var(--shadow-md);max-width:320px;
  animation:toastIn .18s ease;
}
.toast.success{background:#15803d;color:#fff}
.toast.warn{background:#d97706;color:#fff}
.toast.error{background:#dc2626;color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ─── Misc ──────────────────────────────────────────────── */
.breadcrumb{font-size:12px;color:var(--text-3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.breadcrumb .sep{color:var(--text-3)}
.empty-state{text-align:center;padding:64px 24px;color:var(--text-3)}
.empty-state .ico{font-size:36px;margin-bottom:12px}
.empty-state .ttl{font-size:15px;font-weight:700;color:var(--text-2);margin-bottom:6px}
.empty-state p{font-size:13px;line-height:1.6}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700}
.badge-orange{background:var(--brand-soft);color:var(--brand-strong)}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center}
.modal-mask.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r12);padding:28px;min-width:380px;max-width:520px;box-shadow:var(--shadow-md)}
.modal h3{font-size:16px;font-weight:800;margin-bottom:12px}
.modal p{font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:16px}
.modal .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.sr-only{position:absolute;width:1px;height:1px;clip:rect(0,0,0,0);overflow:hidden}
hr.divider{border:none;border-top:1px solid var(--border);margin:24px 0}
</style>
</head>

<script>
/* ═══════════════════════════════════════════════════════════
   State
═══════════════════════════════════════════════════════════ */
let STATE = {
  courseName: '',
  creationType: null,
  toc: [
    { id:'t1', title:'오리엔테이션', contents:[
        {id:'c1',type:'video',icon:'🎬',title:'과정 소개 영상',dur:'05:32'},
        {id:'c2',type:'file',icon:'📎',title:'학습 가이드.pdf',dur:''}
      ]},
    { id:'t2', title:'1장. 핵심 개념 이해', contents:[
        {id:'c3',type:'video',icon:'🎬',title:'핵심 개념 영상',dur:'12:40'},
        {id:'c4',type:'quiz',icon:'❓',title:'이해도 확인 퀴즈',dur:''}
      ]},
    { id:'t3', title:'2장. 실전 적용', contents:[] }
  ],
  activeTocId: 't1',
  contentAddMode: null,
  step4Open: null,
  step5Open: null,
  enrollSettings: {
    learningPeriod: { immediate:true, days:365, applyFrom:'', applyTo:'', learnFrom:'', learnTo:'' },
    capacity: '제한없음',
    completion: 'immediate',
    progressThreshold: 80
  },
  extraSettings: { sequential:false, progressLock:false, speedLock:false, captureBlock:false, watermark:false }
};

const DASHBOARD_DATA = [
  { title:'생생경영학', kind:'online', status:'create', mod:'오늘' },
  { title:'AI 마스터 전문교육과정', kind:'online', status:'create', mod:'어제' },
  { title:'AI 리터러시 교육', kind:'hybrid', status:'edit', mod:'3일 전' },
  { title:'2026년 2차 DVP Ⅳ 과정', kind:'offline', status:'ready', applyEnd:'2026-05-25', learnFrom:'2026-06-01', learnTo:'2026-07-31' },
  { title:'CNA(11기)', kind:'online', status:'ready', applyEnd:'2026-05-15', learnFrom:'2026-05-20', learnTo:'2026-06-30' },
  { title:'2026년 신입사원 Jump Up 과정', kind:'hybrid', status:'ready', learnFrom:'2026-07-01', learnTo:'2026-08-31' },
  { title:'경영능력 평가 양성과정', kind:'online', status:'ready', learnFrom:'2026-05-15', learnTo:'2026-06-30' },
  { title:'데이터기반 문제해결 기본과정', kind:'online', status:'ongoing', learnFrom:'2026-04-15', learnTo:'2026-06-15' },
  { title:'경력사원 입문교육', kind:'offline', status:'done', certify:'completed' },
  { title:'2025년 7차 DVP Ⅱ 과정', kind:'offline', status:'done', certify:'processing' },
  { title:'2025년 데이터기반 문제해결(3차)', kind:'online', status:'done', certify:'completed' },
];

const WIZARD_STEPS = [
  { n:1, label:'과정정보' },
  { n:2, label:'제작유형' },
  { n:3, label:'목차·콘텐츠' },
  { n:4, label:'신청·학습 설정' },
  { n:5, label:'부가 설정' },
  { n:6, label:'오픈' }
];

const TYPE_DEFS = [
  { id:'online', icon:'▶', label:'온라인 과정', sub:'동영상 중심의 이러닝 과정을 제작합니다.', kind:'online',
    tags:['동영상','아티클','첨부파일','시험','과제','설문'] },
  { id:'offline', icon:'📅', label:'오프라인 교육', sub:'오프라인 일정과 회차를 빠르게 구성합니다.', kind:'offline',
    tags:['오프라인'] },
  { id:'blended', icon:'🔀', label:'블렌디드 러닝', sub:'오프라인 교육에 사전·사후 온라인 콘텐츠를 추가합니다.', kind:'offline',
    tags:['오프라인','시험','과제','설문','동영상'] },
  { id:'hybrid', icon:'🔗', label:'혼합 학습', sub:'온·오프라인 콘텐츠를 자유롭게 결합합니다.', kind:'hybrid',
    tags:['오프라인','동영상','시험','토론','설문'] },
  { id:'single', icon:'⚡', label:'단일 콘텐츠', sub:'콘텐츠 1개로 빠르게 과정을 만듭니다.', kind:'online',
    tags:['동영상 또는 아티클 또는 PDF'] },
  { id:'single-plus', icon:'📦', label:'단일 콘텐츠 + 자료', sub:'핵심 콘텐츠 1개에 부가자료를 추가합니다.', kind:'online',
    tags:['동영상','이미지','퀴즈','설문'] },
];

/* ═══════════════════════════════════════════════════════════
   Router
═══════════════════════════════════════════════════════════ */
function go(hash) { location.hash = '/' + hash; }

window.addEventListener('hashchange', route);
window.addEventListener('load', route);

function route() {
  const h = location.hash.replace(/^#\/?/, '') || 'dashboard';
  const view = document.getElementById('view');
  const navDash = document.getElementById('nav-dashboard');
  const navWiz = document.getElementById('nav-wizard');
  if (navDash) navDash.classList.remove('active');
  if (navWiz) navWiz.classList.remove('active');

  if (h === 'dashboard' || h === '') {
    if (navDash) navDash.classList.add('active');
    renderDashboard();
  } else if (h.startsWith('wizard/')) {
    if (navWiz) navWiz.classList.add('active');
    const step = parseInt(h.split('/')[1]) || 1;
    renderWizard(step);
  } else if (h === 'placeholder') {
    renderPlaceholder();
  } else {
    renderDashboard();
  }
}

/* ═══════════════════════════════════════════════════════════
   Dashboard — List View
═══════════════════════════════════════════════════════════ */
let dashTab = 'all';

function renderDashboard() {
  const view = document.getElementById('view');
  const kindLabel = {online:'온라인',offline:'오프라인',hybrid:'혼합 학습',single:'단일 콘텐츠','single-plus':'단일+자료'};
  const statusLabel = {create:'과정 생성',edit:'콘텐츠 편집',ready:'오픈 예정',ongoing:'학습 중',done:'학습 완료'};

  const tabs = [
    {id:'all', label:'전체', items: DASHBOARD_DATA},
    {id:'active', label:'진행중', items: DASHBOARD_DATA.filter(d=>['create','edit','ready','ongoing'].includes(d.status))},
    {id:'done', label:'학습 완료', items: DASHBOARD_DATA.filter(d=>d.status==='done')},
  ];
  const current = tabs.find(t=>t.id===dashTab) || tabs[0];
  const items = current.items;

  view.innerHTML = `
    <div class="dash-inner">
      <div class="breadcrumb">러닝메이커</div>
      <div class="dash-header">
        <div>
          <h1>러닝메이커 보드</h1>
          <p style="margin-top:4px;font-size:13px;color:var(--text-3)">과정의 전체 생애주기를 한눈에 관리하세요.</p>
        </div>
        <button class="btn btn-primary" onclick="startNewCourse()">+ 새 과정 만들기</button>
      </div>
      <div class="tab-bar">
        ${tabs.map(t=>`
          <div class="tab ${t.id===dashTab?'active':''}" onclick="setDashTab('${t.id}')">
            ${t.label} <span class="count">${t.items.length}</span>
          </div>
        `).join('')}
      </div>
      <div class="course-list">
        ${items.length === 0 ? `<div class="empty-state"><div class="ico">📋</div><div class="ttl">과정이 없습니다</div><p>새 과정을 만들어 시작해보세요.</p></div>` :
          items.map(item => {
            const kl = kindLabel[item.kind] || item.kind;
            const sl = statusLabel[item.status] || item.status;
            let meta = '';
            if (item.learnFrom && item.learnTo) meta = `학습 ${item.learnFrom} ~ ${item.learnTo}`;
            else if (item.mod) meta = `수정 ${item.mod}`;
            const certify = item.certify === 'processing' ? '수료 처리 중' : item.certify === 'completed' ? '수료 완료' : '';
            return `
              <div class="course-row" onclick="openCourse('${item.status}')">
                <span class="type-badge ${item.kind}">${kl}</span>
                <div class="info">
                  <div class="title">${esc(item.title)}</div>
                  <div class="meta">
                    <span>${meta || ''}</span>
                    ${certify ? `<span class="sep">·</span><span>${certify}</span>` : ''}
                  </div>
                </div>
                <span class="status-pill ${item.status}">${sl}</span>
                <div class="actions">
                  <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();openCourse('${item.status}')">편집</button>
                </div>
              </div>
            `;
          }).join('')
        }
      </div>
    </div>
  `;
}

function setDashTab(id) { dashTab = id; renderDashboard(); }

function openCourse(status) {
  if (status === 'create') go('wizard/1');
  else if (status === 'edit') go('wizard/3');
  else if (status === 'ready') go('wizard/6');
  else go('wizard/3');
}

function startNewCourse() {
  STATE.courseName = '';
  STATE.creationType = null;
  go('wizard/1');
}

/* ═══════════════════════════════════════════════════════════
   Wizard Shell — Left/Right Split
═══════════════════════════════════════════════════════════ */
let currentStep = 1;

function renderWizard(step) {
  currentStep = step;
  const view = document.getElementById('view');
  let rightHtml = '';
  if (step === 1) rightHtml = renderStep1();
  else if (step === 2) rightHtml = renderStep2();
  else if (step === 3) rightHtml = renderStep3Shell();
  else if (step === 4) rightHtml = renderStep4();
  else if (step === 5) rightHtml = renderStep5();
  else if (step === 6) rightHtml = renderStep6();

  view.innerHTML = `
    <div class="wizard-wrap">
      ${stepPanelHtml(step)}
      <div class="step-content" id="stepContent">
        ${step !== 3 ? `<div class="step-content-inner">${rightHtml}</div>` : rightHtml}
      </div>
    </div>
  `;
  if (step === 3) bindStep3();
}

function stepPanelHtml(current) {
  const name = STATE.courseName || '새 과정';
  return `
    <div class="step-panel">
      <div class="course-name-area">
        <div class="course-name-label">과정명</div>
        <div class="course-name-val" id="courseNameVal" onclick="editCourseName()"
          title="클릭하여 수정">${esc(name)}</div>
      </div>
      <div class="step-list">
        ${WIZARD_STEPS.map(s => {
          const done = s.n < current;
          const active = s.n === current;
          return `
            <div class="step-item ${done?'done':''} ${active?'active':''}"
              onclick="${done ? `go('wizard/${s.n}')` : active ? '' : 'void(0)'}">
              <div class="num">${done ? '✓' : s.n}</div>
              <div class="step-lbl">${s.label}</div>
              ${done ? `<span class="check">✓</span>` : ''}
            </div>
          `;
        }).join('')}
      </div>
      <div class="step-actions">
        ${current > 1 ? `<button class="btn" onclick="go('wizard/${current-1}')">← 이전</button>` : `<span></span>`}
        ${current < 6
          ? `<button class="btn btn-primary" style="flex:1" onclick="nextStep(${current})">다음 →</button>`
          : `<button class="btn btn-brand" style="flex:1" onclick="openCourse_launch()">🚀 오픈하기</button>`
        }
      </div>
    </div>
  `;
}

function editCourseName() {
  const el = document.getElementById('courseNameVal');
  if (!el) return;
  const cur = STATE.courseName || '';
  el.innerHTML = `<input class="input" id="cnInput" value="${esc(cur)}" style="font-size:13px;" autofocus />`;
  el.classList.add('editing');
  const inp = document.getElementById('cnInput');
  inp.focus(); inp.select();
  const save = () => {
    const v = inp.value.trim();
    if (v.length >= 2) { STATE.courseName = v; }
    renderWizard(currentStep);
  };
  inp.addEventListener('blur', save);
  inp.addEventListener('keydown', e => { if(e.key==='Enter') inp.blur(); if(e.key==='Escape'){STATE.courseName=cur; renderWizard(currentStep);} });
}

function nextStep(step) {
  if (step === 1) {
    const v = STATE.courseName.trim();
    if (v.length < 2) { toast('과정명을 2자 이상 입력해주세요.', 'warn'); return; }
  }
  if (step === 2 && !STATE.creationType) { toast('제작유형을 선택해주세요.', 'warn'); return; }
  go('wizard/' + (step + 1));
}

/* ═══════════════════════════════════════════════════════════
   Step 1 — 과정정보
═══════════════════════════════════════════════════════════ */
function renderStep1() {
  return `
    <div class="step-intro">
      <h2>새로운 과정을 만들어볼게요</h2>
      <p>제작할 과정의 이름을 입력하세요. 과정명은 나중에 언제든지 수정할 수 있습니다.</p>
    </div>
    <div class="field-group" style="max-width:480px">
      <label class="label">과정명 <span class="req">*</span></label>
      <input class="input lg" id="courseNameInput" placeholder="예: 신입사원 리더십 과정"
        value="${esc(STATE.courseName)}" autofocus
        oninput="STATE.courseName=this.value"
        onkeydown="if(event.key==='Enter')nextStep(1)" />
      <div class="hint">2자 이상 입력해주세요.</div>
    </div>
    <hr class="divider" style="max-width:480px">
    <div class="field-group" style="max-width:480px">
      <label class="label">과정 설명 <span style="color:var(--text-3);font-weight:400">(선택)</span></label>
      <textarea class="input" rows="3" placeholder="과정의 목적이나 주요 내용을 간략히 설명해주세요." style="resize:vertical"></textarea>
    </div>
    <div class="field-group" style="max-width:480px">
      <label class="label">카테고리</label>
      <select class="input">
        <option>리더십</option><option>직무역량</option><option>필수교육</option>
        <option>데이터/AI</option><option>경영전략</option><option>기타</option>
      </select>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════
   Step 2 — 제작유형
═══════════════════════════════════════════════════════════ */
function renderStep2() {
  return `
    <div class="step-intro">
      <h2>어떤 방식으로 만드시나요?</h2>
      <p>제작 방식을 선택하면 콘텐츠 유형과 구성 방식이 결정됩니다.</p>
    </div>
    <div class="type-grid">
      ${TYPE_DEFS.slice(0,4).map(t => typeCard(t)).join('')}
      <div class="type-divider">단일 콘텐츠 방식</div>
      ${TYPE_DEFS.slice(4).map(t => typeCard(t)).join('')}
    </div>
    <hr class="divider">
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <div class="type-card extra" style="max-width:240px" onclick="toast('이전 제작과정 불러오기 (프로토타입)')">
        <div class="t-icon">📁</div>
        <h3>이전 과정 불러오기</h3>
        <p style="font-size:12px;color:var(--text-2)">기존에 만든 과정을 기반으로 수정·재활용합니다.</p>
      </div>
      <div class="type-card extra" style="max-width:240px" onclick="toast('프리패키지드 코스 (프로토타입)')">
        <div class="t-icon">🏫</div>
        <h3>프리패키지드 코스</h3>
        <p style="font-size:12px;color:var(--text-2)">LABS가 설계한 구성을 가져와 수정합니다.</p>
      </div>
    </div>
  `;
}

function typeCard(t) {
  const sel = STATE.creationType === t.id;
  return `
    <div class="type-card ${sel?'selected':''}" onclick="selectType('${t.id}')">
      <div class="type-selected-check">✓</div>
      <div class="t-icon">${t.icon}</div>
      <h3>${t.label}</h3>
      <p>${t.sub}</p>
      <div class="content-tags">
        ${t.tags.map(tag=>`<span class="content-tag">${tag}</span>`).join('')}
      </div>
    </div>
  `;
}

function selectType(id) {
  STATE.creationType = id;
  renderWizard(2);
  toast(`"${TYPE_DEFS.find(t=>t.id===id)?.label}" 선택됨`, 'success');
}

/* ═══════════════════════════════════════════════════════════
   Step 3 — 목차 / 콘텐츠 (Three-panel)
═══════════════════════════════════════════════════════════ */
function renderStep3Shell() {
  return `<div class="step3-wrap" id="step3Wrap">
    ${renderTocPanel()}
    ${renderContentPanel()}
  </div>`;
}

function renderTocPanel() {
  return `
    <div class="toc-panel" id="tocPanel">
      <div class="toc-panel-head">
        <span class="tit">목차 구성</span>
        <button class="btn btn-sm" onclick="addToc()">+ 목차</button>
      </div>
      <div class="toc-items" id="tocItems">
        ${STATE.toc.map(t => `
          <div class="toc-row ${STATE.activeTocId===t.id?'active':''}" onclick="selectToc('${t.id}')">
            <span class="drag-handle">⠿</span>
            <span class="toc-name" title="${esc(t.title)}">${esc(t.title)}</span>
            <span class="toc-count">${t.contents.length}</span>
          </div>
        `).join('')}
      </div>
      <button class="toc-add-btn" onclick="addToc()">+ 목차 추가</button>
    </div>
  `;
}

function renderContentPanel() {
  const toc = STATE.toc.find(t => t.id === STATE.activeTocId);
  if (STATE.contentAddMode) return renderContentAddMode();
  return `
    <div class="content-panel" id="contentPanel">
      <div class="content-panel-head">
        <span class="tit">
          콘텐츠
          <span class="toc-ref">${toc ? esc(toc.title) : ''}</span>
        </span>
        ${toc ? `<button class="btn btn-sm btn-brand" onclick="openContentAdd()">+ 콘텐츠 추가</button>` : ''}
      </div>
      <div class="content-items" id="contentItems">
        ${toc && toc.contents.length > 0
          ? toc.contents.map(c => `
            <div class="content-row">
              <div class="c-icon">${c.icon}</div>
              <div class="c-info">
                <div class="c-title">${esc(c.title)}</div>
                <div class="c-meta">${c.type} ${c.dur ? '· ' + c.dur : ''}</div>
              </div>
              <div class="c-actions">
                <button class="btn-icon btn-sm" title="편집" onclick="toast('콘텐츠 편집 (프로토타입)')">✏️</button>
                <button class="btn-icon btn-sm" title="삭제" onclick="removeContent('${toc.id}','${c.id}')">🗑</button>
              </div>
            </div>
          `).join('')
          : `<div class="empty-state" style="padding:48px 24px">
              <div class="ico">📄</div>
              <div class="ttl">콘텐츠가 없습니다</div>
              <p>위 '+ 콘텐츠 추가' 버튼으로 콘텐츠를 추가하세요.</p>
             </div>`
        }
      </div>
      ${toc ? `
        <div class="content-add-area">
          <div class="add-title">콘텐츠 추가 방식 선택</div>
          <div class="content-add-methods">
            <button class="add-method-btn" onclick="openContentAdd('upload')">📤 새 파일 업로드</button>
            <button class="add-method-btn" onclick="openContentAdd('library')">🔍 라이브러리 검색</button>
            <button class="add-method-btn" onclick="openContentAdd('online')">▶ 온라인 과정 추가</button>
          </div>
        </div>
      ` : ''}
    </div>
  `;
}

function renderContentAddMode() {
  const toc = STATE.toc.find(t => t.id === STATE.activeTocId);
  const mode = STATE.contentAddMode;
  const modeTitle = {upload:'새 파일 업로드', library:'라이브러리 검색', online:'온라인 과정 추가'}[mode] || '콘텐츠 추가';
  return `
    <div class="content-panel" id="contentPanel">
      <div class="content-add-back">
        <button onclick="closeContentAdd()">← 돌아가기</button>
        <span class="add-mode-title">${modeTitle}</span>
        ${toc ? `<span style="font-size:12px;color:var(--text-3);margin-left:4px">· ${esc(toc.title)}</span>` : ''}
      </div>
      <div class="add-upload-area">
        <div class="upload-zone" onclick="toast('파일 선택 (프로토타입)')">
          <div class="zone-ico">📤</div>
          <div class="zone-title">파일을 여기에 드래그하거나 클릭하여 업로드</div>
          <div class="zone-sub">MP4, PDF, PPTX, DOCX, ZIP 등 지원<br>최대 2GB</div>
        </div>
        <div class="upload-type-list">
          ${[{ico:'🎬',lbl:'동영상'},{ico:'📎',lbl:'PDF'},{ico:'✍️',lbl:'아티클'},{ico:'▶',lbl:'유튜브'},{ico:'❓',lbl:'퀴즈'},{ico:'📊',lbl:'설문'},{ico:'📝',lbl:'시험'}].map(t=>`
            <div class="upload-type-item" onclick="addSampleContent('${t.lbl}','${t.ico}')">
              <span class="ico">${t.ico}</span>
              <span class="lbl">${t.lbl}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `;
}

function bindStep3() {
  // 추후 drag&drop 바인딩 등
}

function selectToc(id) {
  STATE.activeTocId = id;
  STATE.contentAddMode = null;
  const wrap = document.getElementById('step3Wrap');
  if (wrap) wrap.innerHTML = renderTocPanel() + renderContentPanel();
}

function addToc() {
  const title = '새 목차 ' + (STATE.toc.length + 1);
  const id = 't' + Date.now();
  STATE.toc.push({ id, title, contents:[] });
  STATE.activeTocId = id;
  STATE.contentAddMode = null;
  const wrap = document.getElementById('step3Wrap');
  if (wrap) wrap.innerHTML = renderTocPanel() + renderContentPanel();
  toast('목차가 추가됐습니다.', 'success');
}

function openContentAdd(mode) {
  STATE.contentAddMode = mode || 'upload';
  const wrap = document.getElementById('step3Wrap');
  if (wrap) wrap.innerHTML = renderTocPanel() + renderContentAddMode();
}

function closeContentAdd() {
  STATE.contentAddMode = null;
  const wrap = document.getElementById('step3Wrap');
  if (wrap) wrap.innerHTML = renderTocPanel() + renderContentPanel();
}

function addSampleContent(label, icon) {
  const toc = STATE.toc.find(t => t.id === STATE.activeTocId);
  if (!toc) return;
  toc.contents.push({ id:'c'+Date.now(), type:label, icon, title:label + ' ' + (toc.contents.length+1), dur:'' });
  closeContentAdd();
  toast(`${label} 콘텐츠가 추가됐습니다.`, 'success');
}

function removeContent(tocId, cId) {
  const toc = STATE.toc.find(t => t.id === tocId);
  if (!toc) return;
  toc.contents = toc.contents.filter(c => c.id !== cId);
  const wrap = document.getElementById('step3Wrap');
  if (wrap) wrap.innerHTML = renderTocPanel() + renderContentPanel();
  toast('콘텐츠가 삭제됐습니다.');
}

/* ═══════════════════════════════════════════════════════════
   Step 4 — 신청·학습 설정
═══════════════════════════════════════════════════════════ */
function renderStep4() {
  const s = STATE.enrollSettings;
  const rows = [
    { key:'learningPeriod', label:'신청 및 학습기간',
      summary: s.learningPeriod.immediate
        ? `<span class="em">즉시 학습</span> · 신청일부터 <span class="em">${s.learningPeriod.days}일</span>간 학습`
        : `<span class="em">기간 학습</span> · ${s.learningPeriod.learnFrom||'?'} ~ ${s.learningPeriod.learnTo||'?'}`,
      bodyFn: editPanel_LearningPeriod },
    { key:'capacity', label:'모집 정원',
      summary: `<span class="em">${s.capacity}</span>`,
      bodyFn: editPanel_Capacity },
    { key:'completion', label:'수료 방식',
      summary: `<span class="em">${s.completion==='immediate'?'즉시 수료':'학습기간 종료 후 수료'}</span>
        <div class="desc">${s.completion==='immediate'?'수료조건 달성 즉시 수료처리됩니다.':'학습기간 종료 후 일괄 수료처리됩니다.'}</div>`,
      bodyFn: editPanel_Completion },
    { key:'progress', label:'수료 조건',
      summary: `진도율 <span class="em">${s.progressThreshold}%</span> 이상`,
      bodyFn: editPanel_Progress },
  ];
  return `
    <div class="step-intro">
      <h2>신청 및 학습 정책을 설정하세요</h2>
      <p>과정이 오픈된 후에는 변경이 어렵습니다. 꼼꼼히 확인해주세요.</p>
    </div>
    <div class="setting-list">
      ${rows.map(r => `
        <div class="setting-block ${STATE.step4Open===r.key?'open':''}">
          <div class="setting-row" onclick="toggleAccordion4('${r.key}')">
            <div class="key">${r.label}</div>
            <div class="val">${r.summary}</div>
            <button class="edit-btn">${STATE.step4Open===r.key?'접기 ▲':'편집 ▼'}</button>
          </div>
          ${STATE.step4Open===r.key ? `<div class="setting-edit">${r.bodyFn()}</div>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}

function toggleAccordion4(key) {
  STATE.step4Open = STATE.step4Open === key ? null : key;
  renderWizard(4);
}

function editPanel_LearningPeriod() {
  const s = STATE.enrollSettings.learningPeriod;
  return `
    <label class="opt-row ${s.immediate?'selected':''}">
      <input type="radio" name="lp" value="immediate" ${s.immediate?'checked':''} onchange="onLPChange()"/>
      <div class="opt-content">
        <div class="opt-title">즉시 학습</div>
        <div class="opt-desc">신청 즉시 학습을 시작합니다.</div>
        <div class="opt-controls">신청일부터
          <input type="number" class="inline-num" id="lpDays" value="${s.days}" min="1" max="365" ${s.immediate?'':'disabled'}/>일간 학습
        </div>
      </div>
    </label>
    <label class="opt-row ${!s.immediate?'selected':''}">
      <input type="radio" name="lp" value="period" ${s.immediate?'':'checked'} onchange="onLPChange()"/>
      <div class="opt-content">
        <div class="opt-title">기간 학습</div>
        <div class="opt-desc">신청 기간과 학습 기간을 별도로 설정합니다.</div>
        <div class="opt-controls" style="flex-direction:column;align-items:flex-start;gap:8px">
          <div class="period-grid" style="grid-template-columns:80px 1fr auto 1fr">
            <span class="period-lbl">신청기간</span>
            <input type="date" class="input" id="lpApplyFrom" value="${s.applyFrom||''}" ${s.immediate?'disabled':''}/>
            <span>~</span>
            <input type="date" class="input" id="lpApplyTo" value="${s.applyTo||''}" ${s.immediate?'disabled':''}/>
          </div>
          <div class="period-grid" style="grid-template-columns:80px 1fr auto 1fr">
            <span class="period-lbl">학습기간</span>
            <input type="date" class="input" id="lpLearnFrom" value="${s.learnFrom||''}" ${s.immediate?'disabled':''}/>
            <span>~</span>
            <input type="date" class="input" id="lpLearnTo" value="${s.learnTo||''}" ${s.immediate?'disabled':''}/>
          </div>
        </div>
      </div>
    </label>
    <div class="edit-actions">
      <button class="btn" onclick="toggleAccordion4('learningPeriod')">취소</button>
      <button class="btn btn-primary" onclick="saveLearningPeriod()">저장</button>
    </div>
  `;
}
function onLPChange() {
  const im = document.querySelector('input[name="lp"]:checked')?.value === 'immediate';
  document.getElementById('lpDays').disabled = !im;
  ['lpApplyFrom','lpApplyTo','lpLearnFrom','lpLearnTo'].forEach(id => {
    const el = document.getElementById(id); if(el) el.disabled = im;
  });
  document.querySelectorAll('.opt-row').forEach(r => {
    const ck = r.querySelector('input[type=radio]'); if(ck) r.classList.toggle('selected',ck.checked);
  });
}
function saveLearningPeriod() {
  const s = STATE.enrollSettings.learningPeriod;
  s.immediate = document.querySelector('input[name="lp"]:checked')?.value === 'immediate';
  s.days = +document.getElementById('lpDays').value || 365;
  s.applyFrom = document.getElementById('lpApplyFrom')?.value || '';
  s.applyTo = document.getElementById('lpApplyTo')?.value || '';
  s.learnFrom = document.getElementById('lpLearnFrom')?.value || '';
  s.learnTo = document.getElementById('lpLearnTo')?.value || '';
  STATE.step4Open = null;
  renderWizard(4); toast('학습기간이 저장됐습니다.', 'success');
}

function editPanel_Capacity() {
  const noLimit = STATE.enrollSettings.capacity === '제한없음';
  const num = noLimit ? '' : STATE.enrollSettings.capacity.replace(/[^0-9]/g,'');
  return `
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 0">
      <input type="number" class="inline-num" id="capNum" min="1" value="${num}" ${noLimit?'disabled':''}/>
      <b>명</b>
      <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
        <input type="checkbox" id="capNoLimit" ${noLimit?'checked':''} onchange="document.getElementById('capNum').disabled=this.checked" style="accent-color:var(--brand)"/>
        제한없음
      </label>
    </div>
    <div class="edit-actions">
      <button class="btn" onclick="toggleAccordion4('capacity')">취소</button>
      <button class="btn btn-primary" onclick="saveCapacity()">저장</button>
    </div>
  `;
}
function saveCapacity() {
  const noLimit = document.getElementById('capNoLimit').checked;
  if (noLimit) STATE.enrollSettings.capacity = '제한없음';
  else {
    const n = +document.getElementById('capNum').value;
    if (!n || n < 1) { toast('정원을 1명 이상 입력해주세요.','warn'); return; }
    STATE.enrollSettings.capacity = n + '명';
  }
  STATE.step4Open = null; renderWizard(4); toast('모집정원이 저장됐습니다.','success');
}

function editPanel_Completion() {
  const s = STATE.enrollSettings;
  return `
    ${[{v:'immediate',t:'즉시 수료',d:'수료조건 달성 즉시 수료처리됩니다.'},{v:'end',t:'기간 종료 후 수료',d:'학습기간이 끝난 뒤 일괄 수료처리됩니다.'}].map(o=>`
      <label class="opt-row ${s.completion===o.v?'selected':''}">
        <input type="radio" name="comp" value="${o.v}" ${s.completion===o.v?'checked':''} onchange="document.querySelectorAll('.opt-row').forEach(r=>{const ck=r.querySelector('input[type=radio]');if(ck)r.classList.toggle('selected',ck.checked)})"/>
        <div class="opt-content"><div class="opt-title">${o.t}</div><div class="opt-desc">${o.d}</div></div>
      </label>
    `).join('')}
    <div class="edit-actions">
      <button class="btn" onclick="toggleAccordion4('completion')">취소</button>
      <button class="btn btn-primary" onclick="()=>{STATE.enrollSettings.completion=document.querySelector('input[name=comp]:checked')?.value||'immediate';STATE.step4Open=null;renderWizard(4);toast('저장됐습니다.','success')}">저장</button>
    </div>
  `;
}

function editPanel_Progress() {
  const s = STATE.enrollSettings;
  return `
    <div style="display:flex;align-items:center;gap:12px;padding:12px 0;flex-wrap:wrap">
      <label style="font-size:13px;font-weight:600">진도율</label>
      <input type="range" id="progRange" min="0" max="100" step="10" value="${s.progressThreshold}"
        oninput="document.getElementById('progVal').textContent=this.value+'%'"
        style="flex:1;accent-color:var(--brand);min-width:160px"/>
      <span id="progVal" style="font-size:16px;font-weight:800;width:48px">${s.progressThreshold}%</span>
    </div>
    <div class="edit-actions">
      <button class="btn" onclick="toggleAccordion4('progress')">취소</button>
      <button class="btn btn-primary" onclick="STATE.enrollSettings.progressThreshold=+document.getElementById('progRange').value;STATE.step4Open=null;renderWizard(4);toast('저장됐습니다.','success')">저장</button>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════
   Step 5 — 부가 설정
═══════════════════════════════════════════════════════════ */
function renderStep5() {
  const e = STATE.extraSettings;
  const rows = [
    { key:'sequential', label:'학습 순서',
      summary: `<span class="em">${e.sequential?'순서대로 학습':'자율 학습'}</span><div class="desc">${e.sequential?'등록된 목차 순서대로만 학습할 수 있습니다.':'학습자가 자유롭게 순서를 선택합니다.'}</div>`,
      bodyFn: () => togglePanel5('sequential','순서대로 학습','자율 학습') },
    { key:'progressLock', label:'진도바 이동 제한',
      summary: `<span class="em">${e.progressLock?'사용':'미사용'}</span><div class="desc">동영상 프로그레스바 임의 이동을 제한합니다.</div>`,
      bodyFn: () => togglePanel5('progressLock','이동 제한','이동 허용') },
    { key:'speedLock', label:'동영상 배속 고정',
      summary: `<span class="em">${e.speedLock?'사용':'미사용'}</span><div class="desc">배속을 1배속으로 고정합니다.</div>`,
      bodyFn: () => togglePanel5('speedLock','1배속 고정','배속 자유') },
    { key:'captureBlock', label:'화면 캡처 방지',
      summary: `<span class="em">${e.captureBlock?'사용':'미사용'}</span><div class="desc">캡처 프로그램을 방어해 저작권을 보호합니다.</div>`,
      bodyFn: () => togglePanel5('captureBlock','캡처 방지 적용','캡처 허용') },
  ];
  return `
    <div class="step-intro">
      <h2>학습 부가 설정</h2>
      <p>학습 방식과 동영상 옵션을 설정하세요.</p>
    </div>
    <div class="setting-list">
      ${rows.map(r=>`
        <div class="setting-block ${STATE.step5Open===r.key?'open':''}">
          <div class="setting-row" onclick="toggleAccordion5('${r.key}')">
            <div class="key">${r.label}</div>
            <div class="val">${r.summary}</div>
            <button class="edit-btn">${STATE.step5Open===r.key?'접기 ▲':'편집 ▼'}</button>
          </div>
          ${STATE.step5Open===r.key ? `<div class="setting-edit">${r.bodyFn()}</div>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}
function toggleAccordion5(key) {
  STATE.step5Open = STATE.step5Open === key ? null : key;
  renderWizard(5);
}
function togglePanel5(key, onLabel, offLabel) {
  const v = STATE.extraSettings[key];
  return `
    <div class="toggle-block" style="padding:12px 0">
      <label class="toggle-switch">
        <input type="checkbox" id="sw-${key}" ${v?'checked':''} onchange="document.getElementById('sw-lbl-${key}').textContent=this.checked?'${onLabel}':'${offLabel}'"/>
        <span class="track"><span class="thumb"></span></span>
        <span class="toggle-label" id="sw-lbl-${key}">${v?onLabel:offLabel}</span>
      </label>
    </div>
    <div class="edit-actions">
      <button class="btn" onclick="toggleAccordion5('${key}')">취소</button>
      <button class="btn btn-primary" onclick="STATE.extraSettings['${key}']=document.getElementById('sw-${key}').checked;STATE.step5Open=null;renderWizard(5);toast('저장됐습니다.','success')">저장</button>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════
   Step 6 — 오픈
═══════════════════════════════════════════════════════════ */
function renderStep6() {
  const s = STATE.enrollSettings;
  const hasType = !!STATE.creationType;
  const hasToc = STATE.toc && STATE.toc.length > 0 && STATE.toc.some(t=>t.contents.length>0);
  const hasPeriod = s.learningPeriod.immediate || (s.learningPeriod.learnFrom && s.learningPeriod.learnTo);

  const checks = [
    { ok: !!STATE.courseName, label:'과정명', desc: STATE.courseName || '미입력 — 과정명을 입력해주세요.', step:1 },
    { ok: hasType, label:'제작유형', desc: hasType ? (TYPE_DEFS.find(t=>t.id===STATE.creationType)?.label||STATE.creationType) : '미선택 — 제작유형을 선택해주세요.', step:2 },
    { ok: hasToc, label:'콘텐츠', desc: hasToc ? '목차와 콘텐츠가 등록됐습니다.' : '콘텐츠가 없습니다 — 목차·콘텐츠를 추가해주세요.', step:3 },
    { ok: hasPeriod, warn: !s.learningPeriod.immediate && (!s.learningPeriod.learnFrom||!s.learningPeriod.learnTo),
      label:'학습기간', desc: s.learningPeriod.immediate ? `즉시 학습 · ${s.learningPeriod.days}일간` : `${s.learningPeriod.learnFrom||'미설정'} ~ ${s.learningPeriod.learnTo||'미설정'}`, step:4 },
    { ok: true, label:'모집정원', desc: s.capacity, step:4 },
    { ok: true, label:'수료방식', desc: s.completion==='immediate'?'즉시 수료':'기간 종료 후 수료', step:4 },
  ];
  const allOk = checks.every(c=>c.ok);
  return `
    <div class="step-intro">
      <h2>오픈 전 최종 확인</h2>
      <p>아래 항목을 확인하고 모두 준비되면 과정을 오픈하세요.</p>
    </div>
    <div class="open-check-list">
      ${checks.map(c => {
        const cls = !c.ok ? 'error' : c.warn ? 'warn' : 'ok';
        const ico = !c.ok ? '✗' : c.warn ? '!' : '✓';
        return `
          <div class="open-check-item ${cls}">
            <div class="check-icon">${ico}</div>
            <div class="check-body">
              <div class="clbl">${c.label}</div>
              <div class="cdesc">${c.desc}</div>
              ${!c.ok || c.warn ? `<span class="clink" onclick="go('wizard/${c.step}')">← ${c.step}단계로 돌아가 수정하기</span>` : ''}
            </div>
          </div>
        `;
      }).join('')}
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <button class="btn btn-brand" style="min-width:140px" ${!allOk?'disabled':''} onclick="openCourse_launch()">🚀 과정 오픈하기</button>
      ${!allOk ? `<span style="font-size:12px;color:var(--danger)">위 오류 항목을 먼저 수정해주세요.</span>` : `<span style="font-size:12px;color:var(--success)">모든 항목이 준비됐습니다!</span>`}
    </div>
    <hr class="divider">
    <div class="step-intro">
      <h2 style="font-size:15px">저장 / 임시 저장</h2>
      <p>오픈하지 않고 현재 상태로 저장할 수 있습니다.</p>
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn" onclick="toast('임시 저장됐습니다.','success')">임시 저장</button>
      <button class="btn" onclick="toast('초안으로 저장됐습니다.','success')">초안 저장</button>
    </div>
  `;
}

function openCourse_launch() {
  openModal('과정 오픈 확인', '과정을 오픈하면 학습자가 수강신청할 수 있습니다. 진행하시겠습니까?',
    '오픈하기', () => { closeModal(); toast('과정이 오픈됐습니다! 🎉', 'success'); go('dashboard'); }
  );
}

/* ═══════════════════════════════════════════════════════════
   Placeholder
═══════════════════════════════════════════════════════════ */
function renderPlaceholder() {
  document.getElementById('view').innerHTML = `
    <div class="dash-inner">
      <div class="empty-state" style="padding:120px 24px">
        <div class="ico">🚧</div>
        <div class="ttl">준비 중인 화면입니다</div>
        <p>이 페이지는 프로토타입에 포함되지 않았습니다.</p>
        <button class="btn" style="margin-top:16px" onclick="go('dashboard')">← 보드로 돌아가기</button>
      </div>
    </div>
  `;
}

/* ═══════════════════════════════════════════════════════════
   Nav Toggle
═══════════════════════════════════════════════════════════ */
function toggleNav(id) {
  const group = document.querySelector(`.nav-group[data-g="${id}"]`);
  if (group) group.classList.toggle('open');
}

/* ═══════════════════════════════════════════════════════════
   Toast
═══════════════════════════════════════════════════════════ */
function toast(msg, type='') {
  const wrap = document.getElementById('toastWrap');
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  wrap.appendChild(el);
  setTimeout(() => { el.style.opacity='0'; el.style.transition='opacity .3s'; setTimeout(()=>el.remove(),300); }, 2400);
}

/* ═══════════════════════════════════════════════════════════
   Modal
═══════════════════════════════════════════════════════════ */
function openModal(title, body, actionLabel, onAction) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').textContent = body;
  const actions = document.getElementById('modalActions');
  actions.innerHTML = `
    <button class="btn" onclick="closeModal()">취소</button>
    <button class="btn btn-primary" onclick="(${onAction.toString()})()">${actionLabel}</button>
  `;
  document.getElementById('modalMask').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modalMask'))
    document.getElementById('modalMask').classList.remove('open');
}

/* ═══════════════════════════════════════════════════════════
   Dark Mode
═══════════════════════════════════════════════════════════ */
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '🌙 다크모드' : '☀️ 라이트모드';
  localStorage.setItem('lm-theme', isDark ? 'light' : 'dark');
}
(function initTheme() {
  const saved = localStorage.getItem('lm-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = saved === 'dark' ? '☀️ 라이트모드' : '🌙 다크모드';
})();

/* ═══════════════════════════════════════════════════════════
   Utils
═══════════════════════════════════════════════════════════ */
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Init nav open state
document.querySelector('.nav-group[data-g="lm"]')?.classList.add('open');
</script>
</body>
</html>
