  .ai-leaf {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 6px 8px; font-size: 13px; color: var(--text-2);
    border-radius: 6px;
    transition: background .15s;
  }
  .ai-leaf:hover:not(.leaf-inherited) { background: var(--brand-soft); }
  .ai-leaf.leaf-added { background: #ecfdf5; }
  .ai-leaf.leaf-inherited { color: var(--muted); }
  .ai-leaf-title { line-height: 1.6; }

  .ai-chk {
    width: 16px; height: 16px; margin: 0; accent-color: var(--brand);
    cursor: pointer; flex-shrink: 0;
  }
  .ai-chk:disabled { cursor: not-allowed; opacity: 0.4; }
  .ai-module-head .ai-module-title { flex: 1; min-width: 0; }
  .ai-leaf-title { line-height: 1.6; flex: 1; }

  .ai-new-btn {
    margin-top: 14px; padding: 14px;
    background: var(--surface-2); border-color: var(--border);
    color: var(--text-2); font-weight: 700;
  }
  .ai-new-btn:hover { background: #fff; border-color: var(--brand); color: var(--brand-strong); }

  /* ------------ Toast ------------ */
  .toast-wrap { position: fixed; right: 24px; bottom: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 200; }
  .toast {
    background: #1f242e; color: #fff; padding: 12px 16px; border-radius: 8px;
    box-shadow: var(--shadow-md); font-size: 13px; display: flex; align-items: center; gap: 8px;
    animation: slideIn .18s ease-out;
  }
  .toast.success { background: #16a34a; }
  .toast.warn { background: #d97706; }
  .toast.error { background: #dc2626; }
  @keyframes slideIn { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  /* ------------ Empty state ------------ */
  .empty {
    text-align: center; padding: 60px 24px; color: var(--text-3);
    background: var(--surface-2); border: 1px dashed var(--border-strong);
    border-radius: 10px;
  }
  .empty .ic { font-size: 36px; margin-bottom: 12px; color: var(--muted); }
  .empty h3 { margin: 0 0 6px; color: var(--text-2); font-size: 15px; }
  .empty p { margin: 0; font-size: 13px; }

  /* ------------ Search & filter row ------------ */
  .sr {
    display: flex; align-items: center; gap: 8px; padding: 0 0 14px;
  }
  .sr .search { flex: 1; max-width: 460px; position: relative; }
  .sr .search input { padding-left: 36px; }
  .sr .search .ic { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-3); }

  /* ------------ Enterprise course list table (step 2) ------------ */
  .ent-table-wrap {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; margin-top: 14px;
  }
  .ent-table { width: 100%; border-collapse: collapse; }
  .ent-table thead th {
    text-align: left; font-size: 12.5px; font-weight: 700; color: var(--text-2);
    background: var(--surface-2); padding: 12px 14px; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .ent-table tbody td {
    padding: 14px 14px; font-size: 13px; color: var(--text);
    border-bottom: 1px solid var(--border); vertical-align: middle;
  }
  .ent-table tbody tr:last-child td { border-bottom: none; }
  .ent-table tbody tr:hover { background: #fafbfc; }
  .ent-table .ttl-cell {
    cursor: pointer; color: var(--text); transition: color .12s;
  }
  .ent-table .ttl-cell .ttl-type { margin-bottom: 6px; }
  .ent-table .ttl-cell .ttl-title { font-weight: 700; color: var(--text); }
  .ent-table .ttl-cell:hover .ttl-title { color: var(--brand-strong); text-decoration: underline; }
  .ent-table .ttl-cell .ttl-cat { margin-top: 4px; color: var(--text-3); font-size: 12.5px; font-weight: 500; }
  .ent-table .type-pill {
    display: inline-block; padding: 2px 10px; font-size: 11.5px; font-weight: 700;
    border-radius: 999px; line-height: 1.6; white-space: nowrap;
  }
  .ent-table .type-pill.t-online   { background: #eef2ff; color: #4338ca; }
  .ent-table .type-pill.t-offline  { background: #fff7ed; color: var(--brand-strong); }
  .ent-table .type-pill.t-hybrid   { background: #ecfdf5; color: #047857; }
  .ent-table .cat-cell { color: var(--text-3); font-size: 12.5px; }
  .ent-table .date-cell { color: var(--text-2); font-size: 12.5px; white-space: nowrap; }
  .ent-table .add-btn {
    background: #fff; border: 1px solid var(--border-strong); color: var(--text);
    padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 700;
    cursor: pointer; transition: border-color .12s, color .12s, background .12s;
    white-space: nowrap;
  }
  .ent-table .add-btn:hover { border-color: var(--brand); color: var(--brand-strong); background: var(--brand-soft); }

  /* ------------ Course grid (step 2 — pre-packaged) ------------ */
  .pp-section-title { font-weight: 800; font-size: 15px; margin: 22px 0 12px; }
  .pp-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }
  .pp-card {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; cursor: pointer; transition: transform .12s, box-shadow .15s, border-color .15s;
  }
  .pp-card:hover { transform: translateY(-2px); border-color: var(--brand); box-shadow: var(--shadow-md); }
  .pp-card.selected { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
  .pp-thumb {
    aspect-ratio: 16 / 10; background: linear-gradient(135deg, #93c5fd 0%, #3b82f6 100%);
    position: relative; display: flex; align-items: flex-end; justify-content: center; overflow: hidden;
  }
  .pp-thumb::before {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.35), transparent 50%);
  }
  .pp-thumb .peak {
    width: 100%; height: 60%; background: #1d4ed8; clip-path: polygon(0% 100%, 30% 30%, 60% 65%, 100% 0%, 100% 100%);
  }
  .pp-thumb .sun { position: absolute; top: 18%; right: 22%; width: 16px; height: 16px; border-radius: 999px; background: #fff; opacity: .85; }
  .pp-card.ki-1 .pp-thumb { background: linear-gradient(135deg, #fbbf24 0%, #f97316 100%); }
  .pp-card.ki-1 .pp-thumb .peak { background: #b45309; }
  .pp-card.ki-2 .pp-thumb { background: linear-gradient(135deg, #6ee7b7 0%, #10b981 100%); }
  .pp-card.ki-2 .pp-thumb .peak { background: #065f46; }
  .pp-card.ki-3 .pp-thumb { background: linear-gradient(135deg, #c4b5fd 0%, #7c3aed 100%); }
  .pp-card.ki-3 .pp-thumb .peak { background: #5b21b6; }
  .pp-card.ki-4 .pp-thumb { background: linear-gradient(135deg, #fda4af 0%, #e11d48 100%); }
  .pp-card.ki-4 .pp-thumb .peak { background: #9f1239; }
  .pp-card .body { padding: 10px 12px 14px; }
  .pp-card .body .ttl { font-size: 12.5px; font-weight: 700; line-height: 1.45; height: 33px; overflow: hidden; }
  .pp-card .body .meta { margin-top: 6px; font-size: 11px; color: var(--text-3); }

  /* 온라인 과정 카드 호버 액션 오버레이 */
  .pp-card.online-card { position: relative; }
  .pp-card.online-card .hover-actions {
    position: absolute; inset: 0;
    background: rgba(167, 243, 208, .85);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
    opacity: 0; transition: opacity .15s;
    pointer-events: none;
    border-radius: 10px;
    backdrop-filter: blur(2px);
  }
  .pp-card.online-card:hover .hover-actions { opacity: 1; pointer-events: auto; }
  .pp-card.online-card .hover-actions .btn {
    min-width: 110px; justify-content: center; background: #fff;
    border-color: var(--text); color: var(--text); font-weight: 700;
  }
  .pp-card.online-card .hover-actions .btn:hover { background: var(--surface-2); }
  .pp-card.online-card .hover-actions .btn-primary {
    background: var(--brand); border-color: var(--brand); color: #fff;
  }
  .pp-card.online-card .hover-actions .btn-primary:hover { background: var(--brand-strong); border-color: var(--brand-strong); }

  /* ------------ Misc ------------ */
  .hidden { display: none !important; }
  .row { display: flex; gap: 12px; align-items: center; }
  .grow { flex: 1; }
  .text-right { text-align: right; }
  .text-muted { color: var(--text-3); }

  /* ------------ Floating create button on dashboard ------------ */
  .fab-create {
    position: relative; display: inline-flex; align-items: center; gap: 6px;
  }
  .fab-create .badge-dot {
    position: absolute; top: -4px; right: -4px;
    width: 10px; height: 10px; border-radius: 999px; background: var(--brand);
    border: 2px solid #fff;
  }

  /* ------------ Schedule row (offline) ------------ */
  .schedule-row {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; display: flex; align-items: center; justify-content: space-between;
  }
  .schedule-row .meta { display: flex; align-items: center; gap: 16px; font-size: 12.5px; color: var(--text-3); }
  .schedule-row .meta b { color: var(--text); }
  .empty-schedule {
    background: #fff; border: 1px dashed var(--border-strong); border-radius: 10px;
    padding: 36px 24px; text-align: center; color: var(--text-3);
  }
  .empty-schedule h4 { margin: 0 0 6px; font-size: 14px; color: var(--text-2); }
  .empty-schedule p { font-size: 12.5px; margin: 0 0 14px; }
  .info-note {
    margin-top: 18px; padding: 14px 16px; border-radius: 8px; background: #f7f8fb;
    border: 1px solid var(--border); font-size: 12.5px; color: var(--text-2);
  }
  .info-note .ttl { font-weight: 700; margin-bottom: 6px; color: var(--text); }
  .info-note ul { margin: 0; padding-left: 18px; line-height: 1.7; color: var(--text-3); }

  /* ------------ Offline (step 3) ------------ */
  .offline-intro { text-align: center; padding: 6px 0 22px; color: var(--text-2); font-size: 14px; line-height: 1.7; }

  /* 오프라인 회차/일정/연결학습의 action-btn 간격 — 수정·삭제를 좁게 */
  .round-header .rhs .action-btn,
  .schedule-item .sh .actions .action-btn,
  .linked-content-item .action-btn { min-width: 36px; padding: 6px 4px; }
  .round-header .rhs .action-btn + .action-btn,
  .schedule-item .sh .actions .action-btn + .action-btn,
  .linked-content-item .action-btn + .action-btn { margin-left: -2px; }

  /* MAIN 섹션 안의 회차 카드 — 오렌지 배경 위에서 또렷하게 */
  .single-section.is-main .round-card {
    border: 1.5px solid #fed7aa;
    box-shadow: 0 2px 8px -4px rgba(249, 115, 22, .18);
  }
  .single-section.is-main .round-card.expanded {
    border-color: #fdba74;
    box-shadow: 0 4px 14px -6px rgba(249, 115, 22, .28);
  }
  .single-section.is-main .round-header .title { font-size: 15px; }
  .single-section.is-main .add-round-btn {
    border-color: #fdba74; color: var(--brand-strong); background: rgba(255,255,255,.6);
  }
  .single-section.is-main .add-round-btn:hover {
    background: #fff; border-color: #f97316;
  }
  .single-section.is-main .empty {
    background: rgba(255,255,255,.7); border-color: #fed7aa; color: var(--text-2);
  }
  .single-section.is-main .empty h3 { color: var(--text-1); }
  .offline-tabs {
    display: flex; align-items: center; gap: 4px; border-bottom: 1px solid var(--border);
    padding: 0 4px; margin-bottom: 18px; flex-wrap: wrap;
  }
  .offline-tab {
    display: inline-flex; align-items: center; gap: 8px; padding: 12px 18px;
    border: none; background: transparent; cursor: pointer; font-size: 14px;
    color: var(--text-3); font-weight: 600; border-bottom: 2px solid transparent;
    position: relative; top: 1px;
  }
  .offline-tab:hover { color: var(--text); }
  .offline-tab.active { color: var(--text); font-weight: 800; border-bottom-color: var(--brand); }
  .offline-tab .pencil {
    background: transparent; border: none; color: var(--text-3); padding: 2px 4px;
    border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  .offline-tab .pencil:hover { background: var(--brand-soft); color: var(--brand-strong); }
  .offline-tab .closer {
    width: 18px; height: 18px; border-radius: 999px;
    border: 1.5px solid var(--text-3);
    background: transparent; color: var(--text-3);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 800; line-height: 1; padding: 0;
    cursor: pointer; transition: border-color .12s, color .12s, background .12s, transform .08s, opacity .12s;
    opacity: 0; pointer-events: none;
  }
  .offline-tab:hover .closer,
  .offline-tab.active .closer { opacity: 1; pointer-events: auto; }
  .offline-tab .closer:hover {
    border-color: var(--danger); color: var(--danger);
    background: #fef2f2; transform: scale(1.08);
  }
  .offline-tab .closer.disabled {
    opacity: 0.35; cursor: not-allowed; border-color: var(--text-3);
  }
  .offline-tab .closer.disabled:hover {
    border-color: var(--text-3); color: var(--text-3);
    background: transparent; transform: none;
  }
  .offline-tab.add-tab { color: var(--brand-strong); font-weight: 700; }
  .offline-tab.add-tab:hover { background: var(--brand-soft); border-radius: 6px 6px 0 0; }
  .offline-tab.pending {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-bottom: 2px solid var(--brand);
    color: var(--text); cursor: default;
  }
  .offline-tab-input {
    width: 280px; padding: 7px 10px; border: 1px solid var(--border);
    border-radius: 4px; font-size: 13px; outline: none;
    color: var(--text); background: #fff;
    transition: border-color .15s, box-shadow .15s;
  }
  .offline-tab-input:focus { border-color: var(--brand); box-shadow: 0 0 0 3px var(--brand-soft); }
  .offline-tab .inline-edit {
    border: 1px solid var(--brand); border-radius: 4px;
    padding: 4px 8px; font-size: 14px; font-weight: 700;
    color: var(--text); background: #fff; outline: none;
    min-width: 240px; box-shadow: 0 0 0 3px var(--brand-soft);
  }
  .offline-tab .confirm-btn {
    background: transparent; border: none; cursor: pointer;
    color: var(--text); font-size: 16px; padding: 2px 6px; line-height: 1;
  }
  .offline-tab .confirm-btn:hover { color: var(--brand-strong); }

  .round-card {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 12px;
  }
  .round-card .round-body { border-radius: 0 0 10px 10px; }
  /* 오프라인 회차 카드 — 커리큘럼 활성과 동일한 강조 배경 */
  .round-card.is-active { background: #dde8fb; border-color: #93b4e0; }
  .round-card.is-active .round-header:hover { background: transparent; }
  .round-card.is-active .round-body { background: transparent; }
  .round-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; cursor: pointer; user-select: none;
  }
  .round-header:hover { background: var(--surface-2); }
  .round-header .lhs { display: flex; align-items: center; gap: 12px; }
  .round-header .caret { color: var(--text-3); transition: transform .15s; display: inline-block; }
  .round-card.expanded .round-header .caret { transform: rotate(90deg); }
  .round-header .title { font-weight: 700; font-size: 14px; }
  .round-header .rhs { display: flex; align-items: center; gap: 16px; font-size: 12.5px; color: var(--text-3); }
  .round-header .rhs-info { display: flex; align-items: center; gap: 16px; }
  .round-header .rhs-actions { display: flex; align-items: center; gap: 4px; }

  /* drawer 등 좁은 컨테이너 — 회차 카드 헤더 컴팩트 레이아웃
     caret / 텍스트(회차명·일정·정원) / 액션 — 3컬럼 grid, 텍스트는 세로 정렬되어 회차명과 라인 정렬 */
  [data-offline-rounds][data-compact] .round-header:not(.editing) {
    display: grid;
    grid-template-columns: auto 1fr auto;
    grid-template-areas:
      "caret title   actions"
      ".     info    actions";
    align-items: center;
    column-gap: 12px;
    row-gap: 6px;
  }
  [data-offline-rounds][data-compact] .round-header:not(.editing) .lhs { display: contents; }
  [data-offline-rounds][data-compact] .round-header:not(.editing) .lhs .caret { grid-area: caret; }
  [data-offline-rounds][data-compact] .round-header:not(.editing) .lhs .title { grid-area: title; }
  [data-offline-rounds][data-compact] .round-header:not(.editing) .rhs { display: contents; }
  [data-offline-rounds][data-compact] .round-header:not(.editing) .rhs-info {
    grid-area: info;
    flex-direction: column;
    align-items: flex-start;
    gap: 4px;
  }
  [data-offline-rounds][data-compact] .round-header:not(.editing) .rhs-info > span::before {
    content: '• ';
    color: var(--text-3);
    margin-right: 4px;
  }
  [data-offline-rounds][data-compact] .round-header:not(.editing) .rhs-actions {
    grid-area: actions;
    align-self: center;
  }
  /* 편집 모드 — 회차명/정원/액션을 세로로 쌓고 액션은 우측 정렬 */
  [data-offline-rounds][data-compact] .round-header.editing > .caret { display: none; }
  [data-offline-rounds][data-compact] .round-header.editing .edit-form {
    grid-template-columns: 1fr;
    gap: 8px;
  }
  [data-offline-rounds][data-compact] .round-header.editing .edit-form .actions {
    justify-content: flex-end;
  }
  .round-header .badge-warn { color: var(--danger); font-weight: 700; cursor: pointer; }
  .round-header .badge-warn:hover { text-decoration: underline; }
  .round-header .date-range {
    color: var(--brand-strong); font-weight: 800; letter-spacing: -.2px;
  }
  .round-header .badge-count {
    margin-left: 6px; background: var(--brand-soft); color: var(--brand-strong);
    font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 999px;
  }
  .round-body { display: none; border-top: 1px dashed var(--border); padding: 18px 22px; background: var(--surface-2); }
  .round-card.expanded .round-body { display: block; }

  /* Inline round edit form */
  .round-header.editing { cursor: default; align-items: center; gap: 14px; padding: 14px 22px; background: #fff; }
  .round-header.editing:hover { background: #fff; }
  .round-header .edit-form {
    flex: 1; display: grid; grid-template-columns: 1fr 110px auto;
    gap: 10px; align-items: end;
  }
  .round-header .edit-form .field { display: flex; flex-direction: column; gap: 4px; }
  .round-header .edit-form .field label {
    font-size: 11.5px; color: var(--text-3); font-weight: 600; letter-spacing: -0.1px;
  }
  .round-header .edit-form .field input {
    width: 100%; padding: 8px 10px; border: 1px solid var(--border-strong);
    border-radius: 6px; font-size: 13px; color: var(--text);
    background: #fff; outline: none; transition: border-color .12s;
    box-sizing: border-box;
  }
  .round-header .edit-form .field input:focus { border-color: var(--brand); }
  .round-header .edit-form .actions { display: flex; gap: 4px; padding-bottom: 1px; }
  .round-header .edit-form .actions .btn-icon {
    width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center;
    border-radius: 6px;
  }

  .schedule-empty { text-align: center; padding: 36px 24px; color: var(--text-3); }
  .schedule-empty h4 { margin: 0 0 4px; color: var(--text-2); font-size: 14px; font-weight: 700; }
  .schedule-empty p { margin: 0 0 16px; font-size: 12.5px; }

  .schedule-date-group { margin-bottom: 18px; }
  .schedule-date-group .date-title { color: var(--danger); font-weight: 800; margin-bottom: 10px; font-size: 14px; }
  .schedule-item {
    background: #fff; border: 1px solid var(--border); border-radius: 10px;
    padding: 14px 18px; margin-bottom: 10px;
  }
  .schedule-item .sh { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 10px; }
  .schedule-item .sh .sh-title { display: flex; align-items: center; gap: 8px; font-weight: 700; }
  .schedule-item .sh .sh-title .ic { color: var(--brand); }
  .schedule-item .sh .actions { display: flex; gap: 2px; }
  .schedule-item dl { margin: 0; display: grid; grid-template-columns: 70px 1fr; row-gap: 6px; column-gap: 12px; font-size: 13px; }
  .schedule-item dt { color: var(--text-3); font-weight: 600; }
  .schedule-item dt::before { content: "ᆞ"; margin-right: 4px; color: var(--muted); }
  .schedule-item dd { margin: 0; color: var(--text-2); }
  .schedule-item .file-chip {
    display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px;
    background: var(--surface-2); border: 1px solid var(--border); border-radius: 999px;
    font-size: 12px; color: var(--text-2);
  }
  .schedule-item .file-chip .preview { color: var(--text-3); cursor: pointer; }
  .schedule-item .file-chip .preview:hover { color: var(--brand-strong); }

  .add-content-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin: 12px 0 4px; gap: 12px;
  }
  .linked-dropdown { position: relative; display: inline-block; }
  .linked-dropdown .dd-btn {
    background: #fff; border: 1px solid var(--border-strong); border-radius: 8px;
    padding: 8px 30px 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; color: var(--text-2);

/* ============================================================

const ICON = {

};

/* ============================================================
   State
============================================================ */
const STATE = JSON.parse(localStorage.getItem('lm:state') || '{}');
// 페이지 로드 직후 — 오프라인 회차 카드는 항상 접힌 상태로 초기화
(STATE.offlineCourses || []).forEach(c => {

});
// 일괄삭제 모드 (Step 3) — 임시 UI 상태, localStorage 저장 X
let BULK_DELETE = false;
let BULK_SELECTED = new Set();
let REORDER_MODE = false;
let REORDER_BACKUP = null;
let ACTIVE_TOC_ID = null;   // 클릭으로 활성화된 목차 강조용 (작업 영역 표시)
let ACTIVE_ROUND_ID = null; // 클릭으로 활성화된 오프라인 회차 카드 강조용

// 캡처 단계 클릭 리스너 — 목차 / 오프라인 회차 카드 활성화·해제
document.addEventListener('click', (e) => {
  const targets = [
    { el: document.getElementById('toc-list'),       itemSel: '.toc-item',   dataKey: 'id',      getId: () => ACTIVE_TOC_ID,   setId: v => { ACTIVE_TOC_ID = v; } },
    { el: document.getElementById('offline-rounds'), itemSel: '.round-card', dataKey: 'roundId', getId: () => ACTIVE_ROUND_ID, setId: v => { ACTIVE_ROUND_ID = v; } }
  ];
  let handled = false;
  for (const t of targets) {
    if (!t.el) continue;
    const item = e.target.closest(t.itemSel);
    if (item && t.el.contains(item)) {
      const id = item.dataset[t.dataKey];
      if (id !== t.getId()) {
        t.setId(id);
        t.el.querySelectorAll(t.itemSel + '.is-active').forEach(el => el.classList.remove('is-active'));
        item.classList.add('is-active');
      }
      // toc-list 컨테이너 한정: 활성 모듈 내부에서 사용자가 클릭한 행(목차 헤더) 또는 콘텐츠를 강조
      if (t.el.id === 'toc-list') {
        const child = e.target.closest('.toc-child');
        const row = e.target.closest('.toc-row');
        const focusEl = (child && item.contains(child)) ? child
                      : (row && item.contains(row))     ? row
                      : null;
        t.el.querySelectorAll('.is-focus').forEach(el => el.classList.remove('is-focus'));
        if (focusEl) focusEl.classList.add('is-focus');
      }
      handled = true;
      break;
    }
  }
  if (handled) return;
  // 우측 드로어가 열려 있는 동안은 활성 색 유지
  if (typeof DRAWER !== 'undefined' && DRAWER.open) return;
  // 어느 활성 컨테이너의 항목도 클릭되지 않음 — 해당 컨테이너 바깥 클릭 시 해제
  for (const t of targets) {
    if (!t.el) continue;
    if (t.el.contains(e.target)) continue; // 컨테이너 내부 클릭(항목 외 영역)에서는 유지
    if (t.getId()) {
      t.setId(null);
      t.el.querySelectorAll(t.itemSel + '.is-active').forEach(el => el.classList.remove('is-active'));
      if (t.el.id === 'toc-list') {
        t.el.querySelectorAll('.is-focus').forEach(el => el.classList.remove('is-focus'));
      }
    }
  }
}, true);
const DEFAULTS = {

  selectedPackage: null,

        contents: [
          { id: 'cn1-1', type: '동영상', title: '동영상', source: '내 콘텐츠' }
        ]
      },
      { id: 'c2', title: '고객 마케팅의 실제 사례', draft: true, type: '토론',
        contents: [
          { id: 'cn2-1', type: '동영상',   title: '마케팅 사례 분석 영상', source: '내 콘텐츠' },
          { id: 'cn2-2', type: '첨부파일', title: '사례 분석 워크북.pdf',   source: '내 콘텐츠' }
        ]
      },
      { id: 'c3', title: '고객과 함께하는 리더의 자세', draft: true, type: '촬영',
        contents: [
          { id: 'cn3-1', type: '촬영', title: '리더 인터뷰 촬영', source: '내 콘텐츠' }
        ]
      }
    ]},
    { id: 't2', title: '상품의 이해를 바탕으로 한 전략과제 선정', expanded: false, draft: true, children: [] },
    { id: 't3', title: '상품, 그리고 판매전략', expanded: false, draft: true, children: [] },
    { id: 't4', title: '전략 기본 계획 및 매출관리 분석', expanded: false, draft: false, children: [] },
  ],
  enrollSettings: {
    learningPeriod: { immediate: true, days: 365 },
    capacity: '제한없음',
    completion: 'immediate',
    progressThreshold: 90,
    requiredContents: []
  },
  extraSettings: {
    sequential: true,
    progressLock: true,
    speedLock: false,
    captureBlock: false,
    watermark: false,
    preview: '고객의 품질과 6 sigma 제품의 이해'
  },
  schedules: [],
  offlineCourses: [
    {
      id: 'oc1',
      name: '대리 리더십 전문가 양성과정',
      rounds: [
        { id: 'r1', no: 1, capacity: '제한없음', expanded: false, schedules: [], linkedContents: [] }

  activeOfflineCourseId: 'oc1',
  linkedContents: [],

  // 마이크로러닝(single) 전용 — 메인 콘텐츠 1개 + 부연자료 N개
  singleMain: null,         // { id, type, label, ico, title }

  subsSectionOpen: false
};
for (const k in DEFAULTS) if (!(k in STATE)) STATE[k] = DEFAULTS[k];

/* ============================================================
   Router
============================================================ */
const routes = {
  'dashboard': renderDashboard,
  'wizard/1': () => renderWizard(1),

function route() {
  const hash = location.hash.replace(/^#\/?/, '') || 'dashboard';
  const handler = routes[hash] || (() => renderPlaceholder(hash, '아직 구현되지 않은 화면입니다.'));
  handler();
  updateMenuActive(hash);
  window.scrollTo({ top: 0, behavior: 'instant' });
}
window.addEventListener('hashchange', route);

function go(hash) { location.hash = '#/' + hash; }

function updateMenuActive(hash) {
  document.querySelectorAll('.menu .sub a').forEach(a => {
    a.classList.toggle('active', hash.startsWith(a.dataset.route));
  });
  // 러닝메이커 그룹 active 상태
  document.querySelectorAll('.menu .group').forEach(g => {
    const hasActive = g.querySelector('.sub a.active');
    g.querySelector('.item').classList.toggle('active', g.dataset.id === 'lm' || !!hasActive && g.dataset.id === 'lm');
  });
  const lmItem = document.querySelector('.menu .group[data-id="lm"] .item');
  const isLm = hash === 'dashboard' || hash.startsWith('wizard');
  document.querySelectorAll('.menu .item').forEach(it => it.classList.remove('active'));
  if (isLm) lmItem.classList.add('active');
  else {
    document.querySelectorAll('.menu .group').forEach(g => {
      const hasActive = g.querySelector('.sub a.active');
      if (hasActive) g.querySelector('.item').classList.add('active');
    });
  }
}

/* Sidebar group toggle */
document.querySelectorAll('.menu .group .item').forEach(it => {
  it.addEventListener('click', () => {
    const grp = it.parentElement;
    grp.classList.toggle('open');
  });
});

}
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fileIconFor(filename) {
  const ext = String(filename || '').toLowerCase().split('.').pop();
  if (['jpg','jpeg','gif','png','bmp'].includes(ext)) return '🖼️';
  if (['xls','xlsx'].includes(ext)) return '📊';
  if (['ppt','pptx'].includes(ext)) return '📽️';
  if (['doc','docx'].includes(ext)) return '📝';
  if (ext === 'hwp') return '📄';
  if (ext === 'txt') return '📃';
  if (ext === 'pdf') return '📕';
  if (ext === 'pbix') return '📈';
  if (ext === 'zip') return '🗜️';
  return '📎';
}

/* ============================================================
   Wizard scaffolding
============================================================ */
const WIZARD_STEPS = [
  { n: 1, label: '과정정보' },
  { n: 2, label: '제작유형' },
  { n: 3, label: '목차·콘텐츠' },
  { n: 4, label: '신청·학습설정' },
  { n: 5, label: '부가설정' },
  { n: 6, label: '오픈' }
];

function stepperHtml(current) {
  return `
    <div class="stepper">
      ${WIZARD_STEPS.map((s, i) => {
        const cls = s.n === current ? 'active' : (s.n < current ? 'done' : 'upcoming');
        const inner = s.n < current ? '✓' : s.n;
        const connector = i < WIZARD_STEPS.length - 1 ? `<span class="connector">›</span>` : '';
        return `
          <div class="step ${cls}">
            <div class="num">${inner}</div>
            <div class="label">${s.label}</div>
          </div>${connector}
        `;
      }).join('')}
    </div>
  `;
}

function wizardActions(step) {
  if (step === 3 && REORDER_MODE) {
    return `<div class="wizard-actions">
      <button class="btn" onclick="cancelReorderMode()">취소</button>
      <button class="btn btn-accent" onclick="finishReorderMode()">저장</button>
    </div>`;
  }
  const prev = step > 1 ? `<button class="btn" onclick="go('wizard/${step-1}')">‹ 이전</button>` : '';
  const next = step < 6 ? `<button class="btn btn-primary" onclick="nextStep(${step})">다음 ›</button>` : '';
  return `<div class="wizard-actions">${prev}${next}</div>`;
}

function nextStep(step) {
  if (step === 1) {
    const v = (document.getElementById('course-name') || {}).value || '';
    const trimmed = v.trim();
    if (trimmed.length < 2) return toast('과정명을 2자 이상 입력해주세요.', 'warn');
    STATE.courseName = trimmed;
    saveState();
  }
  go('wizard/' + (step + 1));
}

function renderWizard(step) {
  const title = STATE.courseName || '새 과정';
  let body = '';
  if (step === 1) body = renderStep1();
  else if (step === 2) body = renderStep2();
  else if (step === 3) body = renderStep3();
  else if (step === 4) body = renderStep4();
  else if (step === 5) body = renderStep5();
  else if (step === 6) body = renderStep6();

  view.innerHTML = `
    ${breadcrumb(['러닝메이커'])}
    ${step === 1 ? '' : `<div class="page-header"><div class="left"><h1 style="font-size: 20px;"><span class="course-label">과정명</span><span class="course-name-editable" id="course-name-display" ondblclick="enterCourseNameEditMode()" title="더블클릭하여 수정">${esc(title)}</span></h1></div></div>`}
    <div class="wizard-frame">
      ${stepperHtml(step)}
      <div class="body">${body}</div>
      ${wizardActions(step)}
    </div>
  `;
  // 각 step의 후처리 바인딩
  if (step === 2) bindStep2();
  if (step === 3) bindStep3();
}

function enterCourseNameEditMode() {
  const span = document.getElementById('course-name-display');
  if (!span) return;
  const current = STATE.courseName || '새 과정';
  const input = document.createElement('input');
  input.type = 'text';
  input.value = current;
  input.className = 'inline-edit-input';
  input.id = 'course-name-input';
  input.style.fontSize = '20px';
  input.setAttribute('aria-label', '과정명 편집');
  span.replaceWith(input);
  input.focus();
  input.select();
  const commit = () => saveCourseNameEdit(input.value);
  const cancel = () => exitCourseNameEdit(current);
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    else if (e.key === 'Escape') { e.preventDefault(); input.removeEventListener('blur', commit); cancel(); }
  });
}
function saveCourseNameEdit(value) {
  const v = (value || '').trim();
  if (!v) { toast('과정명을 입력해주세요.', 'warn'); return exitCourseNameEdit(STATE.courseName || '새 과정'); }
  STATE.courseName = v;
  saveState();
  exitCourseNameEdit(v);
  // Step 3에 노출된 코스명도 디폴트가 과정명과 같이 보이도록 동기화 표시
  const lessonSpan = document.getElementById('lesson-name-display');
  if (lessonSpan && !STATE.lessonName) lessonSpan.textContent = v;
}
function exitCourseNameEdit(displayText) {
  const input = document.getElementById('course-name-input');
  if (!input) return;
  const span = document.createElement('span');
  span.className = 'course-name-editable';
  span.id = 'course-name-display';
  span.setAttribute('ondblclick', 'enterCourseNameEditMode()');
  span.setAttribute('title', '더블클릭하여 수정');
  span.textContent = displayText;
  input.replaceWith(span);
}

function enterLessonNameEditMode() {

  input.addEventListener('blur', commit);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    else if (e.key === 'Escape') { e.preventDefault(); input.removeEventListener('blur', commit); cancel(); }

}

  const v = (value || '').trim();
  if (!v) { toast('코스명을 입력해주세요.', 'warn'); return exitLessonNameEdit(STATE.lessonName || STATE.courseName || '새 과정'); }

      <div class="type-grid eight-col">
        ${modes.map(m => `
          <div class="type-card tc-${m.id} ${STATE.creationType===m.id?'selected':''}" onclick="selectMode('${m.id}')">

function selectMode(typeId) {
  // 카드 id → 내부 deliveryMode 매핑 (Step 3 분기 및 기존 로직 호환)
  const deliveryMap = {
    'offline': 'offline',
    'offline-blended': 'offline',
    'single': 'single',
    'single-plus': 'single',
    'online': 'online',
    'hybrid': 'hybrid'
  };
  STATE.creationType = typeId;
  STATE.deliveryMode = deliveryMap[typeId] || typeId;
  saveState();
  document.querySelectorAll('.type-card').forEach(c => c.classList.remove('selected'));
  const el = document.querySelector(`.type-card.tc-${typeId}`);
  if (el) el.classList.add('selected');
  const labelMap = {
    'offline': '오프라인',
    'offline-blended': '오프라인 + 사전/사후학습',
    'single': '단일 콘텐츠 등록',
    'single-plus': '단일 콘텐츠 + 부가자료',
    'online': '온라인',
    'hybrid': '하이브리드러닝'
  };
  const label = labelMap[typeId] || typeId;
  toast(`${label} 과정으로 설정되었습니다.`, 'success');
  go('wizard/3');
}

/* 부가자료 드래그&드롭 정렬 */
let SS_DRAG_ID = null;
function onSsDragStart(e, id) {
  SS_DRAG_ID = id;
  try { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', id); } catch (_) {}
  e.currentTarget.classList.add('ss-dragging');
}
function onSsDragEnd(e) {
  e.currentTarget.classList.remove('ss-dragging');
  document.querySelectorAll('.ss-drop-before, .ss-drop-after')
    .forEach(el => el.classList.remove('ss-drop-before','ss-drop-after'));
  SS_DRAG_ID = null;
}
function onSsDragOver(e, id) {
  if (!SS_DRAG_ID) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (SS_DRAG_ID === id) return;
  const el = e.currentTarget;
  const rect = el.getBoundingClientRect();
  const before = (e.clientY - rect.top) < rect.height / 2;
  el.classList.toggle('ss-drop-before', before);
  el.classList.toggle('ss-drop-after', !before);
}
function onSsDragLeave(e) {
  e.currentTarget.classList.remove('ss-drop-before', 'ss-drop-after');
}
function onSsDrop(e, id) {
  e.preventDefault();
  const dragId = SS_DRAG_ID;
  const el = e.currentTarget;
  const rect = el.getBoundingClientRect();
  const before = (e.clientY - rect.top) < rect.height / 2;
  el.classList.remove('ss-drop-before', 'ss-drop-after');
  SS_DRAG_ID = null;
  if (!dragId || dragId === id) return;
  const list = STATE.singleSubs || [];
  const fromIdx = list.findIndex(x => x.id === dragId);
  if (fromIdx < 0) return;
  const [moved] = list.splice(fromIdx, 1);
  let to = list.findIndex(x => x.id === id);
  if (to < 0) { list.splice(fromIdx, 0, moved); return; }
  if (!before) to += 1;
  list.splice(to, 0, moved);
  STATE.singleSubs = list;
  saveState();
  renderWizard(3);
}

function formatScheduleDate(d) {
  if (!d) return '';
  // 'YYYY-MM-DD' → 'YYYY.MM.DD' (요일 포함)
  const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(d);
  if (!m) return d;
  const date = new Date(+m[1], +m[2]-1, +m[3]);
  const dow = ['일','월','화','수','목','금','토'][date.getDay()];
  return `${m[1]}.${m[2]}.${m[3]}(${dow})`;
}
function formatScheduleRange(schedules) {
  const dates = (schedules || []).map(s => s.date).filter(Boolean).sort();
  if (dates.length === 0) return '일정 미정';
  const first = dates[0];
  const last = dates[dates.length - 1];
  if (first === last) return formatScheduleDate(first);
  return `${formatScheduleDate(first)} ~ ${formatScheduleDate(last)}`;
}

function renderRoundBody(course, round) {
  const schedules = round.schedules || [];

    schedules.forEach(s => { (byDate[s.date] = byDate[s.date] || []).push(s); });
    const dates = Object.keys(byDate).sort();
    body += dates.map(d => `
      <div class="schedule-date-group">

      <button class="btn" onclick="openScheduleModal('${course.id}','${round.id}')">일정 추가</button>

const OFFLINE_ANCHOR_ID = '_offline_anchor';
// 오프라인 교육 앵커 기준 배치 정책
// - 위: 자료 성격(아티클·첨부파일·유튜브·동영상·이미지·외부링크) → 사전 학습 흐름
// - 아래: 평가/활동 성격(시험·과제·설문·토론·퀴즈) → 사후 학습 흐름
const LINKED_ABOVE_TYPES = ['아티클', '첨부파일', '유튜브', '동영상', '이미지', '외부링크'];

function ensureOfflineAnchor() {
  STATE.linkedContents = STATE.linkedContents || [];
  const realCount = STATE.linkedContents.filter(x => x.type !== '_offline').length;
  if (realCount === 0) {
    STATE.linkedContents = STATE.linkedContents.filter(x => x.type !== '_offline');
    return;
  }
  const hasAnchor = STATE.linkedContents.some(x => x.type === '_offline');
  if (!hasAnchor) {
    // 첫 연결학습 등록 시 오프라인 교육이 맨 위에 노출되도록 앵커를 맨 앞에 삽입
    STATE.linkedContents.unshift({ id: OFFLINE_ANCHOR_ID, type: '_offline', title: '오프라인' });
  }
}

function insertLinkedContent(item, phase) {
  STATE.linkedContents = STATE.linkedContents || [];
  const list = STATE.linkedContents;
  // phase가 명시되면 그에 따라 위치 결정 (사전=위, 사후=아래), 없으면 타입 기반 자동 결정
  const placeAbove = phase === 'pre' ? true
                   : phase === 'post' ? false
                   : LINKED_ABOVE_TYPES.includes(item.type);
  let anchorIdx = list.findIndex(x => x.type === '_offline');
  if (anchorIdx < 0) {
    // 앵커가 없는 첫 등록: 콘텐츠 성격(또는 phase)에 맞춰 앵커 위치 결정
    if (placeAbove) {
      list.push(item);
      list.push({ id: OFFLINE_ANCHOR_ID, type: '_offline', title: '오프라인' });
    } else {
      list.push({ id: OFFLINE_ANCHOR_ID, type: '_offline', title: '오프라인' });
      list.push(item);
    }
    return;
  }
  if (placeAbove) {
    list.splice(anchorIdx, 0, item);
  } else {
    list.push(item);
  }
}

let LC_DRAG_ID = null;
function onLcDragStart(e, id) {
  LC_DRAG_ID = id;
  try { e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', id); } catch (_) {}
  e.currentTarget.classList.add('lc-dragging');
}
function onLcDragEnd(e) {
  e.currentTarget.classList.remove('lc-dragging');
  document.querySelectorAll('.lc-drop-before, .lc-drop-after')
    .forEach(el => el.classList.remove('lc-drop-before','lc-drop-after'));
  LC_DRAG_ID = null;
}
function onLcDragOver(e, id) {
  if (!LC_DRAG_ID) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (LC_DRAG_ID === id) return;
  const el = e.currentTarget;
  const rect = el.getBoundingClientRect();
  const before = (e.clientY - rect.top) < rect.height / 2;
  el.classList.toggle('lc-drop-before', before);
  el.classList.toggle('lc-drop-after', !before);
}
function onLcDragLeave(e) {
  e.currentTarget.classList.remove('lc-drop-before', 'lc-drop-after');
}
function onLcDrop(e, id) {
  e.preventDefault();
  const dragId = LC_DRAG_ID;
  const el = e.currentTarget;
  const rect = el.getBoundingClientRect();
  const before = (e.clientY - rect.top) < rect.height / 2;
  el.classList.remove('lc-drop-before', 'lc-drop-after');
  LC_DRAG_ID = null;
  if (!dragId || dragId === id) return;
  const list = STATE.linkedContents || [];
  const fromIdx = list.findIndex(x => x.id === dragId);
  if (fromIdx < 0) return;
  const [moved] = list.splice(fromIdx, 1);
  let to = list.findIndex(x => x.id === id);
  if (to < 0) { list.splice(fromIdx, 0, moved); return; }
  if (!before) to += 1;
  list.splice(to, 0, moved);
  STATE.linkedContents = list;
  saveState();
  renderWizard(3);
}

function renderLinkedContent(lc, idx) {
  const dragAttrs = `draggable="true"
    ondragstart="onLcDragStart(event,'${lc.id}')"
    ondragend="onLcDragEnd(event)"
    ondragover="onLcDragOver(event,'${lc.id}')"
    ondragleave="onLcDragLeave(event)"
    ondrop="onLcDrop(event,'${lc.id}')"`;

  if (lc.type === '_offline') {
    return `
      <div class="toc-child no-type is-offline-anchor" data-id="${lc.id}" ${dragAttrs}>
        <div class="offline-anchor-inner">
          <span class="oa-ic" aria-hidden="true">👥</span>
          <span class="oa-ttl">오프라인 교육</span>
        </div>
      </div>
    `;
  }

  const preset = CONTENT_TYPE_PRESETS[lc.type];
  const typeLabel = preset ? preset.label : (lc.type || '콘텐츠');
  const typeIco = getContentTypeIcon(lc.type);
  const badgeCls = lc.type ? '' : ' is-empty';
  const title = lc.title || (lc.type + ' 콘텐츠');
  return `
    <div class="toc-child no-type is-registered" data-id="${lc.id}" ${dragAttrs}>
      <div class="type-label-badge${badgeCls}">
        <span class="cn-num">${(idx ?? 0) + 1}.</span>
        <span class="cn-stack">
          <span class="cn-ic" aria-hidden="true">${typeIco}</span>
          <span class="cn-lbl">${esc(typeLabel)}</span>
        </span>
      </div>
      <div class="title-block">
        ${lc.editing
          ? `<input type="text" class="child-title-input" id="lti-${lc.id}"
               value="${esc(lc.title || '')}"
               onkeydown="handleLinkedTitleKey(event, '${lc.id}')"
               onblur="confirmLinkedTitle('${lc.id}', this.value)" />`
          : `<div class="ttl" ondblclick="startLinkedTitleEdit('${lc.id}')" title="더블클릭하여 이름 편집">${esc(title)}</div>`}
      </div>
      <div class="child-actions">
        <button class="action-btn" onclick="editLinkedContent('${lc.id}')" title="콘텐츠 수정">
          <span class="ic">${ICON.edit}</span><span class="lbl">콘텐츠 수정</span>
        </button>
        <button class="action-btn" onclick="copyLinkedContent('${lc.id}')" title="복사">
          <span class="ic">📋</span><span class="lbl">복사</span>
        </button>
        <button class="action-btn" onclick="removeLinkedContent('${lc.id}')" title="삭제">
          <span class="ic">${ICON.trash}</span><span class="lbl">삭제</span>
        </button>
      </div>
    </div>
  `;
}

function formatKoreanDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d.getTime())) return iso;
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getMonth()+1}월 ${d.getDate()}일`;
}

function formatKoreanDateLong(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  if (isNaN(d.getTime())) return iso;
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} (${days[d.getDay()]})`;
}

}

function removeOfflineCourse(id) {

function toggleOfflineRound(courseId, roundId) {

function editOfflineRound(courseId, roundId) {
  const c = STATE.offlineCourses.find(x => x.id === courseId);
  if (!c) return;
  const r = c.rounds.find(x => x.id === roundId);
  if (!r) return;

  if (!c) return;
  const r = c.rounds.find(x => x.id === roundId);
  if (!r) return;
  const titleEl = document.getElementById('rn-title-' + roundId);

  const r = c.rounds.find(x => x.id === roundId);

function removeOfflineRound(courseId, roundId) {
  const c = STATE.offlineCourses.find(x => x.id === courseId);
  if (!c) return;
  if (!confirm('해당 회차를 삭제하시겠습니까? (등록된 일정도 함께 삭제됩니다.)')) return;

    <button class="btn" onclick="cancelScheduleDrawer()">취소</button>
    <button class="btn btn-primary" onclick="saveScheduleDrawer()">${existing ? '저장' : '추가'}</button>`;

  document.getElementById('drawer-mask').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function saveScheduleDrawer() {
  const ctx = (DRAWER && DRAWER.scheduleCtx) || {};
  const c = STATE.offlineCourses.find(x => x.id === ctx.courseId);
  if (!c) return;
  const r = c.rounds.find(x => x.id === ctx.roundId);
  if (!r) return;
  const existing = ctx.scheduleId ? (r.schedules || []).find(s => s.id === ctx.scheduleId) : null;
  const date = document.getElementById('sc-date').value;
  const name = document.getElementById('sc-name').value.trim();
  if (!date) return toast('교육일을 선택해주세요.', 'warn');
  if (!name) return toast('교육명을 입력해주세요.', 'warn');
  const startTime = `${document.getElementById('sc-sh').value}:${document.getElementById('sc-sm').value}`;
  const endTime = `${document.getElementById('sc-eh').value}:${document.getElementById('sc-em').value}`;
  const place = document.getElementById('sc-place').value.trim();
  const teacher = document.getElementById('sc-teacher').value.trim();
  const info = document.getElementById('sc-info').value.trim();
  const files = window.__pendingFiles || (existing ? existing.files : []) || [];
  if (existing) {
    Object.assign(existing, { date, name, startTime, endTime, place, teacher, info, files });
  } else {
    r.schedules = r.schedules || [];
    r.schedules.push({ id: 's' + Date.now(), date, name, startTime, endTime, place, teacher, info, files });
  }
  window.__pendingFiles = null;
  saveState();
  // 콘텐츠 추가 폼에서 진입했다면 그 폼으로 복귀, 아니면 drawer 닫기
  if (DRAWER._scheduleReturn) {
    restoreDrawerFromSchedule();
    renderWizard(3);
  } else {
    closeDrawer();
    renderWizard(3);
  }
  toast(existing ? '일정이 수정되었습니다.' : '일정이 등록되었습니다.', 'success');
}

function cancelScheduleDrawer() {
  window.__pendingFiles = null;
  if (DRAWER._scheduleReturn) {
    restoreDrawerFromSchedule();
  } else {
    closeDrawer();
  }
}

function restoreDrawerFromSchedule() {
  const r = DRAWER._scheduleReturn;
  if (!r) return;
  DRAWER._scheduleReturn = null;
  DRAWER.mode = r.mode;
  DRAWER.tab = r.tab;
  DRAWER.uploadMode = r.uploadMode;
  DRAWER.uploadType = r.uploadType;
  DRAWER.parentId = r.parentId;
  DRAWER.targetId = r.targetId;
  DRAWER.targetTitle = r.targetTitle;
  DRAWER.isLeaf = r.isLeaf;
  DRAWER.isRoot = r.isRoot;
  DRAWER.linkedPhase = r.linkedPhase;
  DRAWER.editingTitle = r.editingTitle;
  DRAWER.scheduleCtx = null;
  // 헤더 텍스트·탭 영역 복구 (renderDrawer는 본문·푸터만 갱신)
  const headerEl = document.querySelector('#drawer .dhead h3');
  if (headerEl && r.headerText != null) headerEl.textContent = r.headerText;
  const tabsEl = document.getElementById('drawer-tabs');
  if (tabsEl) {
    if (r.tabsHTML != null) tabsEl.innerHTML = r.tabsHTML;
    tabsEl.style.display = r.tabsDisplay || '';
  }
  // drawer 본문/푸터 재구성 — 콘텐츠 추가 폼으로 복귀
  renderDrawer();
}

function addScheduleFileStub() {
  const name = prompt('파일명을 입력하세요 (프로토타입)', '교안_샘플.pdf');
  if (!name) return;

  ).join('');

function removeScheduleFile(i) {
  window.__pendingFiles = (window.__pendingFiles || []).filter((_, idx) => idx !== i);
  const list = document.getElementById('sc-files');
  if (list) list.innerHTML = window.__pendingFiles.map((f, i) =>
    `<span class="file-chip">${esc(f.name)} <button type="button" style="background:none; border:none; cursor:pointer; color:var(--text-3);" onclick="removeScheduleFile(${i})">✕</button></span>`
  ).join('');
}

function removeOfflineSchedule(courseId, roundId, scheduleId) {
  const c = STATE.offlineCourses.find(x => x.id === courseId);
  if (!c) return;
  const r = c.rounds.find(x => x.id === roundId);
  if (!r) return;
  if (!confirm('해당 일정을 삭제하시겠습니까?')) return;
  r.schedules = (r.schedules || []).filter(s => s.id !== scheduleId);
  saveState();
  if (isOfflineFormDrawer()) refreshOfflineRounds(); else renderWizard(3);
  toast('일정이 삭제되었습니다.', 'success');
}

function toggleLinkedDropdown(scope) {
  const targetId = 'lnk-dd-' + scope;
  document.querySelectorAll('.linked-dropdown').forEach(dd => {
    if (dd.id !== targetId) dd.classList.remove('open');
  });
  const dd = document.getElementById(targetId);
  if (dd) dd.classList.toggle('open');
}

document.addEventListener('click', (e) => {
  if (!e.target.closest('.linked-dropdown')) {
    document.querySelectorAll('.linked-dropdown.open').forEach(dd => dd.classList.remove('open'));
  }
});

function openLinkedContentDrawer(id, label, ico, phase) {
  const target = phase === 'pre' ? '사전학습' : phase === 'post' ? '사후학습' : '오프라인 사전·사후학습 등록';
  openContentDrawer({ mode: 'linked', targetTitle: target });

// 사전/사후학습 — 콘텐츠 추가 진입점(3탭 드로어 직접 오픈)
function openLinkedAddDrawer(phase, tabId) {

function startLinkedTitleEdit(lcId) {
  if (lcId === OFFLINE_ANCHOR_ID) return;
  const lc = (STATE.linkedContents || []).find(x => x.id === lcId);
  if (!lc || lc.type === '_offline') return;
  lc.editing = true;
  saveState();
  renderWizard(3);
  setTimeout(() => {
    const el = document.getElementById('lti-' + lcId);
    if (el) { el.focus(); el.select(); }
  }, 30);
}
function confirmLinkedTitle(lcId, value) {
  const lc = (STATE.linkedContents || []).find(x => x.id === lcId);
  if (!lc) return;
  const v = (value || '').trim();
  if (!v) { lc.editing = false; renderWizard(3); toast('콘텐츠명을 입력해주세요.', 'warn'); return; }
  lc.title = v;
  lc.editing = false;
  saveState();
  renderWizard(3);
  toast('콘텐츠명이 수정되었습니다.', 'success');
}
function cancelLinkedTitleEdit(lcId) {
  const lc = (STATE.linkedContents || []).find(x => x.id === lcId);
  if (!lc) return;
  lc.editing = false;
  saveState();
  renderWizard(3);
}
function handleLinkedTitleKey(e, lcId) {
  if (e.key === 'Enter') {
    e.preventDefault();
    e.target.blur();
  } else if (e.key === 'Escape') {
    e.preventDefault();
    // Escape: blur 시 confirm 호출 방지 후 취소
    e.target.onblur = null;
    cancelLinkedTitleEdit(lcId);
  }
}

function editLinkedContent(lcId) {
  if (lcId === OFFLINE_ANCHOR_ID) return;
  const lc = (STATE.linkedContents || []).find(x => x.id === lcId);
  if (!lc) { toast('편집할 콘텐츠를 찾지 못했습니다.', 'warn'); return; }
  if (lc.type === '_offline') return;
  const allTypes = [...UPLOAD_TYPES.content, ...UPLOAD_TYPES.meeting, ...UPLOAD_TYPES.interaction];
  const uploadType = allTypes.find(x => x.label === lc.type) || allTypes[0];
  openContentDrawer({
    mode: 'contentEdit',
    targetId: lc.id,
    targetTitle: lc.title,
    isLeaf: true
  });
  DRAWER.linkedId = lc.id;
  DRAWER.tab = 'upload';
  DRAWER.uploadType = uploadType;
  DRAWER.uploadMode = 'form';
  DRAWER.editingTitle = lc.title || '';
  updateDrawerTitle();
  renderDrawerTabs();
  renderDrawer();
}

function copyLinkedContent(lcId) {
  if (lcId === OFFLINE_ANCHOR_ID) return;
  const list = STATE.linkedContents || [];
  const idx = list.findIndex(x => x.id === lcId);
  if (idx < 0) return;
  const src = list[idx];
  if (src.type === '_offline') return;
  const copy = {
    id: 'lc' + Date.now() + Math.floor(Math.random()*1000),
    type: src.type,
    title: (src.title || '') + ' (복사)',
    desc: src.desc || ''
  };
  list.splice(idx + 1, 0, copy);
  STATE.linkedContents = list;
  saveState(); renderWizard(3);
  toast('복사되었습니다.', 'success');
}

function removeLinkedContent(lcId) {
  if (lcId === OFFLINE_ANCHOR_ID) return;
  if (!confirm('해당 연결 학습을 삭제하시겠습니까?')) return;
  STATE.linkedContents = (STATE.linkedContents || []).filter(x => x.id !== lcId);
  ensureOfflineAnchor();
  // 실제 콘텐츠가 0이 되면 연결학습 영역을 자동으로 닫음
  const realCount = (STATE.linkedContents || []).filter(x => x.type !== '_offline').length;
  if (realCount === 0) STATE.linkedSectionOpen = false;
  saveState(); renderWizard(3);
  toast('삭제되었습니다.', 'success');
}
function openLinkedSection() {
  STATE.linkedSectionOpen = true;
  saveState();
  renderWizard(3);
}

function renderTocList() {
  if (!STATE.toc || STATE.toc.length === 0) {
    return `<div class="empty"><div class="ic">📝</div><h3>아직 목차가 없습니다</h3><p>‘목차 추가’ 또는 ‘AI 목차 제안’으로 시작해보세요.</p></div>`;
  }
  const showInserter = !BULK_DELETE;
  const parts = [];
  if (showInserter) parts.push(inserterHtml('root', '', 0));
  STATE.toc.forEach((t, i) => {
    parts.push(t.isContent ? rootContentItem(t) : tocItem(t));
    if (showInserter) parts.push(inserterHtml('root', '', i + 1));
  });
  return parts.join('');
}

/* 1-depth 콘텐츠 렌더링 — 콘텐츠가 목차와 같은 레벨로 올라온 경우 */
function rootContentItem(c) {
  const bulk = BULK_DELETE;
  const reorder = REORDER_MODE;
  const typeIco = c.type ? getContentTypeIcon(c.type) : '📄';
  const typeLabelText = c.type ? esc(c.type) : '미등록';
  const tocIdx = STATE.toc.findIndex(x => x.id === c.id);
  const canUp = tocIdx > 0;
  const canDown = tocIdx >= 0 && tocIdx < STATE.toc.length - 1;
  const hasContents = Array.isArray(c.contents) && c.contents.length > 0;
  const hasRegisteredContent = hasContents || !!c.type;
  const bulkChk = (bulk || reorder)
    ? `<span class="bulk-chk-wrap"><input type="checkbox" class="bulk-chk"
         ${BULK_SELECTED.has(c.id) ? 'checked' : ''}
         onchange="bulkToggle('${c.id}', this.checked)" /></span>`
    : '';
  const badgeCls = c.type ? '' : ' is-empty';
  const titleHtml = c.editing
    ? `<span class="title">
        <span class="type-label-badge${badgeCls}">
          <span class="cn-stack">
            <span class="cn-ic" aria-hidden="true">${typeIco}</span>
            <span class="cn-lbl">${typeLabelText}</span>
          </span>
        </span>
        <input class="title-input root-title-input" id="rct-edit-${c.id}"
          value="${esc(c.pendingNew ? '' : (c.title || ''))}"
          placeholder="신규 콘텐츠명을 입력해주세요."
          onblur="saveRootContentTitle('${c.id}', this.value)"
          onkeydown="if(event.key==='Enter'){event.preventDefault(); this.blur();} if(event.key==='Escape'){cancelRootContentEdit('${c.id}');}" />
      </span>`
    : `<span class="title">
        <span class="type-label-badge${badgeCls}">
          <span class="cn-stack">
            <span class="cn-ic" aria-hidden="true">${typeIco}</span>
            <span class="cn-lbl">${typeLabelText}</span>
          </span>
        </span>
        <span class="root-title">${esc(c.title)}</span>
      </span>`;
  const rhsHtml = bulk
    ? `<div class="rhs"><div class="actions">
         <button class="action-btn" onclick="deleteTocConfirm('${c.id}')" title="삭제">
           <span class="ic">🗑</span><span class="lbl">삭제</span>
         </button>
       </div></div>`
    : reorder
    ? `<div class="rhs reorder-rhs">
         ${!c.type ? `<button class="action-btn click-only-btn" onclick="event.stopPropagation(); convertRootContentToToc('${c.id}')" title="목차로 변경">
           <span class="ic">📁</span><span class="lbl">목차로 변경</span>
         </button>` : ''}
         <button class="action-btn click-only-btn" onclick="event.stopPropagation(); openMoveSingleTarget('${c.id}')" title="목차 이동">
           <span class="ic">➡</span><span class="lbl">목차 이동</span>
         </button>
         <button class="action-btn click-only-btn" onclick="event.stopPropagation(); copyToc('${c.id}')" title="복사">
           <span class="ic">📋</span><span class="lbl">복사</span>
         </button>
         ${canUp ? `<button class="action-btn merge-btn" onclick="event.stopPropagation(); mergeUp('${c.id}')" title="위로 합침">
           <span class="ic">⤴</span><span class="lbl">위로 합침</span>
         </button>` : ''}
         ${canDown ? `<button class="action-btn merge-btn" onclick="event.stopPropagation(); mergeDown('${c.id}')" title="아래로 합침">
           <span class="ic">⤵</span><span class="lbl">아래로 합침</span>
         </button>` : ''}
         <button class="action-btn" onclick="event.stopPropagation(); deleteTocConfirm('${c.id}')" title="삭제">
           <span class="ic">🗑</span><span class="lbl">삭제</span>
         </button>
         <div class="move-stack" onmousedown="event.stopPropagation();" draggable="false">
           <button type="button" class="move-btn" ${canUp ? '' : 'disabled'} onclick="event.stopPropagation(); moveTocUp('${c.id}')" title="위로">∧</button>
           <button type="button" class="move-btn" ${canDown ? '' : 'disabled'} onclick="event.stopPropagation(); moveTocDown('${c.id}')" title="아래로">∨</button>
         </div>
       </div>`
    : `<div class="rhs">
        <div class="actions">
          ${hasRegisteredContent
            ? `<button class="action-btn" onclick="openContentEditDrawer('${c.id}')" title="콘텐츠 수정">
                 <span class="ic">✎</span><span class="lbl">콘텐츠 수정</span>
               </button>`
            : `<button class="action-btn" onclick="openContentSetup('${c.id}')" title="콘텐츠 추가">
                 <span class="ic">📤</span><span class="lbl">콘텐츠 추가</span>
               </button>
               <button class="action-btn" onclick="openContentSetupLibrary('${c.id}')" title="라이브러리 추가">
                 <span class="ic">📚</span><span class="lbl">라이브러리 추가</span>
               </button>`}
          <button class="action-btn" onclick="deleteTocConfirm('${c.id}')" title="삭제">
            <span class="ic">🗑</span><span class="lbl">삭제</span>
          </button>
        </div>
      </div>`;
  const rowRhs = c.editing
    ? `<div class="rhs"><div class="actions">
         <button class="action-btn" onclick="event.stopPropagation(); (function(){var el=document.getElementById('rct-edit-${c.id}'); if(el) el.blur();})();" title="확정">
           <span class="ic">✔</span><span class="lbl">확정</span>
         </button>
         <button class="action-btn" onclick="event.stopPropagation(); cancelRootContentEdit('${c.id}')" title="취소">
           <span class="ic">✕</span><span class="lbl">취소</span>
         </button>
       </div></div>`
    : rhsHtml;
  return `
    <div class="toc-item content-root" data-id="${c.id}" data-pid="${c.id}" data-is-content="1" draggable="${(c.editing || bulk) ? 'false' : 'true'}">
      <div class="toc-row">
        <div class="lhs">
          ${bulkChk}
          ${reorder ? `<span class="reorder-handle" title="드래그하여 순서 변경">⋮⋮</span>` : ''}
          ${titleHtml}
          ${(c.draft && !reorder) ? `<span class="draft">draft</span>` : ''}
        </div>
        ${rowRhs}
      </div>
    </div>
  `;
}

function inserterHtml(scope, parentId, index) {
  return `<div class="toc-inserter" data-scope="${scope}" data-parent-id="${parentId || ''}" data-index="${index}">
    <button type="button" class="add-btn" aria-label="콘텐츠/목차 추가"
      onclick="event.stopPropagation(); openInserterPopover(this, '${scope}', '${parentId || ''}', ${index})">+</button>
  </div>`;
}

/* 콘텐츠 추가 화면(UPLOAD_TYPES) 과 동일한 아이콘 매핑 — 한국어 라벨 기준 조회 */

  '퀴즈': 'Q',
  '시험': '✅',
  '과제': '📋',

  '토론': '💬',

  '마이크로러닝': { cls: 't-micro',      ic: '📲', label: '마이크로러닝' },

  '과제':         { cls: 't-doc',        ic: '📄', label: '과제' },
  '아티클':       { cls: 't-article',    ic: '📰', label: '아티클' },
  '첨부파일':     { cls: 't-file',       ic: '📎', label: '첨부파일' },
  '유튜브':       { cls: 't-youtube',    ic: '▶',  label: '유튜브' },

function typeOf(c) {

  return null;
}

/* 하위 목차에 연결된 콘텐츠를 [배지] 콘텐츠명 · 출처 형태로 렌더링 (개수 무관). */
function renderChildContents(contents) {
  const rows = contents.map(cn => {
    const preset = CONTENT_TYPE_PRESETS[cn.type] || { ic: '📄', label: cn.type || '콘텐츠' };
    const name   = cn.title || preset.label;
    const source = cn.source || '내 콘텐츠';
    return `
      <div class="content-chip">
        <span class="cc-badge"><span class="cc-ic">${preset.ic}</span>${esc(preset.label)}</span>
        <span class="cc-name">${esc(name)}<span class="cc-sep">·</span><span class="cc-src">${esc(source)}</span></span>
      </div>`;
  }).join('');
  const multi = contents.length > 1;
  return `<div class="child-contents${multi ? ' multi' : ''}">${rows}</div>`;
}

function copyChild(pid, cid) {
  const t = STATE.toc.find(x => x.id === pid);
  if (!t || !t.children) return;
  const c = t.children.find(x => x.id === cid);
  if (!c) return;
  const copy = JSON.parse(JSON.stringify(c));
  copy.id = 'c' + Date.now();
  copy.title = c.title + ' (복사본)';
  const idx = t.children.findIndex(x => x.id === cid);
  t.children.splice(idx + 1, 0, copy);
  saveState(); refreshToc();
  toast('콘텐츠가 복제되었습니다.', 'success');
}

/* === 우측 액션: 콘텐츠 추가 진입점 (목차/하위목차 공통) === */
function _openAddDrawerWithTab(parentId, tabId) {
  openContentDrawer({ mode: 'add', parentId });
  DRAWER.tab = tabId;
  renderDrawerTabs();
  renderDrawer();
}
function addDirectToToc(id)            { _openAddDrawerWithTab(id,  'upload');  }
function addDirectToChild(pid, _cid)   { _openAddDrawerWithTab(pid, 'upload');  }
function addLibraryToToc(id)           { _openAddDrawerWithTab(id,  'library'); }
function addLibraryToChild(pid, _cid)  { _openAddDrawerWithTab(pid, 'library'); }
function addPrevToToc(id) {
  // 콘텐츠 추가 드로어(3탭)의 '이전과정' 탭으로 진입
  openContentDrawer({ mode: 'add', parentId: id });
  DRAWER.tab = 'prev';
  DRAWER.prevStep = 'list';
  DRAWER.prevCourse = null;
  DRAWER.prevSelectedModules = new Set();
  DRAWER.prevSelectedLeaves = new Set();
  DRAWER.prevQuery = '';
  renderDrawerTabs();
  renderDrawer();
}
function addPrevToChild(pid, cid)      { openContentDrawer({ mode: 'prevcourse', parentId: pid, targetId: cid, isLeaf: true }); }

function deleteTocConfirm(id) {
  if (BULK_DELETE) {
    STATE.toc = STATE.toc.filter(x => x.id !== id);
    BULK_SELECTED.delete(id);
    saveState();
    renderWizard(3);
    return;
  }
  if (REORDER_MODE) {
    const t0 = (STATE.toc || []).find(x => x.id === id);
    const label = (t0 && t0.isContent) ? '콘텐츠' : '목차';
    if (!confirm(`해당 ${label}를 삭제하시겠습니까?`)) return;
    STATE.toc = (STATE.toc || []).filter(x => x.id !== id);
    BULK_SELECTED.delete(id);
    if (t0) (t0.children || []).forEach(c => BULK_SELECTED.delete(c.id));
    saveState();
    renderWizard(3);
    return;
  }
  removeToc(id);
}
function deleteChildConfirm(pid, cid) {
  if (BULK_DELETE) {
    const t = STATE.toc.find(x => x.id === pid);
    if (!t) return;
    t.children = (t.children || []).filter(c => c.id !== cid);
    BULK_SELECTED.delete(cid);
    saveState();
    renderWizard(3);
    return;
  }
  if (REORDER_MODE) {
    if (!confirm('해당 하위 목차를 삭제하시겠습니까?')) return;
    const t = STATE.toc.find(x => x.id === pid);
    if (!t) return;
    t.children = (t.children || []).filter(c => c.id !== cid);
    BULK_SELECTED.delete(cid);
    const remaining = t.children || [];
    const allSelected = remaining.length > 0 && remaining.every(c => BULK_SELECTED.has(c.id));
    if (allSelected) BULK_SELECTED.add(t.id);
    else BULK_SELECTED.delete(t.id);
    saveState();
    renderWizard(3);
    return;
  }
  if (confirm('해당 하위 목차를 삭제하시겠습니까?')) removeSubToc(pid, cid);
}

/* === 일괄삭제 모드 === */
function collectAllIds() {
  const ids = [];
  (STATE.toc || []).forEach(t => {
    ids.push(t.id);
    (t.children || []).forEach(c => ids.push(c.id));
  });
  return ids;
}
function isAllSelected() {
  const all = collectAllIds();
  if (all.length === 0) return false;
  return all.every(id => BULK_SELECTED.has(id));
}
function enterBulkDelete() {
  BULK_DELETE = true;
  BULK_SELECTED = new Set();
  renderWizard(3);
}

function enterReorderMode() {
  REORDER_MODE = true;
  REORDER_BACKUP = JSON.parse(JSON.stringify(STATE.toc || []));
  BULK_SELECTED = new Set();
  renderWizard(3);
}
function cancelReorderMode() {
  if (REORDER_BACKUP) STATE.toc = REORDER_BACKUP;
  REORDER_BACKUP = null;
  REORDER_MODE = false;
  BULK_SELECTED = new Set();
  saveState();
  renderWizard(3);
}
function finishReorderMode() {
  REORDER_BACKUP = null;
  REORDER_MODE = false;
  BULK_SELECTED = new Set();
  saveState();
  toast('순서가 저장되었습니다.', 'success');
  renderWizard(3);
}

/* ============================================================
   순서편집 모드 — 목차이동 / 계층 변경
============================================================ */

// 목차이동 — 대상 상위목차 선택 팝업
let MOVE_TARGET_ID = null;
function openMoveTocTargetModal() {
  if (BULK_SELECTED.size < 1) {
    toast('이동할 목차를 선택해주세요.', 'warn');
    return;
  }
  // 선택된 상위목차는 자기 자신으로 이동 불가 → 대상에서 제외
  const excluded = new Set();
  (STATE.toc || []).forEach(t => {
    if (BULK_SELECTED.has(t.id)) excluded.add(t.id);
  });
  const candidates = (STATE.toc || []).filter(t => !excluded.has(t.id));

  if (candidates.length === 0) {
    openModal({
      title: '목차 이동',
      body: `<div class="move-target-empty">이동할 수 있는 대상 상위 목차가 없습니다. 선택을 다시 확인해주세요.</div>`,
      primary: { label: '닫기', onClick: closeModal }
    });
    return;
  }

  MOVE_TARGET_ID = candidates[0].id;
  const listHtml = candidates.map(t => `
    <div class="move-target-item ${t.id === MOVE_TARGET_ID ? 'selected' : ''}"
      data-tid="${t.id}" onclick="pickMoveTarget('${t.id}')">
      <span class="mt-title">${esc(t.title)}</span>
      <span class="mt-meta">하위 ${(t.children || []).length} 개</span>
    </div>
  `).join('');

  openModal({
    title: '이동할 상위 목차 선택',
    body: `
      <p>선택한 <b>${BULK_SELECTED.size}</b>개 항목을 어느 상위 목차의 하위로 이동할까요?</p>
      <div id="move-target-list" class="move-target-list">${listHtml}</div>
    `,
    primary: { label: '이동', onClick: () => {
      if (!MOVE_TARGET_ID) { toast('대상 상위 목차를 선택해주세요.', 'warn'); return; }
      executeBulkMove(MOVE_TARGET_ID);
      closeModal();
    }},
    secondary: { label: '취소', onClick: () => { MOVE_TARGET_ID = null; } }
  });
}

function pickMoveTarget(id) {

function executeBulkMove(targetId) {
  const target = (STATE.toc || []).find(x => x.id === targetId);
  if (!target) return;
  target.children = target.children || [];

  // 옮길 항목 수집
  const movingParents = [];
  const movingChildren = [];

  (STATE.toc || []).forEach(t => {
    if (t.id === target.id) return;
    if (BULK_SELECTED.has(t.id)) {
      movingParents.push(t);
      if (!t.isContent && (t.children || []).length === 0) {
        // 빈 목차: 자식이 없어도 흔적이 남도록 선택 목차 자체를 미지정 콘텐츠로 보존
        movingChildren.push({ id: t.id, title: t.title, draft: t.draft });
      } else {
        (t.children || []).forEach(c => movingChildren.push(c));
      }
    }
  });

  const movingParentIds = new Set(movingParents.map(p => p.id));
  (STATE.toc || []).forEach(t => {
    if (t.id === target.id) return;
    if (movingParentIds.has(t.id)) return;
    (t.children || []).forEach(c => {
      if (BULK_SELECTED.has(c.id)) movingChildren.push(c);
    });
  });

  target.children = target.children.concat(movingChildren);
  target.expanded = true;

  // STATE.toc에서 옮긴 상위목차 제거
  STATE.toc = STATE.toc.filter(t => !movingParentIds.has(t.id));

  // 원래 부모에서 옮긴 하위목차 제거
  STATE.toc.forEach(t => {
    if (t.id === target.id) return;
    if (!t.children) return;
    t.children = t.children.filter(c => !BULK_SELECTED.has(c.id));
  });

  BULK_SELECTED = new Set();
  MOVE_TARGET_ID = null;
  saveState();
  renderWizard(3);
  toast(`선택한 항목을 “${target.title}” 아래로 이동했습니다.`, 'success');
}

// 단일 항목 이동 — 행 단위 '목차 이동' 버튼에서 호출
function openMoveSingleTarget(id) {

      data-tid="${t.id}" onclick="pickMoveTarget('${t.id}')">

      <span class="mt-meta">하위 ${(t.children || []).length} 개</span>

  `).join('');

  openModal({

      <p>선택한 항목을 어느 상위 목차의 하위로 이동할까요?</p>
      <div id="move-target-list" class="move-target-list">${listHtml}</div>
    `,
    primary: { label: '이동', onClick: () => {
      if (!MOVE_TARGET_ID) { toast('대상 상위 목차를 선택해주세요.', 'warn'); return; }
      executeSingleMove(id, MOVE_TARGET_ID);
      closeModal();
    }},
    secondary: { label: '취소', onClick: () => { MOVE_TARGET_ID = null; } }
  });
}

function executeSingleMove(itemId, targetId) {
  const target = (STATE.toc || []).find(x => x.id === targetId);
  if (!target) return;
  target.children = target.children || [];

  // 1-depth 목차(또는 1-depth 콘텐츠 행)인지 검사 — 일괄이동과 동일한 규칙: 옮긴 목차의 자식들만 target 하위로, 목차 자체 행은 제거
  const parentIdx = (STATE.toc || []).findIndex(t => t.id === itemId);
  if (parentIdx >= 0) {
    const t = STATE.toc[parentIdx];
    if (t.isContent) {
      // 콘텐츠 행은 그 자체가 하위로 이동
      target.children.push({ id: t.id, title: t.title, type: t.type, contents: t.contents, draft: t.draft });
    } else if ((t.children || []).length === 0) {
      // 빈 목차: 자식이 없어도 흔적이 남도록 선택 목차 자체를 미지정 콘텐츠로 보존
      target.children.push({ id: t.id, title: t.title, draft: t.draft });
    } else {
      const childrenToMove = t.children || [];
      target.children = target.children.concat(childrenToMove);
    }
    STATE.toc.splice(parentIdx, 1);
  } else {
    // 자식 노드 검색 → 1건 이동
    for (const t of STATE.toc) {
      if (t.id === target.id) continue;
      if (!t.children) continue;
      const idx = t.children.findIndex(c => c.id === itemId);
      if (idx >= 0) {
        const [moved] = t.children.splice(idx, 1);
        target.children.push(moved);
        break;
      }
    }
  }

  target.expanded = true;
  MOVE_TARGET_ID = null;
  saveState();
  renderWizard(3);
  toast(`항목을 “${target.title}” 아래로 이동했습니다.`, 'success');
}

function moveTocUp(id) {
  const list = STATE.toc || [];
  const idx = list.findIndex(x => x.id === id);
  if (idx > 0) {
    [list[idx-1], list[idx]] = [list[idx], list[idx-1]];
    saveState(); refreshToc();
  }
}
function moveTocDown(id) {
  const list = STATE.toc || [];
  const idx = list.findIndex(x => x.id === id);
  if (idx >= 0 && idx < list.length - 1) {
    [list[idx+1], list[idx]] = [list[idx], list[idx+1]];
    saveState(); refreshToc();
  }
}
function moveChildUp(pid, cid) {
  const t = (STATE.toc || []).find(x => x.id === pid);
  if (!t || !t.children) return;
  const idx = t.children.findIndex(x => x.id === cid);
  if (idx > 0) {
    [t.children[idx-1], t.children[idx]] = [t.children[idx], t.children[idx-1]];
    saveState(); refreshToc();
  }
}
function moveChildDown(pid, cid) {
  const t = (STATE.toc || []).find(x => x.id === pid);
  if (!t || !t.children) return;
  const idx = t.children.findIndex(x => x.id === cid);
  if (idx >= 0 && idx < t.children.length - 1) {
    [t.children[idx+1], t.children[idx]] = [t.children[idx], t.children[idx+1]];
    saveState(); refreshToc();
  }
}

function bulkToggle(id, checked) {
  const parentToc = (STATE.toc || []).find(t => t.id === id);
  if (parentToc) {
    // 상위 목차 토글 → 하위 콘텐츠 전체 동기화
    if (checked) {
      BULK_SELECTED.add(id);
      (parentToc.children || []).forEach(c => BULK_SELECTED.add(c.id));
    } else {
      BULK_SELECTED.delete(id);
      (parentToc.children || []).forEach(c => BULK_SELECTED.delete(c.id));
    }
  } else {
    // 하위 콘텐츠 토글 → 형제 콘텐츠 상태에 따라 상위 목차도 동기화
    if (checked) BULK_SELECTED.add(id);
    else BULK_SELECTED.delete(id);
    const parent = (STATE.toc || []).find(t => (t.children || []).some(c => c.id === id));
    if (parent) {
      const children = parent.children || [];
      const allSelected = children.length > 0 && children.every(c => BULK_SELECTED.has(c.id));
      if (allSelected) BULK_SELECTED.add(parent.id);
      else BULK_SELECTED.delete(parent.id);
    }
  }
  renderWizard(3);
}

function refreshToc() {

function bindStep3() {
  const list = document.getElementById('toc-list');
  if (!list || list.dataset.dndBound === '1') return;
  list.dataset.dndBound = '1';
  list.addEventListener('dragstart', onTocDragStart);

  list.addEventListener('dragleave', onTocDragLeave);
  list.addEventListener('drop',      onTocDrop);
  list.addEventListener('dragend',   onTocDragEnd);
