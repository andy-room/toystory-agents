<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>러닝메이커 — 개선안 v0.5</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/static/woff2/SUIT.css">
<style>
/* ─── HDS Tokens ──────────────────────────────────────────── */
:root {
  --bg:#F7F7F8; --surface:#FFFFFF; --surface-2:#F4F4F5; --surface-3:#EAEBEC;
  --border:#EAEBEC; --border-md:#DBDCDF; --border-strong:#C2C4C8;
  --text:#171719; --text-2:#46474C; --text-3:#878A93;
  --brand:#0066FF; --brand-soft:#EBF3FF; --brand-strong:#0052CC;
  --cta:#171719; --cta-text:#FFFFFF;
  --danger:#FA2E43; --danger-soft:#FFF7F7; --success:#00BF40; --warn:#FF9200;
  --shadow-xs:0 1px 2px rgba(0,0,0,.05);
  --shadow-sm:0 1px 4px rgba(0,0,0,.07),0 0 0 1px rgba(0,0,0,.05);
  --shadow-md:0 4px 20px rgba(0,0,0,.10),0 0 0 1px rgba(0,0,0,.05);
  --r4:4px;--r6:6px;--r8:8px;--r12:12px;--r16:16px;--r20:20px;
  --nav-w:216px;--header-h:52px;--tr:120ms ease;
}
[data-theme="dark"] {
  --bg:#171719;--surface:#1B1C1E;--surface-2:#212225;--surface-3:#292A2D;
  --border:#292A2D;--border-md:#333438;--border-strong:#46474C;
  --text:#F7F7F8;--text-2:#C2C4C8;--text-3:#70737C;
  --brand-soft:rgba(0,102,255,.14);--cta:#F7F7F8;--cta-text:#171719;
  --shadow-xs:0 1px 2px rgba(0,0,0,.5);
  --shadow-sm:0 1px 3px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.05);
  --shadow-md:0 4px 20px rgba(0,0,0,.45),0 0 0 1px rgba(255,255,255,.06);
  --danger-soft:rgba(250,46,67,.12);
}

/* ─── Reset ───────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-size:16px}
body{font-family:'Pretendard',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.5}
button{font-family:inherit;cursor:pointer;border:none;background:none}
a{color:inherit;text-decoration:none}
input,select,textarea{font-family:inherit;font-size:16px}

/* ─── Topbar ──────────────────────────────────────────────── */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:#171a21;color:#fff;z-index:100;display:flex;align-items:center;padding:0 20px;gap:16px;border-bottom:1px solid #000}
.topbar .logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:15px;letter-spacing:-.3px}
.topbar .logo .l{color:#fff}.topbar .logo .n{color:#0066FF}
.topbar .tag{background:#242930;color:#9ca3af;font-size:11px;padding:2px 8px;border-radius:999px}
.topbar .spacer{flex:1}
.topbar .user{display:flex;align-items:center;gap:12px;font-size:13px}
.topbar .user .name{color:#e5e7eb;font-weight:500}
.theme-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#d1d5db;padding:5px 12px;border-radius:var(--r6);font-size:12px;cursor:pointer;transition:background var(--tr)}
.theme-btn:hover{background:rgba(255,255,255,.15);color:#fff}

/* ─── Nav Sidebar ─────────────────────────────────────────── */
.nav-sidebar{position:fixed;top:var(--header-h);left:0;bottom:0;width:var(--nav-w);background:var(--surface);border-right:1px solid var(--border);z-index:90;display:flex;flex-direction:column;overflow-y:auto}
.nav-studio{margin:12px 10px 8px;padding:10px 12px;border:1px solid var(--border-md);border-radius:var(--r8);display:flex;align-items:center;justify-content:space-between;background:var(--surface-2);cursor:pointer;transition:background var(--tr)}
.nav-studio:hover{background:var(--surface-3)}
.nav-studio .lbl{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--text-2)}
.nav-studio .ext{font-size:11px;color:var(--text-3)}
.nav-menu{padding:4px 8px 24px}
.nav-group{margin-bottom:2px}
.nav-item{display:flex;align-items:center;justify-content:space-between;padding:9px 10px;border-radius:var(--r6);color:var(--text-2);font-weight:600;font-size:13px;cursor:pointer;user-select:none;transition:background var(--tr),color var(--tr)}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:var(--brand-soft);color:var(--brand-strong)}
.nav-item .lhs{display:flex;align-items:center;gap:8px}
.nav-item .caret{font-size:10px;color:var(--text-3);transition:transform .18s}
.nav-group.open .nav-item .caret{transform:rotate(180deg)}
.nav-sub{padding:2px 8px 4px 32px;display:none}
.nav-group.open .nav-sub{display:block}
.nav-sub a{display:block;padding:7px 10px;border-radius:var(--r6);color:var(--text-2);font-size:12px;transition:background var(--tr),color var(--tr)}
.nav-sub a:hover{background:var(--surface-2);color:var(--text)}
.nav-sub a.active{background:var(--surface-3);color:var(--text);font-weight:600}

/* ─── Main Wrapper ────────────────────────────────────────── */
.main-wrap{margin-left:var(--nav-w);padding-top:var(--header-h);min-height:100vh}
.main-wrap.editor-mode{height:100vh;overflow:hidden}

/* ─── Dashboard ───────────────────────────────────────────── */
.dash-page{padding:40px 48px 100px;max-width:1040px}
.dash-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px}
.dash-header h1{font-size:24px;font-weight:800;letter-spacing:-.4px}
.dash-header p{font-size:13px;color:var(--text-3);margin-top:3px}
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border-md);margin-bottom:20px}
.tab{padding:9px 16px;font-size:13px;font-weight:600;color:var(--text-3);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:color var(--tr),border-color var(--tr)}
.tab:hover{color:var(--text-2)}
.tab.active{color:var(--text);border-bottom-color:var(--text)}
.tab .cnt{display:inline-block;margin-left:6px;background:var(--surface-3);color:var(--text-2);font-size:11px;font-weight:700;padding:1px 6px;border-radius:999px}
.tab.active .cnt{background:var(--text);color:var(--bg)}
.course-list{display:flex;flex-direction:column;gap:8px}
.course-row{display:flex;align-items:center;gap:16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r8);padding:14px 18px;cursor:pointer;transition:border-color var(--tr),box-shadow var(--tr)}
.course-row:hover{border-color:var(--border-strong);box-shadow:var(--shadow-sm)}
.type-badge{flex-shrink:0;font-size:11px;font-weight:700;padding:3px 8px;border-radius:var(--r4)}
.type-badge.online{background:#EBF3FF;color:#0052CC}
.type-badge.offline{background:#EBFAF0;color:#007326}
.type-badge.hybrid{background:#F3F0FE;color:#3D2791}
.type-badge.single{background:#FFF9F5;color:#993800}
[data-theme="dark"] .type-badge.online{background:rgba(0,102,255,.18);color:#66A3FF}
[data-theme="dark"] .type-badge.offline{background:rgba(0,191,64,.15);color:#66D98C}
[data-theme="dark"] .type-badge.hybrid{background:rgba(101,65,242,.18);color:#A38DF7}
[data-theme="dark"] .type-badge.single{background:rgba(153,56,0,.2);color:#FF9E66}
.course-row .cinfo{flex:1;min-width:0}
.course-row .ctitle{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.course-row .cmeta{font-size:12px;color:var(--text-3);margin-top:2px}
.status-pill{flex-shrink:0;font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px}
.status-pill.create{background:var(--surface-2);color:var(--text-2)}
.status-pill.edit{background:#EBF3FF;color:#0052CC}
.status-pill.ready{background:#EBFAF0;color:#007326}
.status-pill.ongoing{background:#FFF9F5;color:#993800}
.status-pill.done{background:var(--surface-3);color:var(--text-3)}
[data-theme="dark"] .status-pill.edit{background:rgba(0,102,255,.18);color:#66A3FF}
[data-theme="dark"] .status-pill.ready{background:rgba(0,191,64,.15);color:#66D98C}
[data-theme="dark"] .status-pill.ongoing{background:rgba(153,56,0,.2);color:#FF9E66}

/* ════════════════════════════════════════════════════════════
   EDITOR v0.5 — Two-box Layout
════════════════════════════════════════════════════════════ */
.editor-page{padding:20px 24px;display:flex;gap:16px;align-items:stretch;max-width:1800px;margin:0 auto;height:calc(100vh - var(--header-h) - 40px)}

/* ─── Left Sidebar Box ────────────────────────────────────── */
.editor-sidebar-box{width:232px;flex-shrink:0;background:var(--surface);border:1px solid var(--border-md);border-radius:var(--r16);padding:24px 18px;display:flex;flex-direction:column;overflow-y:auto;align-self:flex-start;position:sticky;top:0;max-height:100%}
.esb-course-label{font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.esb-course-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:24px;line-height:1.4;word-break:break-all;cursor:pointer;padding:7px 9px;border-radius:var(--r6);border:1px solid transparent;transition:background var(--tr),border-color var(--tr)}
.esb-course-title:hover{background:var(--surface-2);border-color:var(--border-md)}

/* Section Nav */
.section-nav{display:flex;flex-direction:column;gap:0;position:relative}
.section-nav::before{content:'';position:absolute;left:13px;top:14px;bottom:14px;width:2px;background:var(--border-md)}
.snav-item{display:flex;align-items:center;gap:14px;padding:10px 0;cursor:pointer;position:relative;transition:color var(--tr)}
.snav-item .dot{width:14px;height:14px;border-radius:999px;flex-shrink:0;border:2px solid var(--border-strong);background:var(--surface);transition:border-color var(--tr),background var(--tr),transform var(--tr);position:relative;z-index:1}
.snav-item:hover .dot{border-color:var(--brand)}
.snav-item.active .dot{border-color:var(--brand);background:var(--brand);transform:scale(1.15)}
.snav-item .slabel{font-size:15px;font-weight:600;color:var(--text-3);transition:color var(--tr)}
.snav-item:hover .slabel{color:var(--text-2)}
.snav-item.active .slabel{color:var(--brand-strong);font-weight:700}
.editor-open-btn{margin-top:28px;width:100%;padding:14px;border-radius:var(--r8);background:var(--cta);color:var(--cta-text);font-size:15px;font-weight:700;cursor:pointer;transition:opacity var(--tr)}
.editor-open-btn:hover{opacity:.85}
.esb-course-label{font-size:12px;font-weight:700;color:var(--text-3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}

/* ─── Right Main Box ──────────────────────────────────────── */
.editor-main-box{flex:1;min-width:0;background:var(--surface);border:1px solid var(--border-md);border-radius:var(--r16);overflow-y:auto;height:100%}
.esec{padding:44px 44px;border-bottom:1px solid var(--border);scroll-margin-top:calc(var(--header-h)+20px)}
.esec:last-child{border-bottom:none}
.esec-header{margin-bottom:28px}
.esec-num{font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.5px;margin-bottom:6px}
.esec-title{font-size:24px;font-weight:800;letter-spacing:-.4px;margin-bottom:6px}
.esec-desc{font-size:13px;color:var(--text-2);line-height:1.6}

/* ─── Fields ──────────────────────────────────────────────── */
.field{margin-bottom:20px}
.flabel{font-size:12px;font-weight:600;color:var(--text-2);margin-bottom:6px;display:block}
.flabel .req{color:var(--brand)}
.input{width:100%;padding:10px 14px;border:1px solid var(--border-strong);border-radius:var(--r6);background:var(--surface);color:var(--text);outline:none;transition:border-color var(--tr),box-shadow var(--tr)}
.input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,102,255,.1)}
.input.lg{padding:13px 16px;font-size:15px;font-weight:600}
.hint{font-size:12px;color:var(--text-3);margin-top:6px;line-height:1.5}

/* ─── Type Cards v2 — 4×2 with icons ────────────────────── */
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;width:100%}
.type-card{background:var(--surface);border:1.5px solid var(--border-md);border-radius:var(--r12);padding:20px;cursor:pointer;display:flex;flex-direction:column;gap:10px;position:relative;transition:border-color .15s,box-shadow .15s}
.type-card:hover{border-color:var(--warn);box-shadow:0 2px 12px rgba(255,146,0,.10)}
.type-card.selected{border-color:var(--warn);background:rgba(255,146,0,.03);box-shadow:0 0 0 2px rgba(255,146,0,.25)}
.tc-icon-wrap{width:52px;height:52px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;margin-bottom:2px}
.type-card h3{font-size:14px;font-weight:800;letter-spacing:-.3px;color:var(--text)}
.type-card p{font-size:12px;color:var(--text-2);line-height:1.5;flex:1}
.tc-types{font-size:11px;font-weight:700;color:var(--text-3);display:flex;align-items:center;gap:4px;margin-top:4px}
.type-card.selected .tc-types{color:var(--warn)}
.type-sel-badge{position:absolute;top:10px;right:10px;width:20px;height:20px;border-radius:999px;background:var(--warn);color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity var(--tr)}
.type-card.selected .type-sel-badge{opacity:1}

/* ════════════════════════════════════════════════════════════
   목차·콘텐츠 PANEL v0.5
════════════════════════════════════════════════════════════ */
.toc-panel{border:1px solid var(--border-md);border-radius:var(--r8);overflow:hidden;display:flex;min-height:680px}

/* ─── Left: Timeline Tree ─────────────────────────────────── */
.toc-panel-left{width:340px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--surface-2)}
.toc-panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.toc-panel-head .tph-label{font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.4px;text-transform:uppercase}
.toc-panel-items{flex:1;overflow-y:auto;padding:8px 6px}
.toc-panel-foot{padding:8px 8px;border-top:1px solid var(--border);flex-shrink:0}
.toc-add-btn{width:100%;padding:9px;border-radius:var(--r6);border:1.5px dashed var(--border-strong);display:flex;align-items:center;justify-content:center;gap:6px;font-size:13px;font-weight:600;color:var(--text-3);cursor:pointer;transition:border-color var(--tr),color var(--tr),background var(--tr)}
.toc-add-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}

/* Timeline items */
.toc-timeline{display:flex;flex-direction:column;padding:4px 2px}
.tl-item{display:flex;gap:0}
.tl-left{display:flex;flex-direction:column;align-items:center;width:48px;flex-shrink:0;padding-top:4px}
.tl-num{width:30px;height:30px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;z-index:1;cursor:pointer;background:var(--surface-3);color:var(--text-3);border:2px solid var(--border-md);transition:background var(--tr),color var(--tr),border-color var(--tr),transform var(--tr)}
.tl-item:hover .tl-num{border-color:var(--brand-strong)}
.tl-item.active .tl-num{background:var(--brand);color:#fff;border-color:var(--brand);transform:scale(1.08)}
.tl-line{width:2px;flex:1;min-height:10px;background:var(--border-md);margin:3px 0}
.tl-item.active>.tl-left>.tl-line{background:linear-gradient(to bottom,var(--brand),var(--border-md))}
.tl-right{flex:1;min-width:0;padding:0 8px 16px 6px}
.tl-header{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:var(--r6);cursor:pointer;user-select:none;transition:background var(--tr)}
.tl-header:hover{background:var(--surface-3)}
.tl-title{flex:1;font-size:15px;font-weight:700;color:var(--text);min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-item.active .tl-title{color:var(--brand-strong)}
.tl-cnt-pill{font-size:12px;font-weight:600;color:var(--text-3);background:var(--surface-3);padding:2px 7px;border-radius:999px;flex-shrink:0}
.tl-item.active .tl-cnt-pill{background:var(--brand-soft);color:var(--brand)}
.tl-add-inline{width:22px;height:22px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--text-3);flex-shrink:0;cursor:pointer;background:transparent;border:1.5px solid var(--border-md);transition:background var(--tr),color var(--tr),border-color var(--tr)}
.tl-add-inline:hover{background:var(--brand);color:#fff;border-color:var(--brand)}
.tl-item-actions{display:none;align-items:center;gap:2px;flex-shrink:0}
.tl-header:hover .tl-item-actions{display:flex}
.t-btn{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-3);cursor:pointer;transition:background var(--tr),color var(--tr)}
.t-btn:hover{background:var(--surface);color:var(--text)}
.t-btn.del:hover{background:#fef2f2;color:var(--danger)}
.tl-children{padding:4px 0 0 0;display:flex;flex-direction:column;gap:2px}
.tl-child-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r6);cursor:pointer;border:1px solid transparent;transition:background var(--tr),border-color var(--tr)}
.tl-child-row:hover{background:var(--surface-3)}
.tl-child-row.active{background:rgba(0,102,255,.08);border-color:rgba(0,102,255,.2)}
.c-ico-sm{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px}
.c-name{flex:1;font-size:14px;font-weight:500;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.tl-child-row.active .c-name{color:var(--text);font-weight:600}
.c-actions{display:none;align-items:center;gap:2px;flex-shrink:0}
.tl-child-row:hover .c-actions{display:flex}
.tl-empty{padding:6px 10px;font-size:12px;color:var(--text-3);font-style:italic}
.tree-name-input{flex:1;font-size:14px;font-weight:700;color:var(--text);border:none;outline:none;background:transparent;border-bottom:1.5px solid var(--brand);min-width:0;padding:0}

/* ─── Right: Content Panel ────────────────────────────────── */
.frame-content{flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column;background:var(--surface)}
.frame-content-head{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--surface);flex-shrink:0}
.frame-content-head .ctit{font-size:13px;font-weight:700;color:var(--text);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.frame-content-head .ctit .tref{font-weight:400;color:var(--text-3);margin-left:6px;font-size:12px}
.frame-content-items{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:6px}
.back-btn{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:700;color:var(--text-2);padding:4px 8px;border-radius:var(--r6);cursor:pointer;flex-shrink:0;transition:background var(--tr),color var(--tr);white-space:nowrap}
.back-btn:hover{background:var(--surface-2);color:var(--text)}

/* Content list rows with hover-edit title */
.fcontent-row{display:flex;align-items:center;gap:12px;padding:14px 16px;border:1px solid var(--border);border-radius:var(--r8);background:var(--surface);transition:border-color var(--tr),box-shadow var(--tr);cursor:pointer;position:relative}
.fcontent-row:hover{border-color:var(--brand);box-shadow:var(--shadow-xs)}
.fcontent-row .cicon{width:42px;height:42px;border-radius:var(--r8);background:var(--surface-2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.fcontent-row .cinfo{flex:1;min-width:0}
.ctitle-edit{display:block;font-size:14px;font-weight:600;color:var(--text);outline:none;border-radius:var(--r4);padding:1px 3px;margin:-1px -3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text;border:1.5px solid transparent;transition:border-color .15s,background .15s}
.fcontent-row:hover .ctitle-edit{border-color:var(--border-md);background:var(--surface-2)}
.ctitle-edit:focus{border-color:var(--brand)!important;background:var(--brand-soft)!important;color:var(--brand-strong)}
.fcontent-row .cmeta{font-size:12px;color:var(--text-3);margin-top:3px}
.fcontent-row .reorder-btns{display:none;flex-direction:column;gap:2px;flex-shrink:0}
.fcontent-row:hover .reorder-btns{display:flex}
.reorder-btn{width:20px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-3);border-radius:3px;cursor:pointer;transition:background var(--tr),color var(--tr)}
.reorder-btn:hover{background:var(--surface-3);color:var(--text)}
.fcontent-row .cact{display:flex;gap:4px;flex-shrink:0}

/* Content detail panel */
.fc-detail{flex:1;overflow-y:auto;padding:20px 20px}
.detail-section{margin-bottom:20px}
.detail-section-label{font-size:11px;font-weight:700;color:var(--text-3);letter-spacing:.4px;text-transform:uppercase;margin-bottom:10px}
.video-thumb{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#0a1628 0%,#1a3a6b 100%);border-radius:var(--r8);display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;overflow:hidden;margin-bottom:16px}
.video-thumb .play-btn{width:56px;height:56px;border-radius:999px;background:rgba(255,255,255,.9);display:flex;align-items:center;justify-content:center;font-size:22px;color:#171719;box-shadow:0 4px 20px rgba(0,0,0,.4);transition:transform .15s}
.video-thumb:hover .play-btn{transform:scale(1.1)}
.video-thumb .thumb-label{position:absolute;bottom:10px;right:12px;background:rgba(0,0,0,.7);color:#fff;font-size:11px;font-weight:700;padding:2px 7px;border-radius:999px;font-family:'SUIT',sans-serif}
.detail-field{margin-bottom:14px}
.detail-field .df-label{font-size:11px;font-weight:700;color:var(--text-3);margin-bottom:5px}
.detail-field .df-val{font-size:14px;font-weight:600;color:var(--text);padding:7px 10px;border:1.5px solid transparent;border-radius:var(--r6);outline:none;width:100%;background:transparent;transition:border-color .15s,background .15s;cursor:text}
.detail-field .df-val:hover{border-color:var(--border-md);background:var(--surface-2)}
.detail-field .df-val:focus{border-color:var(--brand);background:var(--brand-soft)}
.detail-field .df-val.multiline{resize:vertical;min-height:72px;font-size:13px;font-weight:400;line-height:1.6}
.detail-meta-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.detail-meta-chip{display:inline-flex;align-items:center;gap:5px;background:var(--surface-2);border:1px solid var(--border);border-radius:999px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--text-2)}
.detail-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.detail-tag{background:var(--brand-soft);color:var(--brand-strong);font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px}

/* PDF detail */
.pdf-preview{display:flex;align-items:center;gap:16px;padding:20px;background:var(--surface-2);border-radius:var(--r8);border:1px solid var(--border);margin-bottom:16px}
.pdf-icon{font-size:40px;flex-shrink:0}
.pdf-info .pdf-name{font-size:15px;font-weight:700;color:var(--text)}
.pdf-info .pdf-meta{font-size:12px;color:var(--text-3);margin-top:3px}

/* Quiz detail */
.quiz-type-tabs{display:flex;gap:4px;margin-bottom:16px}
.quiz-tab{padding:6px 14px;border-radius:var(--r6);font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border-md);background:var(--surface);color:var(--text-2);transition:all var(--tr)}
.quiz-tab.active{background:var(--brand);color:#fff;border-color:var(--brand)}
.quiz-q{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r8);padding:14px;margin-bottom:10px}
.quiz-q-num{font-size:11px;font-weight:700;color:var(--brand);margin-bottom:6px}
.quiz-q-text{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;line-height:1.5}
.quiz-opts{display:flex;flex-direction:column;gap:6px}
.quiz-opt{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r6);font-size:13px;color:var(--text-2);border:1px solid var(--border);background:var(--surface)}
.quiz-opt.correct{background:rgba(0,191,64,.08);border-color:rgba(0,191,64,.3);color:var(--text);font-weight:600}
.quiz-opt .opt-label{width:20px;height:20px;border-radius:999px;background:var(--surface-3);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.quiz-opt.correct .opt-label{background:var(--success);color:#fff}
.quiz-add-q{display:flex;align-items:center;gap:6px;padding:9px 12px;border-radius:var(--r6);border:1.5px dashed var(--border-strong);font-size:13px;font-weight:600;color:var(--text-3);cursor:pointer;transition:all var(--tr)}
.quiz-add-q:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}

/* Content Add — pastel type cards */
.content-add-header{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.content-add-header .add-title{font-size:13px;font-weight:700;color:var(--text)}
.content-add-body{flex:1;overflow-y:auto;padding:20px 16px}
.upload-type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.upload-type-item{display:flex;flex-direction:column;align-items:center;gap:8px;padding:18px 12px;border:none;border-radius:var(--r12);cursor:pointer;text-align:center;transition:transform .15s,box-shadow .15s}
.upload-type-item:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.upload-type-item .uico{font-size:28px}
.upload-type-item .ulbl{font-size:12px;font-weight:700}
.utype-video{background:#DBEAFE;color:#1D4ED8}
.utype-image{background:#FCE7F3;color:#9D174D}
.utype-article{background:#DCFCE7;color:#15803D}
.utype-attach{background:#F5F5F4;color:#57534E}
.utype-youtube{background:#FEE2E2;color:#991B1B}
.utype-quiz{background:#FEF3C7;color:#92400E}
.utype-survey{background:#CFFAFE;color:#164E63}
.utype-link{background:#E0F2FE;color:#0C4A6E}
.utype-offline{background:#D1FAE5;color:#065F46}
.utype-assignment{background:#EDE9FE;color:#4C1D95}
.utype-discussion{background:#F3E8FF;color:#581C87}
.upload-drop{border:2px dashed var(--border-strong);border-radius:var(--r8);padding:28px 16px;text-align:center;cursor:pointer;transition:border-color var(--tr),background var(--tr);background:var(--surface)}
.upload-drop:hover{border-color:var(--brand);background:var(--brand-soft)}
.upload-drop .dico{font-size:24px;margin-bottom:8px}
.upload-drop .dtitle{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.upload-drop .dsub{font-size:11px;color:var(--text-3)}

/* ─── Unified Settings Block ──────────────────────────────── */
.setting-unified{border:1px solid var(--border);border-radius:var(--r8);overflow:hidden;background:var(--surface)}
.su-row{border-bottom:1px solid var(--border)}
.su-row:last-child{border-bottom:none}
.su-head{display:flex;align-items:center;gap:16px;padding:15px 18px;cursor:pointer;transition:background var(--tr)}
.su-head:hover{background:var(--surface-2)}
.su-key{font-size:13px;font-weight:700;color:var(--text);width:140px;flex-shrink:0}
.su-val{flex:1;font-size:13px;color:var(--text-2);line-height:1.5}
.su-val .em{color:var(--text);font-weight:700}
.su-val .desc{font-size:12px;color:var(--text-3);margin-top:2px}
.su-edit{font-size:12px;font-weight:600;color:var(--text-3);padding:4px 8px;border-radius:var(--r4);transition:background var(--tr),color var(--tr);white-space:nowrap}
.su-head:hover .su-edit{background:var(--surface-3);color:var(--text)}
.su-row.open .su-head{background:var(--brand-soft)}
.su-row.open .su-edit{color:var(--brand-strong)}
.su-body{padding:0 18px 18px;border-top:1px solid var(--border);background:var(--surface)}

/* S5 Toggles */
.toggle-unified-row{display:flex;align-items:center;gap:16px;padding:14px 18px;border-bottom:1px solid var(--border)}
.toggle-unified-row:last-child{border-bottom:none}
.tu-info{flex:1}
.tu-key{font-size:13px;font-weight:700;color:var(--text)}
.tu-desc{font-size:12px;color:var(--text-3);margin-top:2px}
.toggle-switch{display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.toggle-switch input{position:absolute;opacity:0;width:0;height:0}
.ttrack{width:40px;height:22px;border-radius:999px;background:var(--border-strong);position:relative;transition:background .2s;flex-shrink:0}
.toggle-switch input:checked+.ttrack{background:var(--brand)}
.tthumb{position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:999px;background:#fff;transition:transform .15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-switch input:checked+.ttrack .tthumb{transform:translateX(18px)}
.tlabel{font-size:12px;font-weight:600;color:var(--text-2);min-width:32px}

/* Opt rows */
.opt-row{display:flex;align-items:flex-start;gap:12px;padding:12px;margin-top:12px;border:1.5px solid var(--border-md);border-radius:var(--r8);cursor:pointer;transition:border-color var(--tr),background var(--tr)}
.opt-row.selected{border-color:var(--brand);background:var(--brand-soft)}
.opt-row input[type=radio]{margin-top:2px;accent-color:var(--brand);flex-shrink:0}
.opt-content .otit{font-size:13px;font-weight:700;color:var(--text)}
.opt-content .odesc{font-size:12px;color:var(--text-2);margin-top:3px;line-height:1.5}
.opt-content .octrl{margin-top:10px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600}
.edit-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px}
.inline-num{width:70px;padding:6px 10px;border-radius:var(--r4);border:1px solid var(--border-strong);background:var(--surface);color:var(--text)}
.period-row{display:flex;align-items:center;gap:8px;margin-top:10px;font-size:13px}
.period-lbl{font-size:12px;font-weight:600;color:var(--text-2);width:60px}

/* ─── Open Checklist — compact ────────────────────────────── */
.open-check-compact{border:1px solid var(--border);border-radius:var(--r8);overflow:hidden;margin-bottom:24px}
.occ-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--surface);transition:background var(--tr)}
.occ-row:last-child{border-bottom:none}
.occ-row.err{background:var(--danger-soft)}
[data-theme="dark"] .occ-row.err{background:rgba(250,46,67,.08)}
.occ-icon{width:20px;height:20px;border-radius:999px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.occ-row.ok .occ-icon{background:var(--success);color:#fff}
.occ-row.err .occ-icon{background:var(--danger);color:#fff}
.occ-label{font-size:12px;font-weight:700;color:var(--text);width:80px;flex-shrink:0}
.occ-value{flex:1;font-size:13px;color:var(--text-2)}
.occ-link{font-size:12px;color:var(--brand);font-weight:600;cursor:pointer;flex-shrink:0}
.occ-link:hover{text-decoration:underline}

/* ─── Buttons ─────────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 14px;border-radius:var(--r6);border:1px solid var(--border-strong);background:var(--surface);color:var(--text-2);font-size:13px;font-weight:600;cursor:pointer;transition:background var(--tr),border-color var(--tr),color var(--tr),transform 60ms;white-space:nowrap}
.btn:hover{border-color:var(--border-strong);color:var(--text);background:var(--surface-2)}
.btn:active{transform:translateY(1px)}
.btn-primary{background:var(--cta);color:var(--cta-text);border-color:var(--cta)}
.btn-primary:hover{opacity:.88;background:var(--cta);color:var(--cta-text)}
.btn-brand{background:var(--brand);color:#fff;border-color:var(--brand)}
.btn-brand:hover{background:var(--brand-strong);border-color:var(--brand-strong);color:#fff}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-2)}
.btn-ghost:hover{background:var(--surface-2)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:4px 8px;font-size:11px;font-weight:700}
.btn-icon{padding:5px;border-radius:var(--r6);color:var(--text-3);display:inline-flex;align-items:center}
.btn-icon:hover{background:var(--surface-2);color:var(--text)}
.btn-block{width:100%;justify-content:center}

/* ─── Toast / Modal ───────────────────────────────────────── */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:var(--r8);background:var(--cta);color:var(--cta-text);font-size:13px;font-weight:600;pointer-events:auto;box-shadow:var(--shadow-md);max-width:320px;animation:toastIn .18s ease}
.toast.success{background:#00BF40;color:#fff}.toast.warn{background:#FF9200;color:#fff}.toast.error{background:#FA2E43;color:#fff}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;align-items:center;justify-content:center}
.modal-mask.open{display:flex}
.modal{background:var(--surface);border-radius:var(--r12);padding:28px;min-width:380px;max-width:500px;box-shadow:var(--shadow-md)}
.modal h3{font-size:16px;font-weight:800;margin-bottom:8px}
.modal p{font-size:13px;color:var(--text-2);line-height:1.6;margin-bottom:4px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.divider{border:none;border-top:1px solid var(--border);margin:32px 0}
.empty-state{text-align:center;padding:64px 24px;color:var(--text-3)}

/* ─── TOC Edit Mode ───────────────────────────────────────── */
.tl-hover-actions{display:none;align-items:center;gap:2px;flex-shrink:0}
.tl-header:hover .tl-hover-actions{display:flex}
.tl-add-content-btn{width:calc(100% - 12px);margin:4px 6px 6px;padding:7px;border-radius:var(--r6);border:1.5px dashed var(--border-strong);font-size:13px;font-weight:600;color:var(--text-3);cursor:pointer;background:transparent;transition:all var(--tr);text-align:center;display:block}
.tl-add-content-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-soft)}
/* TOC circle bigger */
.tl-num{width:36px!important;height:36px!important;font-size:15px!important}
/* Content row - no hover edit */
.ctitle-display{display:block;font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:1px 3px;margin:-1px -3px;border-radius:var(--r4)}
/* ─── Content Form (Add Flow) ────────────────────────────── */
.cf-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.cf-type-badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px;background:var(--warn);color:#fff}
.cf-type-change{font-size:12px;color:var(--brand);cursor:pointer;font-weight:600}
.cf-type-change:hover{text-decoration:underline}
.cf-body{flex:1;overflow-y:auto;padding:20px 20px}
.cf-section{margin-bottom:20px}
.cf-label{font-size:12px;font-weight:700;color:var(--text-2);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.cf-label .req{color:var(--danger)}
.cf-input{width:100%;padding:10px 14px;border:1px solid var(--border-strong);border-radius:var(--r6);background:var(--surface);color:var(--text);outline:none;transition:border-color var(--tr);font-size:14px}
.cf-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,102,255,.1)}
.cf-upload{border:2px dashed var(--border-strong);border-radius:var(--r8);padding:32px 16px;text-align:center;cursor:pointer;transition:border-color var(--tr),background var(--tr)}
.cf-upload:hover{border-color:var(--brand);background:var(--brand-soft)}
.cf-upload .cu-ico{font-size:24px;margin-bottom:8px;display:block}
.cf-upload .cu-title{font-size:13px;font-weight:700;color:var(--text-2)}
.cf-hints{margin-top:10px;padding-left:16px}
.cf-hints li{font-size:12px;color:var(--text-3);margin-bottom:3px}
.cf-actions{display:flex;justify-content:flex-end;gap:8px;padding:12px 20px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.cf-file-list{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.cf-file-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r6)}
.cf-file-icon{font-size:20px;flex-shrink:0}
.cf-file-name{flex:1;font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cf-file-del{color:var(--text-3);cursor:pointer;font-size:14px;padding:2px 6px;border-radius:var(--r4);transition:background var(--tr);flex-shrink:0}
.cf-file-del:hover{background:var(--surface-3);color:var(--danger)}
.cf-img-list{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.cf-img-item{display:flex;align-items:center;gap:10px;padding:6px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r6)}
.cf-img-handle{color:var(--text-3);font-size:14px;flex-shrink:0;cursor:grab}
.cf-img-thumb{width:64px;height:42px;border-radius:var(--r4);flex-shrink:0}
.cf-img-name{flex:1;font-size:12px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.cf-img-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--warn);color:#fff;flex-shrink:0}
.cf-offline-section{border:1px solid var(--border);border-radius:var(--r8);overflow:hidden}
.cf-round{border-bottom:1px solid var(--border)}
.cf-round:last-child{border-bottom:none}
.cf-round-head{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;transition:background var(--tr)}
.cf-round-head:hover{background:var(--surface-2)}
.cf-round-meta{font-size:12px;color:var(--text-3);margin:0 14px 10px;padding-left:16px}
.cf-round-meta li{margin-bottom:3px}
.cf-score-wrap{display:flex;align-items:center;gap:10px;margin-top:8px}
.cf-score-input{width:80px;padding:8px 12px;border:1px solid var(--border-strong);border-radius:var(--r6);font-size:16px;font-weight:700;text-align:center;outline:none;color:var(--text);background:var(--surface)}
.cf-score-input:focus{border-color:var(--brand)}
.cf-richtext{border:1px solid var(--border-strong);border-radius:var(--r6);overflow:hidden}
.cf-richtext-toolbar{display:flex;align-items:center;gap:4px;padding:6px 10px;border-bottom:1px solid var(--border);background:var(--surface-2)}
.cf-richtext-tool{width:24px;height:24px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--text-2);border-radius:3px;cursor:pointer;transition:background var(--tr)}
.cf-richtext-tool:hover{background:var(--surface-3)}
.cf-richtext-sep{width:1px;height:16px;background:var(--border-md);margin:0 2px}
.cf-richtext-drop{display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:3px;font-size:12px;font-weight:600;color:var(--text-2);cursor:pointer;border:1px solid var(--border);background:var(--surface)}
.cf-richtext-content{min-height:120px;padding:12px 14px;font-size:13px;color:var(--text-3);outline:none}
.cf-yt-search{display:flex;gap:6px}
.cf-yt-input{flex:1;padding:9px 12px;border:1px solid var(--border-strong);border-radius:var(--r6);font-size:14px;color:var(--text);outline:none;transition:border-color var(--tr)}
.cf-yt-input:focus{border-color:var(--brand)}
.cf-yt-btn{padding:9px 14px;border-radius:var(--r6);border:1px solid var(--border-strong);background:var(--surface-2);cursor:pointer;font-size:14px;transition:background var(--tr)}
.cf-yt-btn:hover{background:var(--surface-3)}
.cf-yt-preview{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:24px;background:var(--surface-2);border-radius:var(--r8);border:1px solid var(--border);margin-top:10px;text-align:center}
.cf-yt-preview-close{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:999px;background:var(--surface-3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text-3)}
.child-name-input{flex:1;font-size:13px;font-weight:600;color:var(--text);border:none;outline:none;background:transparent;border-bottom:1.5px solid var(--brand);min-width:0;padding:0}
/* (pastel colors defined above) */
</style>
</head>

/* ══════════════════════════════════════════════════════════
   Router
══════════════════════════════════════════════════════════ */
function go(path){location.hash='/'+path}
window.addEventListener('hashchange',route);
window.addEventListener('load',route);
function route(){
  const h=location.hash.replace(/^#\/?/,'')||'dashboard';
  document.getElementById('navDash')?.classList.remove('active');
  document.getElementById('navEditor')?.classList.remove('active');
  if(h==='dashboard'||h===''){document.getElementById('navDash')?.classList.add('active');renderDashboard();}
  else if(h==='editor'){document.getElementById('navEditor')?.classList.add('active');renderEditor();}
  else if(h==='placeholder'){renderPlaceholder();}
  else renderDashboard();
}

let dashTab='all';
function renderDashboard(){
  document.getElementById('mainWrap').classList.remove('editor-mode');
  const kl={online:'온라인',offline:'오프라인',hybrid:'혼합 학습'};
  const sl={create:'과정 생성',edit:'콘텐츠 편집',ready:'오픈 예정',ongoing:'학습 중',done:'학습 완료'};
  const tabs=[{id:'all',label:'전체',items:DASH_DATA},{id:'active',label:'진행중',items:DASH_DATA.filter(d=>['create','edit','ready','ongoing'].includes(d.status))},{id:'done',label:'학습 완료',items:DASH_DATA.filter(d=>d.status==='done')}];
  const cur=tabs.find(t=>t.id===dashTab)||tabs[0];
  document.getElementById('view').innerHTML=`
    <div class="dash-page">
      <div class="dash-header">
        <div><h1>러닝메이커 보드</h1><p>과정의 전체 생애주기를 한눈에 관리하세요.</p></div>
        <button class="btn btn-primary" onclick="startNew()">+ 새 과정 만들기</button>
      </div>
      <div class="tab-bar">${tabs.map(t=>`<div class="tab ${t.id===dashTab?'active':''}" onclick="setDashTab('${t.id}')">${t.label}<span class="cnt">${t.items.length}</span></div>`).join('')}</div>
      <div class="course-list">
        ${cur.items.map(item=>{
          const certTxt=item.certify==='processing'?'수료 처리 중':item.certify==='completed'?'수료 완료':'';
          const meta=item.learnFrom&&item.learnTo?`학습 ${item.learnFrom} ~ ${item.learnTo}`:item.mod?`수정 ${item.mod}`:'';
          return`<div class="course-row" onclick="go('editor')">
            <span class="type-badge ${item.kind}">${kl[item.kind]||item.kind}</span>
            <div class="cinfo"><div class="ctitle">${esc(item.title)}</div><div class="cmeta">${meta}${certTxt?` · ${certTxt}`:''}</div></div>
            <span class="status-pill ${item.status}">${sl[item.status]||item.status}</span>
            <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();go('editor')">편집</button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
}
function setDashTab(id){dashTab=id;renderDashboard()}
function startNew(){S.courseName='';S.creationType=null;go('editor')}

function updateLeftCourseTitle(){
  const el=document.getElementById('editorCourseName');
  if(el) el.innerHTML=S.courseName?esc(S.courseName):'<span style="color:var(--text-3);font-weight:400">미입력</span>';
}
function focusCourseNameInput(){const inp=document.getElementById('courseNameInput');if(inp){inp.focus();inp.select();}}

function initScrollSpy(){
  const root=document.querySelector('.editor-main-box');
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(!e.isIntersecting)return;
      document.querySelectorAll('.snav-item').forEach(item=>{
        item.classList.remove('active');
        if(item.dataset.target===e.target.id)item.classList.add('active');
      });
    });
  },{root,rootMargin:'-20% 0px -60% 0px'});
  SECTIONS.forEach(sec=>{const el=document.getElementById(sec.id);if(el)obs.observe(el);});
}
function scrollToSection(id){
  const box=document.querySelector('.editor-main-box');
  const el=document.getElementById(id);
  if(el&&box)box.scrollTo({top:el.offsetTop-20,behavior:'smooth'});
}

      <div class="tc-icon-wrap" style="background:${t.iconBg};color:${t.iconClr}">${t.icon}</div>

      ${t.typeLabel?`<div class="tc-types">콘텐츠 유형(${t.typeCount}종) ▾</div>`:``}
    </div>`).join('');
}
function selectType(id){
  S.creationType=id;
  document.getElementById('typeGrid').innerHTML=renderTypeCards();
  toast(`"${TYPES_MAIN.find(t=>t.id===id)?.label}" 선택됨`,'success');

        <div class="toc-panel-head">

        </div>
        <div class="toc-panel-items" id="tocTreeItems">${renderTocTree()}</div>
        <div class="toc-panel-foot">
          <button class="toc-add-btn" onclick="addToc()">+ 목차 추가</button>
        </div>
      </div>
      ${renderContentPanel(toc)}
    </div>`;
}

function renderTocTree(){
  if(!S.toc.length) return`<div style="padding:24px;text-align:center;font-size:13px;color:var(--text-3)">목차가 없습니다</div>`;
  return`<div class="toc-timeline">`+S.toc.map((t,ti)=>{
    const isActive=S.activeTocId===t.id;
    const isExpanded=TOC_EXPANDED[t.id]!==false;
    const isLast=ti===S.toc.length-1;
    const em=S.tocEditMode;
    return`
      <div class="tl-item ${isActive?'active':''}" id="tnode-${t.id}">
        <div class="tl-left">
          <div class="tl-num" onclick="toggleTocExpand('${t.id}');selectToc('${t.id}')">${ti+1}</div>
          ${!isLast?`<div class="tl-line"></div>`:''}
        </div>
        <div class="tl-right">
          <div class="tl-header" onclick="selectToc('${t.id}')">
            <span class="tl-title" ondblclick="event.stopPropagation();startRenameToc('${t.id}')" id="tname-${t.id}">${esc(t.title)}</span>
            ${em?`
              <span class="tl-cnt-pill">${t.contents.length}</span>
              <div class="tl-item-actions" onclick="event.stopPropagation()">
                <div class="t-btn" onclick="moveTocUp(${ti})" title="위로">↑</div>
                <div class="t-btn" onclick="moveTocDown(${ti})" title="아래로">↓</div>
                <div class="t-btn del" onclick="deleteToc('${t.id}')" title="삭제">✕</div>
              </div>
            `:`
              <div class="tl-hover-actions" onclick="event.stopPropagation()">
                <div class="t-btn" onclick="selectToc('${t.id}');openContentAdd()" title="콘텐츠 추가" style="font-size:15px;font-weight:700;color:var(--brand)">+</div>
              </div>
            `}
          </div>

function renderContentDetailPanel(toc,c){

    const grad=mock?.vidColor||'linear-gradient(135deg,#0a1628,#1a3a6b)';
    body=`

        <div class="video-thumb" style="background:${grad}" onclick="toast('영상 재생 (프로토타입)')">

        </div>
        <div class="detail-meta-row">
          <span class="detail-meta-chip">🎬 동영상</span>
          ${c.dur?`<span class="detail-meta-chip">⏱ ${c.dur}</span>`:''}

      </div>
      <div class="detail-section">
        <div class="detail-field">
          <div class="df-label">제목</div>
          <div class="df-val" contenteditable="true"
            onblur="updateContentTitle('${toc.id}','${c.id}',this.textContent)"
            onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">${esc(c.title)}</div>
        </div>
        <div class="detail-field">
          <div class="df-label">설명</div>
          <textarea class="df-val multiline input" style="border:1.5px solid var(--border-md)">${mock?.desc||''}</textarea>
        </div>
        ${mock?.tags?`<div class="detail-tags">${mock.tags.map(t=>`<span class="detail-tag">${t}</span>`).join('')}</div>`:''}
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-sm" onclick="toast('파일 교체 (프로토타입)')">📂 파일 교체</button>
        <button class="btn btn-sm" style="color:var(--danger);border-color:rgba(220,38,38,.25)"
          onclick="removeContent('${toc.id}','${c.id}');closeContentDetail()">🗑 삭제</button>
      </div>`;
  } else if(icon==='📎'||c.type==='PDF'){
    body=`
      <div class="pdf-preview">
        <div class="pdf-icon">📄</div>
        <div class="pdf-info">
          <div class="pdf-name">${esc(c.title)}</div>
          <div class="pdf-meta">${mock?.pages||0}페이지 · ${mock?.size||'0B'}</div>
        </div>
      </div>
      <div class="detail-field">
        <div class="df-label">설명</div>
        <textarea class="df-val multiline input" style="border:1.5px solid var(--border-md)">${mock?.desc||''}</textarea>
      </div>
      <button class="btn btn-sm" onclick="toast('파일 교체 (프로토타입)')">📂 파일 교체</button>`;
  } else if(icon==='❓'||c.type==='퀴즈'){
    const qt=mock?.quizType||'multiple';
    const qs=mock?.questions||[];
    body=`
      <div class="detail-section">
        <div class="detail-section-label">퀴즈 유형</div>
        <div class="quiz-type-tabs">
          <div class="quiz-tab ${qt==='multiple'?'active':''}" onclick="toast('객관식 선택')">객관식</div>
          <div class="quiz-tab ${qt==='ox'?'active':''}" onclick="toast('OX 선택')">OX 퀴즈</div>
        </div>
      </div>

        <div class="detail-section-label">문제 목록 (${qs.length}문항)</div>
        ${qs.map((q,qi)=>`
          <div class="quiz-q">
            <div class="quiz-q-num">Q${qi+1}</div>
            <div class="quiz-q-text">${esc(q.q)}</div>
            <div class="quiz-opts">
              ${q.opts.map((opt,oi)=>`
                <div class="quiz-opt ${oi===q.ans?'correct':''}">
                  <div class="opt-label">${'ABCD'[oi]}</div>
                  ${esc(opt)}${oi===q.ans?' ✓':''}
                </div>`).join('')}
            </div>
          </div>`).join('')}
        <div class="quiz-add-q" onclick="toast('문제 추가 (프로토타입)')">+ 문제 추가</div>
      </div>`;
  } else {
    body=`
      <div class="detail-field">
        <div class="df-label">제목</div>

  return`
    <div class="frame-content" id="frameContent">
      <div class="frame-content-head">
        <button class="back-btn" onclick="closeContentDetail()">← 목록</button>
        <span class="ctit">${icon} ${esc(c.title)}</span>
      </div>
      <div class="fc-detail">${body}</div>
    </div>`;
}

function renderContentTypeForm(toc, typeInfo){
  let formBody='';
  const lbl=typeInfo.label;
  if(lbl==='동영상') formBody=renderVideoFormBody();
  else if(lbl==='이미지') formBody=renderImageFormBody();
  else if(lbl==='아티클') formBody=renderArticleFormBody();
  else if(lbl==='첨부파일') formBody=renderAttachFormBody();
  else if(lbl==='유튜브') formBody=renderYoutubeFormBody();
  else if(lbl==='퀴즈') formBody=renderQuizFormBody();
  else if(lbl==='설문') formBody=renderSurveyFormBody();
  else if(lbl==='외부링크') formBody=renderLinkFormBody();
  else if(lbl==='오프라인') formBody=renderOfflineFormBody();
  else if(lbl==='과제') formBody=renderAssignmentFormBody();
  else if(lbl==='토론') formBody=renderDiscussionFormBody();
  else formBody=`<div class="cf-section"><label class="cf-label">제목 <span class="req">*</span></label><input id="cfTitle" class="cf-input" placeholder="제목을 입력해 주세요."/></div>`;
  const submitLabel={아티클:'아티클 등록',오프라인:'오프라인 등록',퀴즈:'퀴즈 등록',설문:'설문 등록',외부링크:'링크 등록'}[lbl]||'콘텐츠 등록';
  return`
    <div class="frame-content" id="frameContent" style="display:flex;flex-direction:column">
      <div class="cf-header">
        <span class="cf-type-badge">${typeInfo.icon} ${typeInfo.label}</span>
        <span class="cf-type-change" onclick="S.contentAddType=null;refreshTocFrame()">‹ 콘텐츠 유형 변경</span>
      </div>
      <div class="cf-body">${formBody}</div>
      <div class="cf-actions">
        <button class="btn" onclick="closeContentAdd()">취소</button>
        <button class="btn" style="background:var(--warn);color:#fff;border-color:var(--warn)"
          onclick="submitContentForm('${toc?.id}','${typeInfo.label}','${typeInfo.icon}')">
          ${submitLabel}
        </button>
      </div>
    </div>`;
}

/* ── TOC actions ── */
function toggleTocExpand(id){TOC_EXPANDED[id]=TOC_EXPANDED[id]===false?true:false;refreshTocTree();}
function refreshTocTree(){const el=document.getElementById('tocTreeItems');if(el)el.innerHTML=renderTocTree();}
function selectToc(id){S.activeTocId=id;S.activeContentId=null;S.contentView='list';refreshTocFrame();}
function addToc(){
  const id='t'+Date.now();
  S.toc.push({id,title:'새 목차 '+(S.toc.length+1),contents:[]});
  TOC_EXPANDED[id]=true;
  S.activeTocId=id;S.contentView='list';refreshTocFrame();
  toast('목차가 추가됐습니다.','success');
  setTimeout(()=>startRenameToc(id),80);
}
function moveTocUp(idx){if(idx===0)return;[S.toc[idx-1],S.toc[idx]]=[S.toc[idx],S.toc[idx-1]];refreshTocFrame();toast('목차를 위로 이동했습니다.');}
function moveTocDown(idx){if(idx>=S.toc.length-1)return;[S.toc[idx],S.toc[idx+1]]=[S.toc[idx+1],S.toc[idx]];refreshTocFrame();toast('목차를 아래로 이동했습니다.');}
function deleteToc(id){
  if(S.toc.length<=1){toast('최소 1개 목차가 필요합니다.','warn');return;}
  S.toc=S.toc.filter(t=>t.id!==id);
  if(S.activeTocId===id)S.activeTocId=S.toc[0]?.id||null;
  refreshTocFrame();toast('목차가 삭제됐습니다.');
}
function startRenameToc(id){
  const span=document.getElementById('tname-'+id);if(!span)return;
  const toc=S.toc.find(t=>t.id===id);if(!toc)return;
  const input=document.createElement('input');input.className='tree-name-input';input.value=toc.title;
  span.replaceWith(input);input.focus();input.select();
  const save=()=>{toc.title=input.value.trim()||toc.title;refreshTocFrame();};
  input.addEventListener('blur',save);
  input.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();input.blur();}if(e.key==='Escape'){input.removeEventListener('blur',save);refreshTocFrame();}});
}
function openContentDetail(cId){S.activeContentId=cId;S.contentView='detail';refreshTocFrame();}
function closeContentDetail(){S.activeContentId=null;S.contentView='list';refreshTocFrame();}
function openContentAdd(){S.contentAddType=null;S.contentView='add';refreshTocFrame();}
function closeContentAdd(){S.contentAddType=null;S.contentView='list';refreshTocFrame();}
function addContent(label,icon,cls){
  S.contentAddType={label,icon,cls};
  refreshTocFrame();
}
function submitContentForm(tocId,type,icon){
  const toc=S.toc.find(t=>t.id===tocId);if(!toc)return;
  const titleEl=document.getElementById('cfTitle');
  const title=titleEl?.value.trim()||type+' '+(toc.contents.length+1);
  toc.contents.push({id:'c'+Date.now(),icon,type,title,dur:''});
  S.contentView='list';S.contentAddType=null;refreshTocFrame();
  toast(`${type} 콘텐츠가 추가됐습니다.`,'success');
}
function toggleTocEditMode(){
  S.tocEditMode=!S.tocEditMode;
  refreshTocFrame();
}
function startEditContentTitle(tocId,cId){
  const span=document.getElementById('ctdisp-'+cId);if(!span)return;
  const toc=S.toc.find(t=>t.id===tocId);if(!toc)return;
  const c=toc.contents.find(x=>x.id===cId);if(!c)return;
  const input=document.createElement('input');
  input.style.cssText='flex:1;font-size:14px;font-weight:600;border:1.5px solid var(--brand);border-radius:4px;padding:2px 8px;background:var(--brand-soft);color:var(--brand-strong);outline:none;min-width:0;width:100%';
  input.value=c.title;
  span.replaceWith(input);
  input.focus();input.select();
  input.addEventListener('blur',()=>{c.title=input.value.trim()||c.title;refreshTocFrame();});
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();input.blur();}
    if(e.key==='Escape'){refreshTocFrame();}
  });
}
function startRenameContent(tocId,cId){
  const span=document.getElementById('cname-'+cId);if(!span)return;
  const toc=S.toc.find(t=>t.id===tocId);if(!toc)return;
  const c=toc.contents.find(x=>x.id===cId);if(!c)return;
  const input=document.createElement('input');
  input.className='child-name-input';input.value=c.title;
  span.replaceWith(input);input.focus();input.select();
  const save=()=>{c.title=input.value.trim()||c.title;refreshTocTree();};
  input.addEventListener('blur',save);
  input.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();input.blur();}
    if(e.key==='Escape'){input.removeEventListener('blur',save);refreshTocTree();}
  });
}
function removeContent(tocId,cId){
  const toc=S.toc.find(t=>t.id===tocId);if(!toc)return;
  toc.contents=toc.contents.filter(c=>c.id!==cId);
  if(S.activeContentId===cId){S.activeContentId=null;S.contentView='list';}
  refreshTocFrame();
}
function moveContentUp(tocId,idx){const toc=S.toc.find(t=>t.id===tocId);if(!toc||idx===0)return;[toc.contents[idx-1],toc.contents[idx]]=[toc.contents[idx],toc.contents[idx-1]];refreshTocFrame();toast('콘텐츠를 위로 이동했습니다.');}
function moveContentDown(tocId,idx){const toc=S.toc.find(t=>t.id===tocId);if(!toc||idx>=toc.contents.length-1)return;[toc.contents[idx],toc.contents[idx+1]]=[toc.contents[idx+1],toc.contents[idx]];refreshTocFrame();toast('콘텐츠를 아래로 이동했습니다.');}
function updateContentTitle(tocId,cId,val){
  const toc=S.toc.find(t=>t.id===tocId);if(!toc)return;
  const c=toc.contents.find(c=>c.id===cId);if(c)c.title=val.trim()||c.title;
  refreshTocTree();
}
function refreshTocFrame(){const wrap=document.getElementById('tocFrameWrap');if(wrap)wrap.innerHTML=renderTocFrame();}

/* ══════════════════════════════════════════════════════════
   Step 4 — 신청·학습 설정 (Unified Box)
══════════════════════════════════════════════════════════ */
function renderS4(){
  const e=S.enroll;
  const rows=[
    {key:'period',label:'신청 및 학습기간',summary:e.immediate?`<span class="em">즉시 학습</span> · 신청일부터 <span class="em">${e.days}일</span>간`:`<span class="em">기간 학습</span> · ${e.learnFrom||'?'} ~ ${e.learnTo||'?'}`,body:renderPanelPeriod},
    {key:'capacity',label:'모집 정원',summary:`<span class="em">${e.capacity}</span>`,body:renderPanelCapacity},
    {key:'completion',label:'수료 방식',summary:`<span class="em">${e.completion==='immediate'?'즉시 수료':'기간 종료 후 수료'}</span><div class="desc">${e.completion==='immediate'?'수료조건 달성 즉시 처리':'학습기간 종료 후 일괄 처리'}</div>`,body:renderPanelCompletion},
    {key:'progress',label:'수료 조건',summary:`진도율 <span class="em">${e.progress}%</span> 이상`,body:renderPanelProgress},
  ];
  return`<div class="setting-unified">
    ${rows.map(r=>`
      <div class="su-row ${S.s4open===r.key?'open':''}">
        <div class="su-head" onclick="toggleS4('${r.key}')">
          <div class="su-key">${r.label}</div>
          <div class="su-val">${r.summary}</div>
          <span class="su-edit">${S.s4open===r.key?'접기':'편집'}</span>
        </div>
        ${S.s4open===r.key?`<div class="su-body">${r.body()}</div>`:''}
      </div>`).join('')}
  </div>`;
}
function toggleS4(k){S.s4open=S.s4open===k?null:k;refreshS4();}
function refreshS4(){const w=document.getElementById('s4Wrap');if(w)w.innerHTML=renderS4();}
function renderPanelPeriod(){
  const e=S.enroll;
  return`
    ${makeOptRow('lp','immediate',e.immediate,'즉시 학습','신청 즉시 학습을 시작합니다.',`<div class="octrl">신청일부터 <input type="number" class="inline-num" id="lpDays" value="${e.days}" min="1" max="365" ${e.immediate?'':'disabled'}/> 일간 학습</div>`)}
    ${makeOptRow('lp','period',!e.immediate,'기간 학습','신청 기간과 학습 기간을 설정합니다.',`<div style="display:flex;flex-direction:column;gap:8px;margin-top:10px">
      <div class="period-row"><span class="period-lbl">신청기간</span><input type="date" class="input" id="lpAF" value="${e.applyFrom}" ${e.immediate?'disabled':''}/><span>~</span><input type="date" class="input" id="lpAT" value="${e.applyTo}" ${e.immediate?'disabled':''}/></div>
      <div class="period-row"><span class="period-lbl">학습기간</span><input type="date" class="input" id="lpLF" value="${e.learnFrom}" ${e.immediate?'disabled':''}/><span>~</span><input type="date" class="input" id="lpLT" value="${e.learnTo}" ${e.immediate?'disabled':''}/></div>
    </div>`)}
    <div class="edit-actions">
      <button class="btn" onclick="toggleS4('period')">취소</button>
      <button class="btn btn-primary" onclick="savePeriod()">저장</button>
    </div>`;
}
function onLPChange(){
  const im=document.querySelector('input[name="lp"]:checked')?.value==='immediate';
  document.getElementById('lpDays').disabled=!im;
  ['lpAF','lpAT','lpLF','lpLT'].forEach(id=>{const el=document.getElementById(id);if(el)el.disabled=im;});
  document.querySelectorAll('.opt-row').forEach(r=>{const ck=r.querySelector('input[type=radio]');if(ck)r.classList.toggle('selected',ck.checked);});
}
function savePeriod(){
  const im=document.querySelector('input[name="lp"]:checked')?.value==='immediate';
  S.enroll.immediate=im;S.enroll.days=+document.getElementById('lpDays')?.value||365;
  S.enroll.applyFrom=document.getElementById('lpAF')?.value||'';S.enroll.applyTo=document.getElementById('lpAT')?.value||'';
  S.enroll.learnFrom=document.getElementById('lpLF')?.value||'';S.enroll.learnTo=document.getElementById('lpLT')?.value||'';
  S.s4open=null;refreshS4();toast('저장됐습니다.','success');
}
function renderPanelCapacity(){
  const nl=S.enroll.capacity==='제한없음';const num=nl?'':S.enroll.capacity.replace(/[^0-9]/g,'');
  return`<div style="display:flex;align-items:center;gap:12px;padding:12px 0;flex-wrap:wrap">
    <input type="number" class="inline-num" id="capNum" min="1" value="${num}" ${nl?'disabled':''}/><b>명</b>
    <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
      <input type="checkbox" id="capNL" ${nl?'checked':''} onchange="document.getElementById('capNum').disabled=this.checked" style="accent-color:var(--brand)"/>제한없음</label></div>
    <div class="edit-actions">
      <button class="btn" onclick="toggleS4('capacity')">취소</button>
      <button class="btn btn-primary" onclick="saveCapacity()">저장</button></div>`;
}
function saveCapacity(){const nl=document.getElementById('capNL').checked;S.enroll.capacity=nl?'제한없음':(+document.getElementById('capNum').value||0)+'명';S.s4open=null;refreshS4();toast('저장됐습니다.','success');}
function renderPanelCompletion(){
  return`
    ${makeOptRow('comp','immediate',S.enroll.completion==='immediate','즉시 수료','수료조건 달성 즉시 처리됩니다.')}
    ${makeOptRow('comp','end',S.enroll.completion==='end','기간 종료 후 수료','학습기간 종료 후 일괄 처리됩니다.')}
    <div class="edit-actions">
      <button class="btn" onclick="toggleS4('completion')">취소</button>
      <button class="btn btn-primary" onclick="S.enroll.completion=document.querySelector('input[name=comp]:checked')?.value||'immediate';S.s4open=null;refreshS4();toast('저장됐습니다.','success')">저장</button></div>`;
}
function renderPanelProgress(){
  return`<div style="display:flex;align-items:center;gap:16px;padding:16px 0;flex-wrap:wrap">
    <span style="font-size:13px;font-weight:600">진도율</span>
    <input type="range" id="progR" min="0" max="100" step="10" value="${S.enroll.progress}"
      oninput="document.getElementById('progV').textContent=this.value+'%'" style="flex:1;min-width:160px;accent-color:var(--brand)"/>
    <span id="progV" style="font-size:18px;font-weight:800;min-width:52px">${S.enroll.progress}%</span></div>
    <div class="edit-actions">
      <button class="btn" onclick="toggleS4('progress')">취소</button>
      <button class="btn btn-primary" onclick="S.enroll.progress=+document.getElementById('progR').value;S.s4open=null;refreshS4();toast('저장됐습니다.','success')">저장</button></div>`;
}

/* ══════════════════════════════════════════════════════════
   Step 5 — 부가 설정 (Unified Box)
══════════════════════════════════════════════════════════ */
function renderS5(){
  const rows=[
    {key:'sequential',label:'학습 순서',desc:'등록된 목차 순서대로 학습 제한',onL:'순서대로',offL:'자율'},
    {key:'progressLock',label:'진도바 이동 제한',desc:'동영상 프로그레스바 임의 이동 제한',onL:'제한',offL:'허용'},
    {key:'speedLock',label:'동영상 배속 고정',desc:'1배속으로 고정합니다.',onL:'고정',offL:'자유'},
    {key:'captureBlock',label:'화면 캡처 방지',desc:'캡처 프로그램 방어로 저작권 보호',onL:'적용',offL:'미적용'},
  ];
  return`<div class="setting-unified">
    ${rows.map(r=>`
      <div class="toggle-unified-row">
        <div class="tu-info">
          <div class="tu-key">${r.label}</div>
          <div class="tu-desc">${r.desc}</div>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="sw${r.key}" ${S.extra[r.key]?'checked':''}
            onchange="S.extra['${r.key}']=this.checked;document.getElementById('swlbl${r.key}').textContent=this.checked?'${r.onL}':'${r.offL}'"/>
          <span class="ttrack"><span class="tthumb"></span></span>
          <span class="tlabel" id="swlbl${r.key}">${S.extra[r.key]?r.onL:r.offL}</span>
        </label>
      </div>`).join('')}
  </div>`;
}

/* ══════════════════════════════════════════════════════════
   Step 6 — 오픈 (Compact)
══════════════════════════════════════════════════════════ */
function renderS6(){
  const hasToc=S.toc.some(t=>t.contents.length>0);
  const hasPeriod=S.enroll.immediate||(S.enroll.learnFrom&&S.enroll.learnTo);
  const checks=[
    {ok:S.courseName.trim().length>=2,label:'과정명',value:S.courseName||'미입력',anchor:'sec-info'},
    {ok:!!S.creationType,label:'제작유형',value:S.creationType?TYPES_MAIN.find(t=>t.id===S.creationType)?.label||S.creationType:'미선택',anchor:'sec-type'},
    {ok:hasToc,label:'콘텐츠',value:hasToc?'목차와 콘텐츠가 등록됐습니다.':'콘텐츠가 없습니다.',anchor:'sec-toc'},
    {ok:hasPeriod,label:'학습기간',value:S.enroll.immediate?`즉시 · ${S.enroll.days}일간`:`${S.enroll.learnFrom||'미설정'} ~ ${S.enroll.learnTo||'미설정'}`,anchor:'sec-enroll'},
    {ok:true,label:'모집정원',value:S.enroll.capacity,anchor:'sec-enroll'},
    {ok:true,label:'수료방식',value:S.enroll.completion==='immediate'?'즉시 수료':'기간 종료 후 수료',anchor:'sec-enroll'},
  ];
  const allOk=checks.every(c=>c.ok);
  return`
    <div class="open-check-compact">
      ${checks.map(c=>`
        <div class="occ-row ${c.ok?'ok':'err'}">
          <div class="occ-icon">${c.ok?'✓':'✗'}</div>
          <div class="occ-label">${c.label}</div>
          <div class="occ-value">${c.value}</div>
          ${!c.ok?`<span class="occ-link" onclick="scrollToSection('${c.anchor}')">수정하기</span>`:''}
        </div>`).join('')}
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px">
      <button class="btn btn-brand" style="min-width:160px;padding:12px 20px;font-size:14px" ${!allOk?'disabled':''} onclick="doOpen()">
        🚀 과정 오픈하기
      </button>
      ${allOk?`<span style="font-size:13px;color:var(--success);font-weight:600">✓ 모든 항목이 준비됐습니다</span>`:
               `<span style="font-size:13px;color:var(--danger)">위 오류 항목을 먼저 수정해주세요.</span>`}
    </div>
    <div style="display:flex;gap:10px">
      <button class="btn" onclick="toast('임시 저장됐습니다.','success')">임시 저장</button>
      <button class="btn" onclick="toast('초안으로 저장됐습니다.','success')">초안 저장</button>
    </div>`;
}
function doOpen(){
  openModal('과정 오픈 확인','과정을 오픈하면 학습자가 수강신청할 수 있습니다. 진행하시겠습니까?','오픈하기',
    ()=>{closeModal();toast('과정이 오픈됐습니다! 🎉','success');setTimeout(()=>go('dashboard'),1200);});
}

/* ══════════════════════════════════════════════════════════
   Helpers
══════════════════════════════════════════════════════════ */
function makeOptRow(name,value,checked,title,desc,extra=''){
  return`<label class="opt-row ${checked?'selected':''}" onclick="void(0)">
    <input type="radio" name="${name}" value="${value}" ${checked?'checked':''} onchange="
      document.querySelectorAll('.opt-row').forEach(r=>{const ck=r.querySelector('input[type=radio]');if(ck&&ck.name==='${name}')r.classList.toggle('selected',ck.checked)});
      ${name==='lp'?'onLPChange()':''}"/>
    <div class="opt-content"><div class="otit">${title}</div><div class="odesc">${desc}</div>${extra}</div>
  </label>`;
}
function renderPlaceholder(){
  document.getElementById('view').innerHTML=`<div style="padding:120px 48px;text-align:center;color:var(--text-3)">
    <div style="font-size:32px;margin-bottom:12px">🚧</div>
    <div style="font-size:15px;font-weight:700;color:var(--text-2);margin-bottom:6px">준비 중인 화면입니다</div>
    <button class="btn" style="margin-top:16px" onclick="go('dashboard')">← 보드로 돌아가기</button>
  </div>`;
}
function toggleNav(id){document.querySelector(`.nav-group[data-g="${id}"]`)?.classList.toggle('open');}
function toast(msg,type=''){
  const el=document.createElement('div');el.className='toast '+(type||'');el.textContent=msg;
  document.getElementById('toastWrap').appendChild(el);
  setTimeout(()=>{el.style.cssText='opacity:0;transition:opacity .3s';setTimeout(()=>el.remove(),300)},2400);
}
function openModal(title,body,actionLabel,onAction){
  document.getElementById('mTitle').textContent=title;document.getElementById('mBody').textContent=body;
  document.getElementById('mActions').innerHTML=`<button class="btn" onclick="closeModal()">취소</button><button class="btn btn-primary" onclick="(${onAction.toString()})()">${actionLabel}</button>`;
  document.getElementById('modalMask').classList.add('open');
}
function closeModal(e){if(!e||e.target===document.getElementById('modalMask'))document.getElementById('modalMask').classList.remove('open');}
function toggleTheme(){
  const html=document.documentElement;const isDark=html.getAttribute('data-theme')==='dark';
  html.setAttribute('data-theme',isDark?'light':'dark');
  document.getElementById('themeBtn').textContent=isDark?'🌙 다크모드':'☀️ 라이트모드';
  localStorage.setItem('lm-theme',isDark?'light':'dark');
}
(function(){const s=localStorage.getItem('lm-theme')||'light';document.documentElement.setAttribute('data-theme',s);
  const b=document.getElementById('themeBtn');if(b)b.textContent=s==='dark'?'☀️ 라이트모드':'🌙 다크모드';})();
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
</script>
</body>
</html>
